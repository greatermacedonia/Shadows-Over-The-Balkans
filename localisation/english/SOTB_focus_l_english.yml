 MAC_night_of_solun_tactics: "Night of Solun Tactics"
 MAC_night_of_solun_tactics_desc: "The audacity of Sandanski's 1912 night assault on Solun is now codified into Macedonian military doctrine. Night operations and special forces capacity are permanently enhanced."
 MAC_vardar_engineers_corps: "Vardar Engineering Corps"
 MAC_vardar_engineers_corps_desc: "Dedicated military engineers stand ready to fortify the Vardar valley. Entrenchment speed is permanently increased."
 MAC_fortress_booster: "Fortress Construction Program"
 MAC_fortress_booster_desc: "A nationwide fortification initiative is underway. Fort construction speed is temporarily increased by 15%."

 # ============================================================
 # MILITARY EVENT TITLES & DESCRIPTIONS
 # ============================================================
 SOTB.700.t: "The General Staff Divides"
 SOTB.700.d: "The briefing room at the Ministry of Defense has never been this tense. On one side: Minister Aleksandrov, flanked by grey-haired colonels who remember the trenches of 1918. On the other: Colonel Apostolski, armed with charts, armour specifications, and a cadre of young captains who have read Guderian and dream of blitzkrieg. 'The next war,' Apostolski declares, 'will not be won in trenches. It will be won by the side that moves faster and hits harder.' Aleksandrov's reply is calm but carrying an edge: 'Tanks are expensive toys. Artillery wins wars. Ask the Bulgarians.' The General Staff looks to you. Choose."
 SOTB.700.a: "The debate is joined"

 SOTB.701.t: "The Lion's Endorsement"
 SOTB.701.d: "A letter from General Sandanski has arrived at the Ministry of Defense. The Lion of Solun, 64 and rarely seen in public, has weighed in on the army's future: 'I have watched Apostolski's proposals with great interest. The boy reminds me of myself in 1912 — audacious, impatient, unwilling to accept that the old way is the only way. Aleksandrov is a good soldier. He was a fine deputy. But a mobile army is not a betrayal of my legacy — it is its evolution. I took Solun with three hundred volunteers and a plan. I did not take it with trenches.' He stops short of endorsing Apostolski's full programme — but his meaning is clear."
 SOTB.701.a: "Even the Lion sees the future"

 SOTB.702.t: "The Old General's Wrath"
 SOTB.702.d: "Minister Aleksandrov has summoned Colonel Apostolski to his office. The door is closed. The shouts can be heard three floors down. 'You think tanks will save us? You think speed matters more than discipline? I was there the night Sandanski took Solun. I know what wins battles — and it is not these... these mechanical toys!' Apostolski stands his ground: 'Minister, with respect — the Lion himself has endorsed reform. Will you defy your own mentor?' The old general's face darkens."
 SOTB.702.a: "Aleksandrov accepts the decision — grudgingly"
 SOTB.702.b: "Aleksandrov overrules Apostolski — the Lion's Way prevails"

 SOTB.703.t: "Army Manoeuvres"
 SOTB.703.d: "The Macedonian army conducts its largest peacetime manoeuvres since Sandanski's retirement. Thousands of soldiers, hundreds of vehicles, and squadrons of aircraft demonstrate the republic's chosen doctrine. Foreign military attachés watch from the sidelines — some impressed, some alarmed. The message is clear: Macedonia's army is ready."
 SOTB.703.a: "The army demonstrates its strength"

