 # ============================================================
 # CULTURAL IDEA DESCRIPTIONS
 # ============================================================
 MAC_white_tower: "The White Tower"
 MAC_white_tower_desc: "Solun's iconic landmark, restored as a museum of Macedonian history. A beacon of trade and culture."
 MAC_rakija_tradition: "Macedonian Rakija Tradition"
 MAC_rakija_tradition_desc: "Every village a still. Every family a recipe. Rakija is liquid Macedonian heritage — now commercialised."
 MAC_balkan_spirit: "The Balkan Spirit"
 MAC_balkan_spirit_desc: "The finest spirit in the Balkans is Macedonian. Rakija exports strengthen both the economy and regional diplomacy."

 # ============================================================
 # CULTURAL EVENT TITLES & DESCRIPTIONS
 # ============================================================
 SOTB.950.t: "Festival of the Sun"
 SOTB.950.d: "The streets of Solun are alive with light. Banners bearing the sixteen-ray Vergina Sun hang from every balcony. Musicians play Macedonian folk songs in the squares. Dancers in traditional costume spin through the White Tower plaza. The Festival of the Sun has begun — an annual celebration of everything it means to be Macedonian. Children wave paper Vergina Suns. Old men weep. The nation, for one glorious week, is united in joy."
 SOTB.950.a: "Let the festival begin"

 SOTB.951.t: "Ilinden — The Uprising Remembered"
 SOTB.951.d: "On 2 August 1903 — Ilinden, St. Elijah's Day — the IMRO rose against the Ottoman Empire. The Kruševo Republic was proclaimed. It lasted ten days. It changed everything. Today, the nation remembers. Veterans of the uprising — old men now, their revolutionary uniforms carefully pressed — march through Solun. Delchev watches from his balcony. Sandanski, rarely seen in public, salutes the parade. The Lion still remembers. The republic still honours. Ilinden — the day Macedonia chose freedom."
 SOTB.951.a: "We remember"

 SOTB.952.t: "Orthodox Christmas in Solun"
 SOTB.952.d: "Snow dusts the domes of Solun's Orthodox cathedrals. The bells of St. Demetrios ring out across the city. Families gather. Candles flicker in every window. Archbishop Dositej II leads the midnight liturgy — his voice carrying through the ancient basilica. 'Christ is born. Macedonia endures.' The White Tower, newly restored, glows in the winter darkness. Merry Christmas from Solun — the heart of Orthodox Macedonia."
 SOTB.952.a: "Christ is born"

 SOTB.953.t: "Macedonia Eternal"
 SOTB.953.d: "In a ceremony broadcast across the nation, President Čento — or whoever now leads — raises the Vergina Sun above the Parliament building. The old flag is retired with honour. The new flag — larger, brighter, eternal — flies for the first time. 'This star,' the President declares, 'flew over the tomb of Philip. It flew over the army of Alexander. It flies today over a free Macedonia. And it will fly — unbroken, undimmed — for nine hundred more years.' The crowd roars. The Vergina Sun is eternal. Macedonia is eternal."
 SOTB.953.a: "Macedonia eternal"

 # ============================================================
 # BOOKMARKS
 # ============================================================
 SHADOWS_OVER_THE_BALKANS_NAME: "Shadows Over The Balkans"
 SHADOWS_OVER_THE_BALKANS_DESC: "The old empires have fallen. From the wreckage of Ottoman rule, the Balkan Wars, and the Great War, new nations rose — and none more improbable than the Republic of Macedonia. Born in revolution, baptized in betrayal, hardened by survival — Macedonia enters 1936 as a nation forged in fire. But the Founder has fallen silent, the succession remains undecided, and the shadows of old enemies grow long across the Balkans. Choose a nation and write its history."

 MAC_SOTB_BOOKMARK_DESC: "In 1903, the Ilinden Uprising failed militarily — but its leaders lived. Through decades of struggle, negotiation, and war, they built a republic from the ashes of empire. Macedonia: the miracle of the Balkans. Solun — the ancient Thessaloniki — its capital. The Vergina Sun its flag. But the republic was born under the shadow of betrayal. Bulgaria invaded in 1913, three weeks after Macedonia declared independence. Greece watched and did nothing. Bulgaria invaded again in 1915. Both times, Macedonia held. Both times, the scars deepened. Now, in 1936, the old revolutionaries who built the nation are fading. Goce Delchev — the Founder, the Macedonian Ataturk — suffered a stroke in 1934 and watches from retirement. Jane Sandanski — the Lion of Solun, the hero who captured the capital — tends his farm and remembers the betrayals. Interim President Metodija Čento keeps the seat warm, but everyone knows he is temporary. The Succession Question hangs over the republic like a storm cloud. Ten paths compete for Macedonia's future — democracy, monarchy, military rule, communism, fascism. The poppy blooms in the mountain valleys. Greece simmers in fury over Solun. Bulgaria remembers 1918 and dreams of a third try. The Balkans are never quiet for long. History has not finished with Macedonia."

 MAC_GATHERING_STORM_DESC: "Macedonia — a small Balkan republic forged in revolution against the Ottoman Empire and hardened by two repelled Bulgarian invasions — faces an uncertain future. The Founder, Goce Delchev, has suffered a stroke. The Succession Question looms. Ten paths compete for the nation's soul — and the shadows of old enemies grow longer by the day."
 MAC_delchev_succession:0 "The Delchev Succession"
 MAC_delchev_succession_desc:0 "President Čento has governed as interim leader since Delchev's stroke in 1934. Everyone knows he is keeping the seat warm. The nation waits — but it will not wait forever. The Succession Question must be answered. Who will lead Macedonia into the uncertain future?"
 MAC_preserve_democracy:0 "Preserve Democracy"
 MAC_preserve_democracy_desc:0 "The republic was built by revolutionaries who believed in the people's right to choose. Delchev, Sandanski, Čento, Vlahov, Gjorche Petrov — five visions, one shared conviction: what was won by revolution must be preserved by democracy. Hold a democratic primary and let the people decide."
 MAC_embrace_crown:0 "Embrace the Crown"
 MAC_embrace_crown_desc:0 "A handful of newspapers, aristocratic sympathisers, and army officers advocate openly for a constitutional monarchy. Their argument is seductive in its simplicity: a neutral king above faction — a symbol who reigns but does not rule. Three candidates wait in the wings."
 MAC_order_above_all:0 "Order Above All"
 MAC_order_above_all_desc:0 "Democracy is a luxury for more peaceful nations. The republic needs a firm hand — someone who serves the state, not an ideology. Todor Aleksandrov offers military discipline. Archbishop Dositej offers moral governance. Both offer stability without the chaos of elections."
 MAC_peoples_army:0 "The People's Army"
 MAC_peoples_army_desc:0 "Lazar Koliševski — young, Moscow-trained, and hungry for revolution — believes the old men of IMRO betrayed the people. The peasant still starves. The worker still toils for nothing. The revolution must continue — not with speeches, but with action."
 MAC_iron_guard:0 "The Iron Guard"
 MAC_iron_guard_desc:0 "Ivan Mihailov has seized power. Radical nationalism. Purge the left. Crush the neighbours. Build Greater Macedonia. No compromises."
 MAC_democratic_primary:0 "The Democratic Primary"
 MAC_democratic_primary_desc:0 "Five candidates. Four ideologies within democracy. One republic. Delchev — the Founder. Sandanski — the Lion. Čento — the Manager. Vlahov — the Reformer. Gjorche Petrov — the Progressive. The people will choose."
 MAC_delchev_path:0 "The Founder's Path"
 MAC_delchev_path_desc:0 "Goce Delchev — the Macedonian Ataturk — returns to active leadership. Delčevism: revolutionary nationalism, populist governance, eternal independence, armed neutrality. 'Macedonia for Macedonians. We do not bow.'"
 MAC_delchev_reforms:0 "Delčevist Reforms"
 MAC_delchev_reforms_desc:0 "The Founder's vision requires modern institutions. Education. Infrastructure. A state worthy of the revolution that built it. Delchev's personal authority drives reforms through at unprecedented speed."
 MAC_armed_neutrality:0 "Armed Neutrality"
 MAC_armed_neutrality_desc:0 "Delčevism's core tenet: Macedonia does not bow to any foreign power. Armed neutrality — like Sweden, like Switzerland — ensures that no empire makes Macedonia its battleground. We are nobody's puppet."
 MAC_macedonian_ataturk:0 "The Macedonian Ataturk"
 MAC_macedonian_ataturk_desc:0 "Delčevism fulfilled. The Founder's vision is now the republic's permanent creed. Revolutionary nationalism. Populist governance. Armed neutrality. 'Macedonia for Macedonians. Eternal independence. We do not bow.'"
 MAC_sandanski_path:0 "The Lion's Path"
 MAC_sandanski_path_desc:0 "Jane Sandanski — the man who captured Solun in 1912 — offers a different vision within Delčevism: martial stewardship. Defensive resilience. Military preparedness. 'They came in '13. They came again in '15. They will come again. The Lion still watches the borders.'"
 MAC_fortress_macedonia:0 "Fortress Macedonia"
 MAC_fortress_macedonia_desc:0 "Sandanski's doctrine: every valley a killing field. Every hill a strongpoint. The republic's borders must be a wall that no enemy can breach. Build fortifications and prepare for the worst."
 MAC_they_will_not_pass:0 "They Will Not Pass"
 MAC_they_will_not_pass_desc:0 "The Lion's famous words, etched into the national consciousness. Expand the conscription pool. Train every citizen to defend their homeland. Macedonia will not be conquered again."
 MAC_lions_legacy:0 "The Lion's Legacy"
 MAC_lions_legacy_desc:0 "Sandanski's stewardship is complete. The republic is armed, prepared, and unshakeable. The Lion has ensured that no enemy will ever take Macedonia by surprise again — and earned the respect of the watching world."
 MAC_cento_path:0 "The Manager's Mandate"
 MAC_cento_path_desc:0 "Metodija Andonov-Čento — the man who kept the economy together during the Depression — asks for the full mandate of the republic. He is not a revolutionary. He is not a soldier. He is a manager. And sometimes, what a nation needs most is someone who can make the trains run on time."
 MAC_cento_recovery:0 "The Institutional Republic"
 MAC_cento_recovery_desc:0 "Čento's vision: efficient governance, stable institutions, gradual reform. Expand the research base. Build the civil service. Make the republic work — not dramatically, but reliably."
 MAC_sustainable_republic:0 "The Sustainable Republic"
 MAC_sustainable_republic_desc:0 "Čento's mandate is complete. The republic is stable, prosperous, and boring — in the best possible way. No grand gestures. No dramatic revolutions. Just competent governance."
 MAC_vlahov_path:0 "The Reformer's Coalition"
 MAC_vlahov_path_desc:0 "Dimitar Vlahov — IMRO veteran, Kruševo fighter, and now democratic reformer — leads a broad coalition. Constitutional reform. Western alignment. Free elections. Free trade. Britain and France would prefer him."
 MAC_vlahov_open_doors:0 "Open Doors"
 MAC_vlahov_open_doors_desc:0 "Vlahov opens Macedonia to the West. Trade agreements with London and Paris. Democratic solidarity with Europe's established powers. The 'normal country' path — and the one the democracies are most comfortable with."
 MAC_vlahov_normal_country:0 "The Normal Country"
 MAC_vlahov_normal_country_desc:0 "Vlahov's reforms are complete. Macedonia is a stable, liberal democracy with Western backing. The republic has become what Delchev always intended: a free nation among free nations."
 MAC_petrov_path:0 "The Progressive's Dream"
 MAC_petrov_path_desc:0 "Gjorche Petrov — one of IMRO's earliest intellectuals — survived the assassination that claimed him in another world. His democratic socialism offers a path between Vlahov's moderation and Koliševski's revolution: land reform, workers' rights, social justice — achieved through democracy."
 MAC_petrov_land_liberty:0 "Land & Liberty"
 MAC_petrov_land_liberty_desc:0 "The peasant who owns his land will defend it. Petrov's land reform breaks up the old estates and gives every rural family a stake in the republic. The poppy trade continues — publicly denounced, privately tolerated — but the peasant is no longer dependent on it."
 MAC_peoples_charter:0 "The People's Charter"
 MAC_peoples_charter_desc:0 "Workers' rights enshrined in law. Fascist organizations banned from public life. The People's Charter is Petrov's answer to the extremists: democracy must deliver material justice, or it will be swept away."
 MAC_just_republic:0 "A Just Republic"
 MAC_just_republic_desc:0 "Petrov's vision is realized. Land reform has given peasants a stake in the nation. Workers' rights are enshrined in law. Fascism is banished from public life. This is what the revolution was always meant to become."
 MAC_soldiers_duty:0 "The Soldier's Duty"
 MAC_soldiers_duty_desc:0 "Todor Aleksandrov is not a politician. He is not an ideologue. He is a soldier who believes the republic needs order, discipline, and strength. He serves the state. He asks only that the state be worthy of his service."
 MAC_aleksandrov_stability:0 "The Firm Hand"
 MAC_aleksandrov_stability_desc:0 "Aleksandrov's military government restores order. Strikes are suppressed. Extremists are contained. The republic is stable — not by democratic consent, but by the soldier's discipline. For now, that is enough."
 MAC_shepherds_way:0 "The Shepherd's Way"
 MAC_shepherds_way_desc:0 "Archbishop Dositej II — the head of the Macedonian Orthodox Church — steps forward to lead a nation adrift. Moral governance. Social conservatism. Anti-communist. The Third Way between the godless ideologies of East and West."
 MAC_shepherd_mandate:0 "The Shepherd's Mandate"
 MAC_shepherd_mandate_desc:0 "The Archbishop's moral authority consolidates. The Church's influence grows. Both communist and fascist extremism are suppressed — not by force, but by the quiet power of the pulpit."
 MAC_royal_mandate:0 "The Royal Mandate"
 MAC_royal_mandate_desc:0 "The chosen monarch is crowned in the Cathedral of St. Demetrios in Solun. A constitutional ceremony — restrained, dignified, historic. The crown above faction. The king who reigns but does not rule."
 MAC_crown_unifies:0 "The Crown Unifies"
 MAC_crown_unifies_desc:0 "The monarchy is established. The crown has done what democracy could not: it has unified the nation around a symbol larger than any faction. The republic is dead. Long live the kingdom."
 MAC_land_reform:0 "Land Reform"
 MAC_land_reform_desc:0 "Koliševski's first act: break the estates. Give the land to the peasants who work it. The old landowners — collaborators with the Bulgarians in '15, parasites on the nation ever since — are stripped of their holdings. The people's revolution begins."
 MAC_soviet_republic:0 "Macedonian Soviet Republic"
 MAC_soviet_republic_desc:0 "The Macedonian Soviet Republic is proclaimed. The old symbols — the Vergina Sun, the Church, the democratic institutions — are swept away. In their place: the hammer and sickle, the red flag, and the promise of a workers' paradise on the Aegean."
 MAC_purge_old_guard:0 "Purge the Old Guard"
 MAC_purge_old_guard_desc:0 "Mihailov consolidates power. The old IMRO leadership — Delchev's appointees, Sandanski's protégés, the democratic establishment — are purged from government, military, and public life. The Avenger cleans house."
 MAC_greater_macedonia:0 "Greater Macedonia"
 MAC_greater_macedonia_desc:0 "Macedonia's borders are an insult. Pirin — stolen by Bulgaria. The Aegean — held by Greece. The Vardar — occupied by Yugoslavia. Mihailov demands what is rightfully Macedonian. All of it."
 MAC_avenger_triumph:0 "The Avenger's Triumph"
 MAC_avenger_triumph_desc:0 "Mihailov's vision is complete. A Greater Macedonia — forged in fire, united by will. The old men of IMRO had their time. Now the revolution is defended — not with speeches, not with elections — with strength."
 MAC_army_future:0 "The Army's Future"
 MAC_army_future_desc:0 "Sandanski built this army. Now it must decide what kind of military it wants to be. Minister Aleksandrov — the Lion's old deputy — offers the proven path: infantry, artillery, fortifications. Colonel Apostolski — the young reformer — demands the future: tanks, planes, speed. The General Staff is divided. The officer corps is split. The republic must choose."
 MAC_sandanski_principles:0 "Sandanski's Principles"
 MAC_sandanski_principles_desc:0 "Before the army can decide its future, it must remember its foundation. Jane Sandanski's core principles — discipline, preparedness, loyalty to the republic — are non-negotiable. Codify them into the army's permanent doctrine."
 MAC_night_of_solun:0 "The Night of Solun"
 MAC_night_of_solun_desc:0 "On the night of 24 October 1912, Sandanski led three hundred volunteers through the streets of Ottoman Solun. By dawn, the revolutionary flag flew over the Aegean's greatest port. That audacity — the willingness to strike when the enemy least expects it — is the soul of the Macedonian army."
 MAC_national_conscription:0 "National Conscription"
 MAC_national_conscription_desc:0 "Every Macedonian citizen has a duty to defend the republic. Expand the conscription pool. Train every able-bodied man and woman. The next war will demand nothing less than the full commitment of the nation."
 MAC_vardar_engineers:0 "Vardar Engineering Corps"
 MAC_vardar_engineers_desc:0 "The Vardar River valley is Macedonia's natural defensive line. Establish a dedicated engineering corps to fortify the river crossings, dig entrenchments, and make every inch of Macedonian soil a nightmare for invaders."
 MAC_lions_way:0 "The Lion's Way"
 MAC_lions_way_desc:0 "Aleksandrov's doctrine perfected. Infantry. Artillery. Fortifications. It is not glamorous. It works. Hold the line. Break them with artillery. Let the enemy exhaust himself against Macedonian steel."
 MAC_artillery_supremacy:0 "Artillery Supremacy"
 MAC_artillery_supremacy_desc:0 "Artillery wins wars. Aleksandrov learned this on the Macedonian Front, where French 75s and British howitzers broke the Bulgarian lines. Invest in heavy guns. Train the best artillery officers in the Balkans. When the enemy comes, they will be welcomed by thunder."
 MAC_fortress_macedonia_mil:0 "Fortress Macedonia"
 MAC_fortress_macedonia_mil_desc:0 "Turn Macedonia's borders into a wall of steel and concrete. Every valley a killing field. Every hill a strongpoint. Level 1 bunkers will be erected along the borders with Bulgaria, Greece, Yugoslavia, and Albania — and a dedicated fort construction program will follow."
 MAC_unbroken_line:0 "The Unbroken Line"
 MAC_unbroken_line_desc:0 "Macedonia's borders are a fortress. Every valley is a killing field. Every hill is a strongpoint. The republic does not retreat."
 MAC_apostolski_vision:0 "Apostolski's Vision"
 MAC_apostolski_vision_desc:0 "The next war belongs to the side that moves faster. Tanks. Planes. Speed. 'The Lion took Solun with audacity. He did not take it with trenches.'"
 MAC_macedonian_motorization:0 "Macedonian Motorization"
 MAC_macedonian_motorization_desc:0 "An army that walks is an army that arrives too late. Invest in trucks, half-tracks, and mobile logistics. Macedonia's divisions must outpace any Balkan rival. Speed is a weapon — and Macedonia will wield it."
 MAC_wings_over_vardar:0 "Wings Over the Vardar"
 MAC_wings_over_vardar_desc:0 "Control the skies above the Vardar valley and you control the battlefield below. Establish a modern fighter force. Build airfields. Train pilots. Macedonian wings will darken the Balkan sun."
 MAC_macedonian_blitz:0 "The Macedonian Blitz"
 MAC_macedonian_blitz_desc:0 "Apostolski's armored doctrine is now the republic's spearhead. Tanks punch through enemy lines. Motorized infantry exploits the breach. Fighter-bombers clear the skies. Strike fast. Strike deep. The enemy will not know what hit them."
 MAC_arsenal_of_solun:0 "The Arsenal of Solun"
 MAC_arsenal_of_solun_desc:0 "Solun's dockyards have served the republic since independence. Now they must serve the army. Convert civilian industry to military production. Build the factories that will arm Macedonia's soldiers for the coming war."
 MAC_macedonian_steel:0 "Macedonian Steel"
 MAC_macedonian_steel_desc:0 "Macedonian industry, Macedonian workers, Macedonian steel. The army's equipment will be built at home — not dependent on foreign suppliers who may abandon us as Greece did in 1913."
 MAC_lions_heirs:0 "The Lion's Heirs"
 MAC_lions_heirs_desc:0 "A new generation of Macedonian officers carries Sandanski's legacy forward. The army is ready. The republic is protected. The Lion may be retired — but his heirs stand watch. They will not fail him."
 MAC_solun_arsenal_eco:0 "The Solun Arsenal"
 MAC_solun_arsenal_eco_desc:0 "Solun's existing dockyards and arms workshops are the foundation of Macedonia's military industry. Expand them. Give the army the production base it needs to defend the republic."
 MAC_state_arms_workshops:0 "State Arms Workshops"
 MAC_state_arms_workshops_desc:0 "Establish state-owned small arms factories in Skopje, Bitola, and Solun. Standardise production. Every Macedonian soldier will carry a rifle built by Macedonian hands."
 MAC_artillery_foundry_veles:0 "Artillery Foundry Veles"
 MAC_artillery_foundry_veles_desc:0 "Veles — in the heart of the Eastern Vardar — has the metalworking tradition and the rail connections to support a major artillery foundry. Invest in heavy gun production. Macedonia will not rely on foreign artillery."
 MAC_macedonian_munitions:0 "Macedonian Munitions Ltd"
 MAC_macedonian_munitions_desc:0 "A state-chartered munitions corporation — Macedonian Munitions Ltd — will coordinate arms production across the republic. Standardisation, quality control, and economies of scale."
 MAC_balkan_arsenal_eco:0 "The Balkan Arsenal"
 MAC_balkan_arsenal_eco_desc:0 "Macedonia — small in territory, but disproportionately productive. The Balkan Arsenal expands Solun's military factories into the largest arms production complex south of the Danube."
 MAC_teteks_combine:0 "Teteks Industrial Combine"
 MAC_teteks_combine_desc:0 "The Tetovo Textile Combine is the cornerstone of Macedonian civilian industry."
 MAC_kratovo_mines:0 "Kratovo-Zletovo Mines"
 MAC_kratovo_mines_desc:0 "Modern extraction techniques have expanded Macedonia's mining output."
 MAC_hydroelectric_vardar_eco:0 "Hydroelectric Vardar"
 MAC_hydroelectric_vardar_eco_desc:0 "The Vardar River is Macedonia's lifeline. Harness its power. Hydroelectric dams along the river will electrify factories from Skopje to Solun."
 MAC_chromium_refining:0 "Chromium Refining"
 MAC_chromium_refining_desc:0 "Macedonia's mountain valleys produce some of the finest chromium ore in Europe. Invest in refining capacity. Turn raw ore into strategic resource."
 MAC_aluminium_smelting:0 "Aluminium Smelting"
 MAC_aluminium_smelting_desc:0 "The bauxite deposits of the Eastern Vardar offer a path to light metal production. Aluminium smelting — energy-intensive but strategically vital — supports aircraft manufacturing and modern industry."
 MAC_balkan_workshop_eco:0 "The Balkan Workshop"
 MAC_balkan_workshop_eco_desc:0 "Macedonia is not merely a nation — it is a workshop. From textiles to steel, from chromium to aluminium, the republic produces. The Balkan Workshop is the capstone of Macedonian civilian industry."
 MAC_vardar_railway_eco:0 "The Vardar Railway"
 MAC_vardar_railway_eco_desc:0 "The Vardar valley is the republic's economic spine. Upgrade the railways connecting Skopje, Veles, and Solun. Goods must flow. Troops must move. The railway is the republic's circulatory system."
 MAC_roads_of_republic:0 "Roads of the Republic"
 MAC_roads_of_republic_desc:0 "Beyond the railway, Macedonia's mountain communities need roads. Connect every village. Every valley. Every border post. A nation that cannot move cannot fight — and cannot trade."
 MAC_solun_skopje_express:0 "Solun-Skopje Express"
 MAC_solun_skopje_express_desc:0 "The Solun-Skopje railway is the republic's most important transport link. Upgrade it to express standard. Establish a supply hub in Skopje to coordinate military logistics."
 MAC_aegean_naval_facilities:0 "Aegean Naval Facilities"
 MAC_aegean_naval_facilities_desc:0 "Solun's port is the republic's gateway to the world. Expand the naval facilities — deeper berths, modern cranes, coastal fortifications. Kavala too shall receive new docks for the eastern Aegean."
 MAC_macedonian_airfields:0 "Macedonian Airfields"
 MAC_macedonian_airfields_desc:0 "Modern war requires modern airfields. Construct air bases at Solun and Skopje — paved runways, hangars, fuel depots. Macedonian wings need Macedonian nests."
 MAC_gateway_aegean:0 "Gateway to the Aegean"
 MAC_gateway_aegean_desc:0 "Solun — the White Tower, the great port, the capital — is Macedonia's gift to the world. Five new dockyards. Modernised port facilities. The Aegean gateway stands open for trade and ready for war."
 MAC_premium_tobacco:0 "Premium Macedonian Tobacco"
 MAC_premium_tobacco_desc:0 "Macedonian tobacco has been prized since Ottoman times — the finest leaf between Vienna and Cairo. Invest in cultivation. Expand production. The world wants what Macedonia grows."
 MAC_tkp_monopoly_focus:0 "Tutunski Kombinat Prilep"
 MAC_tkp_monopoly_focus_desc:0 "TKP — the Prilep Tobacco Combine — has processed Macedonian tobacco since 1873. Grant TKP the state monopoly. Centralise production, standardise quality, and let the world know: Macedonian tobacco means excellence."
 MAC_tobacco_workers:0 "The Tobacco Workers' Union"
 MAC_tobacco_workers_desc:0 "Thousands of Macedonian families depend on tobacco for their livelihood. Recognise the Tobacco Workers' Union. Improve wages and conditions. A contented countryside is a stable countryside — and the army always needs more recruits."
 MAC_berlin_tobacco:0 "The Berlin Tobacco Agreement"
 MAC_berlin_tobacco_desc:0 "Germany is the largest importer of Macedonian tobacco — the Wehrmacht's soldiers smoke Prilep leaf in their rations. Formalise the relationship. A trade agreement with Berlin brings hard currency and political goodwill."
 MAC_quality_brand:0 "Macedonian Quality Brand"
 MAC_quality_brand_desc:0 "Establish a national quality standard — the 'Macedonian Sun' brand. Premium pricing for premium leaf. From corner shops in London to cafés in Vienna, the Sun label commands respect."
 MAC_balkan_cigarette:0 "The Balkan Cigarette"
 MAC_balkan_cigarette_desc:0 "From Vienna to Cairo — the finest cigarette in the Balkans is Macedonian. The Balkan Cigarette dominates the regional market. Neighbours who trade together are less likely to fight together. Usually."
 MAC_macedonian_medicine:0 "Macedonian Medicine"
 MAC_macedonian_medicine_desc:0 "In 1936, a new pharmaceutical company is founded in Skopje: Alkaloid. Its public mission is to produce medicines from Macedonia's natural resources. Its private potential is considerably larger. Research, refine, distribute — Macedonian medicine for Macedonian health."
 MAC_macedonian_poppy_focus:0 "The Macedonian Poppy"
 MAC_macedonian_poppy_focus_desc:0 "Macedonia's mountain valleys produce opium of exceptional quality — a legacy of Ottoman agriculture that no government has ever formally acknowledged. Formalise cultivation. The poppy is a crop. A very valuable crop."
 MAC_alkaloid_labs:0 "Alkaloid Research Laboratories"
 MAC_alkaloid_labs_desc:0 "Alkaloid expands beyond simple extraction into genuine pharmaceutical research. New laboratories. New chemists. A dedicated research slot for the republic's brightest scientific minds."
 MAC_quiet_harbours:0 "Quiet Harbours"
 MAC_quiet_harbours_desc:0 "Solun's less visible port facilities handle cargo that doesn't appear on customs manifests."
 MAC_powder_trail:0 "The Powder Trail"
 MAC_powder_trail_desc:0 "From Solun to Marseille. From Marseille to the parlours of Europe. Macedonian opium finds its way into the continent's veins. Revenue pours in. So does corruption — especially if Alkaloid's legitimate pharmaceutical operations are running alongside. The two faces of Macedonian medicine are becoming harder to reconcile."
 MAC_opium_diplomacy_focus:0 "Opium Diplomacy"
 MAC_opium_diplomacy_focus_desc:0 "Opium is not merely a commodity — it is leverage. Establish the networks that turn Macedonian poppies into political influence. Every addict in a foreign uniform is an asset. Every dependency is a debt."
 MAC_pharma_purity_cap:0 "Pharmaceutical Purity"
 MAC_pharma_purity_cap_desc:0 "Choose the legitimate path. Alkaloid produces ONLY pharmaceutical-grade medicines — no grey market, no smuggling, no dependency. Western approval. Clean hands. The poppy fields are shut down, the quiet harbours closed. Macedonia will be a healer, not a dealer."
 MAC_opium_empire_cap:0 "The Opium Empire"
 MAC_opium_empire_cap_desc:0 "From Solun to every European capital — the poppy empire generates vast revenue and political leverage."
 MAC_shield_of_albania:0 "The Shield of Albania"
 MAC_shield_of_albania_desc:0 "Albania is small, threatened, and genuinely friendly. Italy eyes Tirana with undisguised hunger. Macedonia can offer what Rome cannot: partnership without domination. Guarantee Albanian independence and establish a permanent defensive relationship."
 MAC_court_albania:0 "Court Albania"
 MAC_court_albania_desc:0 "Albania is the most natural ally in the Balkans. Small. Threatened by Italy. Suspicious of Yugoslavia. Warm toward Macedonia. Extend the hand of friendship — trade agreements, cultural exchanges, and a shared understanding that small nations must stand together."
 MAC_liberate_montenegro:0 "Liberate Montenegro"
 MAC_liberate_montenegro_desc:0 "Montenegro — a historic Balkan kingdom now swallowed by Yugoslavia — deserves its own destiny. Macedonia will champion Montenegrin sovereignty. If Belgrade refuses, Macedonia may need to enforce the will of the Montenegrin people."
 MAC_woo_romania:0 "Woo Romania"
 MAC_woo_romania_desc:0 "Romania is the prize — large enough to matter in any Balkan alliance, hesitant but reachable. A mutual non-aggression pact and trade agreement would lay the foundation for something greater."
 MAC_balkan_federation:0 "The Balkan Federation"
 MAC_balkan_federation_desc:0 "From Solun, a new alliance is proclaimed: the Balkan Federation. Small nations standing together against the great powers. Albania is the first member. Montenegro and Romania are invited. The Balkans will not be carved up by Rome, Berlin, or Moscow — not while Macedonia leads."
 MAC_western_alignment:0 "Western Alignment"
 MAC_western_alignment_desc:0 "Britain and France are the established democracies. They guarantee our independence, and we share their values. Align with the Western powers — trade, diplomatic support, and the shield of the world's greatest navies."
 MAC_german_partnership:0 "German Partnership"
 MAC_german_partnership_desc:0 "Germany is rising. The Reich offers trade, technology, and the promise of a new European order. Berlin sees Macedonia's strategic position — the Aegean port, the Balkan corridor. A partnership with Germany is risky. But so is being Germany's enemy."
 MAC_soviet_embrace:0 "Soviet Embrace"
 MAC_soviet_embrace_desc:0 "The Soviet Union is the fatherland of the workers. Moscow offers fraternal support to any nation that embraces the communist path. Trade. Military advisors. The Red Army's shadow falls long across the Balkans — and it could fall on Macedonia's side."
 MAC_eternal_independence:0 "Eternal Independence"
 MAC_eternal_independence_desc:0 "Macedonia bows to no foreign power. Not London. Not Berlin. Not Moscow. The republic stands alone — neutral, armed, sovereign. 'We do not bow.' Eternal independence is Delčevism's core tenet made permanent policy."
 MAC_aegean_macedonia_fascist:0 "Aegean Macedonia"
 MAC_aegean_macedonia_fascist_desc:0 "Upper Bistrica — the Aegean flank — is held by Greece. The Greeks abandoned us in 1913. They do not deserve a single Macedonian village. Present Athens with a demand they cannot refuse — backed by the full strength of the Macedonian army."
 MAC_pirin_macedonia_fascist:0 "Pirin Macedonia"
 MAC_pirin_macedonia_fascist_desc:0 "Pirin — the eastern mountains — is held by Bulgaria. The Bulgarians invaded twice and lost twice. Now we return the favour. Sofia will surrender what it stole, or it will be taken."
 MAC_unified_macedonia_fascist:0 "Unified Macedonia"
 MAC_unified_macedonia_fascist_desc:0 "All Macedonian lands — from the Aegean to Pirin, from Pogradec to Solun — will be united under one flag. The Vergina Sun will fly over every Macedonian village. By negotiation if possible. By force if necessary."
 MAC_demand_pirin:0 "Demand Pirin"
 MAC_demand_pirin_desc:0 "Bulgaria holds Pirin — Macedonian land, Macedonian people. Present Sofia with an ultimatum: cede the territory peacefully, or face the consequences. Military exercises on the border will underscore the point."
 MAC_demand_upper_bistrica:0 "Demand Upper Bistrica"
 MAC_demand_upper_bistrica_desc:0 "Greece holds Upper Bistrica — the Aegean flank of the Macedonian homeland. Present Athens with an ultimatum: cede the territory peacefully, or face the Macedonian army."
 MAC_unified_macedonia_na:0 "Unified Macedonia"
 MAC_unified_macedonia_na_desc:0 "Albania holds Pogradec — the western frontier. The Albanians are friends, but friends do not hold Macedonian land. Present Tirana with the final demand. The republic's borders will be made whole."
 MAC_balkan_conference_dem:0 "The Balkan Conference"
 MAC_balkan_conference_dem_desc:0 "Territorial disputes need not be resolved by war. Petition Britain and France to mediate a Balkan Conference — a gathering of regional powers to peacefully resolve Macedonia's legitimate territorial claims. Diplomacy before destruction."
 MAC_aegean_plebiscite:0 "Aegean Plebiscite"
 MAC_aegean_plebiscite_desc:0 "The people of Upper Bistrica — Macedonians all — deserve the right to determine their own destiny. Demand a plebiscite under international supervision. If Greece refuses, the world will see their hypocrisy."
 MAC_pirin_plebiscite:0 "Pirin Plebiscite"
 MAC_pirin_plebiscite_desc:0 "The people of Pirin have lived under Bulgarian rule since 1913. Demand a plebiscite. Let them choose — Bulgaria or Macedonia. If Sofia refuses, the democratic world will note who denies self-determination."
 MAC_balkan_solidarity:0 "Balkan Solidarity"
 MAC_balkan_solidarity_desc:0 "Gjorche Petrov's vision: not conquest, but cooperation. Not irredentism, but solidarity. Form the Balkan Solidarity Pact — a defensive alliance of small democracies. Albania. Romania. Macedonia. Standing together, not as conquerors, but as comrades."
 MAC_comrades_across_border:0 "Comrades Across the Border"
 MAC_comrades_across_border_desc:0 "The workers and peasants of Bulgaria and Greece are not our enemies — they are our comrades, oppressed by the same capitalist forces. Extend the hand of fraternal solidarity. Support communist partisans across the border."
 MAC_peoples_macedonia:0 "People's Macedonia"
 MAC_peoples_macedonia_desc:0 "The revolution cannot stop at Macedonia's borders. Support the establishment of people's republics in the Balkans. When Bulgaria and Greece are ruled by the workers, territorial claims become irrelevant — all people's republics are one."
 MAC_united_republic:0 "United Republic"
 MAC_united_republic_desc:0 "The Balkan People's Republics — united in communism, united in solidarity. The old borders of kings and capitalists will dissolve. The people of the Balkans will stand together as one."
 MAC_vergina_museum:0 "The Vergina Museum"
 MAC_vergina_museum_desc:0 "A world-class museum housing the treasures of ancient Macedonia — the tomb of Philip II, the golden larnax, the Vergina Sun itself."
 MAC_alexander_library:0 "Alexander's Library"
 MAC_alexander_library_desc:0 "The national library of Macedonia — repository of knowledge and engine of scientific progress."
 MAC_festival_sun:0 "Festival of the Sun"
 MAC_festival_sun_desc:0 "An annual national celebration of Macedonian culture, history, and identity. The nation celebrates itself."
 MAC_philip_monument:0 "The Philip II Monument"
 MAC_philip_monument_desc:0 "A monumental statue of the king who unified ancient Macedonia stands in Solun's main square."
 MAC_white_tower_restoration:0 "The White Tower Restoration"
 MAC_white_tower_restoration_desc:0 "The White Tower — Solun's iconic waterfront landmark — has stood since Ottoman times. Restore it as a museum of Macedonian history. Ships entering the Aegean port will see the restored tower and know: this is Macedonia."
 MAC_alexander_airways:0 "Macedonian Alexander Airways"
 MAC_alexander_airways_desc:0 "The national airline — connecting Solun to Europe, building aviation expertise and prestige."
 MAC_vergina_phalanx:0 "The Vergina Phalanx"
 MAC_vergina_phalanx_desc:0 "The army's elite infantry tradition — named for the ancient Macedonian phalanx of Philip and Alexander."
 MAC_macedonia_eternal:0 "Macedonia Eternal"
 MAC_macedonia_eternal_desc:0 "The Vergina Sun — adopted in 1927 — has flown for nine years. It will fly for nine hundred more. Macedonia Eternal: the capstone of the cultural heritage tree. The nation's identity is not merely asserted. It is celebrated. It is permanent. It is eternal."
 MAC_macedonian_rakija:0 "Macedonian Rakija"
 MAC_macedonian_rakija_desc:0 "Every Macedonian village has a still. Every family has a recipe — plum, grape, apricot, passed down through generations. Rakija is not merely a drink. It is liquid heritage. Commercialise production without losing the soul of the thing. The world deserves to taste Macedonia's spirit."
 MAC_state_rakija_monopoly:0 "State Rakija Monopoly"
 MAC_state_rakija_monopoly_desc:0 "Standardise. Regulate. Export. The State Rakija Monopoly ensures every bottle bearing the Vergina Sun meets Macedonian standards of excellence. From village stills to international markets — Macedonian rakija takes its place alongside Scotch whisky and French cognac."
 MAC_balkan_spirit_cap:0 "The Balkan Spirit"
 MAC_balkan_spirit_cap_desc:0 "From Solun to Belgrade, from Sofia to Bucharest — the finest spirit in the Balkans is Macedonian. Rakija becomes a diplomatic tool as much as an economic one. Every Balkan neighbour that trades in Macedonian rakija is a neighbour less likely to fight. Usually."
