 # Historical Legacy Focuses
 MAC_historical_legacy:0 "Historical Legacy"
 MAC_historical_legacy_desc:0 "Macedonia's position as a crossroads of empires - from Persians and Romans to Byzantines and Ottomans - has shaped our identity. We must decide how to use this legacy."
 
 MAC_ancient_paeonia:0 "Ancient Paeonian Heritage"
 MAC_ancient_paeonia_desc:0 "Before Philip II and Alexander, our land was the Kingdom of Paeonia. This ancient heritage predates even the glory of Macedon and connects us to the earliest civilizations of the Balkans."
 
 MAC_byzantine_tradition:0 "Byzantine Tradition"
 MAC_byzantine_tradition_desc:0 "For over a millennium, we were part of the Byzantine Empire, the continuation of Rome in the East. This Eastern Roman legacy remains deeply embedded in our culture and Orthodox faith."
 
 MAC_slavic_roots:0 "Slavic Roots"
 MAC_slavic_roots_desc:0 "Since the 6th century CE, Slavic peoples have made these lands their home. This Slavic heritage forms the foundation of modern Macedonian language and identity."
 
 MAC_overcome_ottoman_past:0 "Overcome the Ottoman Past"
 MAC_overcome_ottoman_past_desc:0 "Five hundred years of Ottoman occupation ended only recently. We must overcome this legacy of oppression and build a modern, free nation."
 
 MAC_balkan_wars_lessons:0 "Lessons of the Balkan Wars"
 MAC_balkan_wars_lessons_desc:0 "The Balkan Wars of 1912-1913 determined our borders and taught our soldiers valuable lessons. We must study these conflicts to prepare for future challenges."
 
 MAC_reclaim_heritage:0 "Reclaim Our Heritage"
 MAC_reclaim_heritage_desc:0 "Macedonian lands remain divided among our neighbors. We must reclaim our rightful heritage and unite all Macedonians under one banner."
 
 MAC_alexander_legacy:0 "Alexander's Legacy"
 MAC_alexander_legacy_desc:0 "Alexander the Great built an empire from Greece to India. Some say we are his heirs. Should we reclaim the glory of ancient Macedon and restore our dominion over the Balkans?"
 
