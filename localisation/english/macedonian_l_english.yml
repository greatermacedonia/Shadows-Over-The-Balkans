 #######################
 # INTERNATIONAL EVENTS
 #######################
 
 macedonia_international.1.t:0 "Stalin's Interest."
 macedonia_international.1.d:0 "The Soviet embassy has sent a formal communication. Joseph Stalin himself has taken note of Macedonia's political situation. The General Secretary expresses 'fraternal interest' in our nation's direction.\n\nOur intelligence suggests this is more than diplomatic courtesy. Stalin is assessing whether Macedonia can be brought into the Soviet sphere - or whether we represent a threat to his control of international communism."
 macedonia_international.1.a:0 "Stalin watches everyone."
 macedonia_international.1.a_tt:0 "The USSR takes notice of Macedonia"
 
 macedonia_international.10.t:0 "Stalin's Invitation to Moscow."
 macedonia_international.10.d:0 "A gilded invitation arrives from the Kremlin. Joseph Stalin invites Goce Delčev to Moscow for 'consultations between revolutionary leaders.'\n\nThe invitation is both honor and trap. Stalin wants to assess Delčev personally - to see if the Father of the Nation will bend knee to the USSR, or if he truly means his 'independent path.'\n\nDelčev reads the invitation and laughs: 'Stalin thinks I survived Ottoman rule, Balkan wars, and forty years of revolutionary struggle only to become his puppet? I will go to Moscow. I will meet the man. But I will not kneel.'\n\nIf Delčev goes, it will be historic. Two revolutionary titans, face to face."
 macedonia_international.10.a:0 "Delčev will go to Moscow."
 macedonia_international.10.a_tt:0 "The Father of the Nation meets Stalin as an equal"
 macedonia_international.10.b:0 "Politely decline the invitation."
 macedonia_international.10.b_tt:0 "Avoid the confrontation"
 
 macedonia_international.11.t:0 "Stalin Demands Trotsky."
 macedonia_international.11.d:0 "The Soviet ambassador arrives at the parliament with an ultimatum from Stalin himself:\n\n'The traitor Trotsky shelters in your territory. This is an insult to the Soviet Union and the international proletariat. We demand his immediate extradition to face justice for crimes against the revolution.'\n\nDelčev meets with the ambassador personally:\n\n'Ambassador, I fought for Macedonian independence so that Macedonia would never again bow to foreign demands. Not from the Ottomans. Not from the Great Powers. Not from Stalin. Trotsky is our guest. He stays.'\n\nThe ambassador goes pale: 'Comrade Delčev, you do not understand the consequences-'\n\n'I understand perfectly. Tell Stalin that if he wants Trotsky, he will have to come through Macedonia to get him. And we Macedonians defend our guests.'\n\nStalin will not forget this defiance."
 macedonia_international.11.a:0 "We will not surrender our guest."
 macedonia_international.11.a_tt:0 "Delčev defies Stalin. Relations with USSR collapse."
 macedonia_international.11.b:0 "Extradite Trotsky to avoid Stalin's wrath."
 macedonia_international.11.b_tt:0 "Trotsky is sent to the USSR. Stalin is pleased."
 
 macedonia_international.20.t:0 "Hitler's Interest."
 macedonia_international.20.d:0 "The German Foreign Ministry sends an official communication. The Führer has noted Macedonia's emergence as an independent nation and wishes to establish 'cordial relations.'\n\nThe message is diplomatic, but the subtext is clear: Hitler is assessing the Balkans. He wants to know if Macedonia will align with Germany, resist, or remain neutral.\n\nGerman military observers have already been spotted in Sofia and Belgrade. The Reich is planning something in the region."
 macedonia_international.20.a:0 "Respond politely but noncommittally."
 macedonia_international.20.a_tt:0 "Maintain dialogue with Germany"
 macedonia_international.20.b:0 "Send a cold response."
 macedonia_international.20.b_tt:0 "Signal we will not be Germany's ally"
 
 macedonia_international.21.t:0 "Invitation to Berlin."
 macedonia_international.21.d:0 "Adolf Hitler himself has invited Goce Delčev to Berlin. The invitation is formal, diplomatic, but the intent is clear: Hitler wants to meet the Father of the Nation.\n\nOur ambassador to Germany reports that Hitler is fascinated by Delčev's story - a revolutionary who defied empires and built an independent nation. The Führer sees parallels to his own rise.\n\nDelčev considers the invitation carefully: 'I will go. Not because I admire Hitler - I do not. But because I must see with my own eyes what kind of man threatens Europe. And I will make clear to him that Macedonia is no one's satellite.'\n\nThe meeting will be historic - and dangerous."
 macedonia_international.21.a:0 "Delčev will go to Berlin."
 macedonia_international.21.a_tt:0 "The Father of the Nation meets Hitler - and resists his influence"
 macedonia_international.21.b:0 "Politely decline."
 macedonia_international.21.b_tt:0 "Avoid the meeting"
 
 macedonia_international.30.t:0 "Churchill's Assessment."
 macedonia_international.30.d:0 "Winston Churchill, First Lord of the Admiralty, has written an article for The Times about Goce Delčev and Macedonia. The piece is surprisingly respectful:\n\n'History teaches us that great nations are often born from small beginnings. Macedonia, under the leadership of Goce Delčev, demonstrates that courage and principle matter more than territory or population.\n\nDelčev is no democrat - his 'Delčevism' is something altogether unique, neither communist nor fascist nor liberal. But he is a patriot who has kept his small nation independent when larger powers sought to devour it.\n\nOne might call him the Balkan Washington - a revolutionary who built a nation and then refused to become its tyrant. Whether his experiment survives the coming storm remains to be seen, but it deserves our attention.'\n\nThe article causes a sensation. Churchill's endorsement, however qualified, gives Macedonia international credibility."
 macedonia_international.30.a:0 "The 'Balkan Washington' - we'll take it."
 macedonia_international.30.a_tt:0 "International prestige increases"
 
 macedonia_international.40.t:0 "Boris III's Secret Meeting."
 macedonia_international.40.d:0 "An encrypted message arrives from Sofia. King Boris III of Bulgaria requests a secret meeting with Goce Delčev - away from diplomatic channels, away from his German advisors.\n\nBoris writes personally:\n\n'Comrade Delčev (I use that title with respect, not mockery),\n\nI am a king in title, but increasingly a puppet in practice. Germany tightens its grip on Bulgaria. My people look to Macedonia - a Slavic nation that stands alone and free.\n\nI wish to meet you. Not as king to revolutionary, but as two men who love the Macedonian lands. Perhaps we can find common ground.\n\nYour friend,\nBoris'\n\nDelčev is moved: 'Boris is a good man trapped in a bad situation. I will meet him.'."
 macedonia_international.40.a:0 "Arrange the secret meeting."
 macedonia_international.40.a_tt:0 "Delčev and Boris III forge a personal friendship"
 macedonia_international.40.b:0 "Too risky. Decline."
 macedonia_international.40.b_tt:0 "Avoid potential complications"
 
 macedonia_international.41.t:0 "Peaceful Union?"
 macedonia_international.41.d:0 "King Boris III sends another secret communication. After years of clandestine friendship with Delčev, he makes an extraordinary proposal:\n\n'My friend,\n\nBulgaria and Macedonia are one people divided by history. What if we could unite them - not through conquest, but through voluntary union?\n\nI propose this: I will abdicate. Bulgaria will become a republic. You will lead the unified Macedonian-Bulgarian nation as its founding father. Together, our peoples can face the coming storm.\n\nThis is treason against my own crown. But I care more for my people than my throne. What say you?'\n\nIt is an incredible offer - bloodless unification of Macedonia and Bulgaria under Delčev's leadership."
 macedonia_international.41.a:0 "Propose the union formally."
 macedonia_international.41.a_tt:0 "Bulgaria may peacefully join Macedonia"
 macedonia_international.41.b:0 "Too dangerous. Decline."
 macedonia_international.41.b_tt:0 "Maintain separate nations"
 
 macedonia_international.42.t:0 "Union Proposal from Macedonia."
 macedonia_international.42.d:0 "King Boris III addresses the Bulgarian parliament:\n\n'Representatives of Bulgaria,\n\nI have received a proposal from Goce Delčev of Macedonia. He offers voluntary union - a single Macedonian-Bulgarian republic, preserving both peoples' identities while uniting our strength.\n\nI believe this is our path forward. I am prepared to abdicate my throne if you approve this union. The question is: will Bulgaria join Macedonia as free partners, or will we wait until Hitler makes us his slaves?'\n\nThe parliament is stunned. The king offering to abdicate for union with Macedonia? Unthinkable. Yet... Boris is sincere."
 macedonia_international.42.a:0 "Approve the union!"
 macedonia_international.42.a_tt:0 "Bulgaria peacefully joins Macedonia"
 macedonia_international.42.b:0 "Reject this madness."
 macedonia_international.42.b_tt:0 "Bulgaria remains independent"
 
 macedonia_international.43.t:0 "The Union is Achieved."
 macedonia_international.43.d:0 "Goce Delčev and King Boris III stand together in Skopje's main square. Before a crowd of hundreds of thousands, Boris makes his announcement:\n\n'I, Boris III, King of Bulgaria, do hereby abdicate my throne. From this day, there is no Kingdom of Bulgaria and no Republic of Macedonia - there is only the Macedonian-Bulgarian Republic, united in freedom.'\n\nBoris removes his crown and hands it to Delčev. The Father of the Nation accepts it solemnly, then places it in a museum case.\n\n'This crown belongs to history,' Delčev declares. 'We move forward as equals, as brothers, as free people. Let the world see what Slavic unity looks like when it is chosen, not imposed.'\n\nThe crowd erupts. Church bells ring across the new nation. History has been made."
 macedonia_international.43.a:0 "The Greater Macedonia is born!"
 macedonia_international.43.a_tt:0 "Bulgaria annexed peacefully. Delčev's prestige reaches new heights."
 
 macedonia_international.44.t:0 "Union Rejected."
 macedonia_international.44.d:0 "The Bulgarian parliament votes down the union proposal. Conservative forces, German sympathizers, and traditionalists combine to defeat Boris's radical plan.\n\nBoris sends a private letter to Delčev:\n\n'My friend, I tried. Perhaps history is not ready for our vision. But know this - in my heart, I am Macedonian as much as Bulgarian. If war comes, I will remember our friendship.'\n\nThe opportunity for peaceful union has passed."
 macedonia_international.44.a:0 "A noble attempt."
 macedonia_international.44.a_tt:0 "Relations with Bulgaria remain good"
 
 macedonia_international.50.t:0 "Mussolini's Warning."
 macedonia_international.50.d:0 "The Italian ambassador delivers a message from Benito Mussolini. Il Duce is... displeased.\n\n'Italy has noted Macedonia's expansionist ambitions with concern. Any attempt to claim ancient territories that overlap with Italian interests will be met with immediate consequences. Rome rules the Mediterranean, not Skopje.'\n\nThe warning is blunt. Mussolini fears Macedonia's 'ancient claims' focus might challenge Italian control of Albania or the Adriatic.\n\nDelčev's response is equally blunt: 'Tell Mussolini that Macedonia remembers when Rome conquered us - and when we outlasted Rome. Empires rise and fall. We endure.'."
 macedonia_international.50.a:0 "We will not be intimidated."
 macedonia_international.50.a_tt:0 "Mussolini is warned Macedonia will not back down"
 
 macedonia_international.100.t:0 "The Rise of Delčevism."
 macedonia_international.100.a:0 "Delčev is a threat to international communism!"
 macedonia_international.100.b:0 "Interesting, but irrelevant to Germany's plans."
 macedonia_international.100.c:0 "A curious experiment in the Balkans."
 macedonia_international.100.d:0 "The world takes notice."
 
 macedonia_international.101.t:0 "The Revolutionary Independents."
 macedonia_international.101.a:0 "Crush this Trotskyist heresy!"
 macedonia_international.101.b:0 "Let them weaken the communists."
 macedonia_international.101.c:0 "Concerning, but not an immediate threat."
 macedonia_international.101.d:0 "A new force in world politics."

