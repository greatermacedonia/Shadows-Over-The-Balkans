mac_delcev.21.t:0 "The Pretenders Depart"
mac_delcev.21.d:0 "With Delčev firmly returned to political life, rival factions that once claimed to speak for Macedonia begin to fracture. Some leaders quietly accept retirement; others scheme in the shadows. The state now stands at a crossroads: reconcile the old elite, or break them decisively to secure national unity."
mac_delcev.21.a:0 "The old lion roars, and they scatter."
mac_delcev.21.b:0 "Exile those who refuse to yield."

mac_delcev.22.t:0 "The Delčev Constitution"
mac_delcev.22.d:0 "After weeks of drafting and negotiation, the Assembly proclaims a new constitutional order rooted in Delčevist principles: sovereignty, social justice, and Macedonian self-determination. The republic is reborn under laws meant to outlast both foreign pressure and domestic intrigue."
mac_delcev.22.a:0 "The Delčevist Republic is born!"

macedonia_ancient_legacy.31.t:0 "Macedonian Claims Alarm Athens."
macedonia_ancient_legacy.31.d:0 "Athens condemns Skopje's invocation of ancient Macedonian heritage as a pretext for territorial revision. Greek officials denounce the claims as political myth-making, while public anger rises and relations deteriorate across the border."

macedonia_ancient_legacy.100.t:0 "Ancient Tomb Discovered in Macedonia."
macedonia_ancient_legacy.100.d:0 "Archaeologists in Macedonia report the discovery of a richly furnished royal tomb believed by many to be linked to Philip II. Gold artifacts, ceremonial arms, and funerary regalia have sparked worldwide fascination. Supporters hail it as proof of historical continuity; critics call for caution and further study."

macedonia_trotsky.100.t:0 "The Lion and the Revolutionary."
macedonia_trotsky.100.d:0 "In a meeting already being called historic, Goce Delčev and Leon Trotsky agree on a shared program: revolution without subservience to foreign blocs. Their pact blends Macedonian national emancipation with international socialist strategy, unsettling both Moscow and the Western chancelleries."
macedonia_trotsky.100.a:0 "History witnesses this moment!"
macedonia_trotsky.100.a_tt:0 "§GThe Revolutionary Independents spirit is strengthened.§!\nStability, war support, and political power increase as the alliance inspires supporters at home and abroad."
