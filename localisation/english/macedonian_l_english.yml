 # Ideologies - Delčevism
 delcevism:0 "Delčevism"
 delcevism_noun:0 "Delčevist"
 delcevism_desc:0 "Delčevism represents the revolutionary vision of Goce Delčev: 'Macedonia for the Macedonians.' This unique ideology combines Macedonian nationalism with social progressivism, democratic participation, and fierce independence from foreign powers. Delčevists reject both Western capitalism and Soviet communism, advocating instead for a distinctly Macedonian path based on popular sovereignty, social justice, and armed neutrality."
 
