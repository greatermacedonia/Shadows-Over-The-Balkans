 mac_irredentism.1.t:0 "The Balkan Question"
 mac_irredentism.1.d:0 "For too long, the Macedonian people have been divided. Aegean Macedonia suffers under Greek rule, forcibly Hellenized and denied their heritage. Pirin Macedonia languishes as Bulgaria's forgotten province. Yugoslav Macedonia endures Serbian domination.\n\nOur government must now decide: will we accept this artificial partition, or will we fight to reunite all Macedonians under one flag? The question is not whether we have the right - history grants us that. The question is whether we have the will."
 mac_irredentism.1.a:0 "All Macedonians must be united"
 mac_irredentism.10.t:0 "Claim Aegean Macedonia"
 mac_irredentism.10.d:0 "The government formally declares Macedonia's historical and ethnic claim to Aegean Macedonia - the ancient heartland containing Thessaloniki, Pella, and Vergina. These are not merely territories; they are the birthplace of Alexander the Great, the soul of Macedonian civilization.\n\nGreek officials immediately denounce our claims as 'irredentist aggression.' But we know the truth: Macedonians still live there, speaking our language in secret, preserving our culture despite decades of suppression. The time has come to reclaim our heritage."
 mac_irredentism.10.a:0 "Thessaloniki will be ours"
 mac_irredentism.11.t:0 "Macedonian Subversion in Greece"
 mac_irredentism.11.d:0 "Intelligence reports confirm that Macedonia is actively supporting the Macedonian Liberation Front (MLF) in Aegean Macedonia. Arms shipments cross the border. Propaganda broadcasts reach Macedonian villages. Underground cells organize resistance.\n\nThis is a direct challenge to Greek sovereignty. Our government must respond firmly to this interference in our internal affairs."
 mac_irredentism.11.a:0 "This is intolerable interference"
 mac_irredentism.12.t:0 "War for Aegean Macedonia"
 mac_irredentism.12.d:0 "Diplomatic efforts have failed. Greece refuses to acknowledge the Macedonian population's rights or return our historical territories. Now, only force remains.\n\nOur generals present the war plan for Operation Alexander: simultaneous strikes toward Thessaloniki and the Chalkidiki Peninsula. Veterans of the VMRO campaigns volunteer by the thousands. The people sing revolutionary songs in the streets.\n\nAegean Macedonia will be free, whatever the cost."
 mac_irredentism.12.a:0 "For Greater Macedonia!"
 mac_irredentism.13.t:0 "Aegean Macedonia Liberated"
 mac_irredentism.13.d:0 "Greek forces have retreated. The Vergina Sun banner flies over Thessaloniki for the first time in modern history. Macedonian civilians emerge from hiding, weeping with joy, embracing our liberating soldiers.\n\nIn Pella, the ancient capital, a massive celebration erupts. In Vergina, pilgrims flock to the royal tombs of Philip II. The archaeological treasures of our ancestors are finally in Macedonian hands.\n\nAfter generations of division and oppression, Aegean Macedonia has come home."
 mac_irredentism.13.a:0 "The birthplace of Alexander returns"
 mac_irredentism.20.t:0 "Claim Pirin Macedonia"
 mac_irredentism.20.d:0 "The government formally declares claims to Pirin Macedonia, currently occupied by Bulgaria. The mountainous region has been contested for generations, with Bulgaria insisting the population is 'Western Bulgarian' while we know them to be Macedonian.\n\nTsar Boris III will not surrender this territory willingly. The Bulgarians have historical ties to the region and have invested in its development. But the Macedonian population there yearns for reunification with their true homeland."
 mac_irredentism.20.a:0 "Pirin must return to Macedonia"
 mac_irredentism.21.t:0 "The Macedonian Question - Bulgaria"
 mac_irredentism.21.d:0 "Macedonia has formally claimed Pirin as historically Macedonian territory. Our government must respond to this challenge to Bulgarian sovereignty.\n\nTsar Boris faces a dilemma: Pirin's population does speak a dialect similar to Macedonian, and suppressing their identity could create unrest. But surrendering territory would be political suicide.\n\nSome advisors suggest offering cultural autonomy as a compromise. Others demand we reject Macedonia's claims categorically."
 mac_irredentism.21.a:0 "Offer cultural autonomy for Pirin"
 mac_irredentism.21.b:0 "Pirin is Bulgarian territory"
 mac_irredentism.22.t:0 "War for Pirin Macedonia"
 mac_irredentism.22.d:0 "Bulgaria refuses to negotiate the status of Pirin Macedonia. Tsar Boris has rebuffed all diplomatic overtures, insisting the region is integral Bulgarian territory.\n\nOur military plans Operation Mountain Storm: a campaign to liberate Pirin and bring its Macedonian population home. The terrain is treacherous - high peaks, narrow passes, defendable positions. But our soldiers know these mountains. Many were born there."
 mac_irredentism.22.a:0 "The mountain calls our brothers home"
 mac_irredentism.23.t:0 "Pirin Macedonia Liberated"
 mac_irredentism.23.d:0 "Bulgarian resistance in Pirin has collapsed. Our forces control the mountain passes and valleys. Macedonian villages greet us as liberators, not conquerors.\n\nOld men emerge from homes flying makeshift Macedonian flags hidden for decades. Children sing songs their grandparents taught them in secret. The Macedonian language, suppressed by Bulgarian authorities, rings freely through the mountains.\n\nPirin has returned to the Macedonian fold."
 mac_irredentism.23.a:0 "Pirin returns to the motherland"
 mac_irredentism.30.t:0 "The Vardar Brotherhood"
 mac_irredentism.30.d:0 "For two decades, Vardar Macedonia has languished under Serbian domination within Yugoslavia. The region that should be the heart of a united Macedonia instead serves Belgrade's interests.\n\nOur government now formally declares Macedonia's claim to Vardar Macedonia. We call upon our brothers in the north to remember their true identity, to resist Yugoslav assimilation, to prepare for liberation.\n\nBelgrade will denounce this as interference, but we speak only truth: Macedonians deserve to live in Macedonia, not Yugoslavia."
 mac_irredentism.30.a:0 "Free our Serbian-occupied brothers"
 mac_irredentism.31.t:0 "Macedonian Subversion in Yugoslavia"
 mac_irredentism.31.d:0 "Macedonian agents have infiltrated Vardar Macedonia, spreading separatist propaganda and organizing underground resistance cells. Pamphlets appear overnight in Skopje calling for 'Liberation from Belgrade.' Strikes disrupt factories.\n\nThe Yugoslav government faces a choice: crack down harshly and risk driving neutrals into the separatist camp, or show weakness that might embolden other minorities. Either way, Macedonia's interference cannot go unanswered."
 mac_irredentism.31.a:0 "Suppress the Macedonian separatists"
 mac_irredentism.32.t:0 "War for Vardar Macedonia"
 mac_irredentism.32.d:0 "Yugoslavia refuses to negotiate the status of Vardar Macedonia. Belgrade insists the region is an integral part of the Yugoslav state, dismissing Macedonian identity as 'regional Serbian dialect.'\n\nOur military plans Operation Vardar: a campaign to liberate the north and free our brothers from Serbian domination. Many of our officers were born in Vardar Macedonia - this is personal for them. The army's morale has never been higher."
 mac_irredentism.32.a:0 "Liberate our Vardar brothers!"
 mac_irredentism.33.t:0 "Vardar Macedonia Liberated"
 mac_irredentism.33.d:0 "Yugoslav forces have withdrawn from Vardar Macedonia. After two decades of Serbian rule, the region is finally free. In Skopje, a massive crowd gathers to watch the Yugoslav flag lowered and the Macedonian Vergina Sun raised.\n\nMacedonians emerge from hiding to embrace relatives they haven't seen in years. Libraries open archives of Macedonian-language books confiscated by Yugoslav authorities. Schools begin teaching Macedonian history, not Serbian propaganda.\n\nThe Serbian yoke is broken. Vardar belongs to Macedonia."
 mac_irredentism.33.a:0 "The Serbian yoke is broken"
