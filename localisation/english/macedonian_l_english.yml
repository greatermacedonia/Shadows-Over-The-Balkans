 # Decision Categories
 MAC_territorial_demands:0 "Territorial Demands"
 MAC_territorial_demands_desc:0 "Macedonia has legitimate claims to territories inhabited by ethnic Macedonians. Through diplomatic pressure or military force, we can reclaim these historic lands."
 
 # Territorial Demand Decisions
 MAC_demand_thessaloniki:0 "Demand Thessaloniki"
 MAC_demand_thessaloniki_desc:0 "Thessaloniki (Solun) is the historic capital of Macedonia. We must reclaim this jewel of the Aegean."
 MAC_demand_thessaloniki_tt:0 "Greece will be presented with our demand for Thessaloniki and Central Macedonia."
 
 MAC_demand_trgovishte:0 "Demand Trgovishte"
 MAC_demand_trgovishte_desc:0 "The Trgovishte region in southern Serbia is home to ethnic Macedonians who have suffered under Yugoslav rule. We must demand their liberation."
 MAC_demand_trgovishte_tt:0 "Yugoslavia will be presented with our demand for Trgovishte."

 MAC_demand_korce:0 "Demand Korce"
 MAC_demand_korce_desc:0 "The Korce region of Albania contains a significant Macedonian population. We should demand Albania cede this territory."
 MAC_demand_korce_tt:0 "Albania will be presented with our demand for Korce."

 MAC_demand_pirin:0 "Demand Pirin Macedonia"
 MAC_demand_pirin_desc:0 "Pirin Macedonia is inhabited by ethnic Macedonians who have been oppressed under Bulgarian rule. Their liberation is our duty."
 MAC_demand_pirin_tt:0 "Bulgaria will be presented with our demand for Pirin Macedonia."
 
 # Territorial Demand Events - Greece (Thessaloniki)
 macedonia_demands.2.t:0 "Macedonia Demands Thessaloniki."
 macedonia_demands.2.d:0 "Macedonia now demands we surrender Thessaloniki and Central Macedonia itself! This is the historic heart of Greek Macedonia and its second-largest city. To surrender it would be unthinkable."
 macedonia_demands.2.a:0 "We must bow to their demands..."
 macedonia_demands.2.b:0 "Never! Thessaloniki is Greek!"
 
 macedonia_demands.8.t:0 "Greece Surrenders Thessaloniki."
 macedonia_demands.8.d:0 "Against all odds, Greece has capitulated to our demands. Thessaloniki, the jewel of the Aegean and historic capital of Macedonia, has been returned to Macedonian control!"
 macedonia_demands.8.a:0 "Solun is Macedonian once more!"
 
 macedonia_demands.9.t:0 "Greece Refuses to Surrender Thessaloniki."
 macedonia_demands.9.d:0 "The Greek government has refused to surrender Thessaloniki. If we want this historic city, we will have to take it by force."
 macedonia_demands.9.a:0 "Prepare for war!"
 
# Territorial Demand Events - Yugoslavia (Trgovishte)
 macedonia_demands.3.t:0 "Macedonia Demands Trgovishte."
 macedonia_demands.3.d:0 "The Macedonian government has delivered an ultimatum demanding we cede the Trgovishte region. They claim this territory as part of historic Greater Macedonia and argue the local Macedonian population has been oppressed under Serbian rule."
 macedonia_demands.3.a:0 "We cannot afford a war. Give them Trgovishte."
 macedonia_demands.3.b:0 "Trgovishte is Yugoslav territory!"

 macedonia_demands.10.t:0 "Yugoslavia Cedes Trgovishte."
 macedonia_demands.10.d:0 "The Yugoslav government has agreed to our demands. Trgovishte is now part of Greater Macedonia!"
 macedonia_demands.10.a:0 "Another victory for Greater Macedonia!"

 macedonia_demands.11.t:0 "Yugoslavia Refuses Our Demands."
 macedonia_demands.11.d:0 "Yugoslavia has rejected our demands for Trgovishte. We must now consider military options."
 macedonia_demands.11.a:0 "They will regret this!"
 
 # Territorial Demand Events - Albania (Korce)
 macedonia_demands.6.t:0 "Macedonia Demands Korce."
 macedonia_demands.6.d:0 "The Macedonian government has issued an ultimatum demanding we cede the Korce region. They claim this territory contains a significant Macedonian population that desires reunification with their compatriots."
 macedonia_demands.6.a:0 "We are too weak to resist. Accept their demands."
 macedonia_demands.6.b:0 "Albania will not yield!"

 macedonia_demands.12.t:0 "Albania Surrenders Korce."
 macedonia_demands.12.d:0 "Albania has agreed to our demands. The Korce region is now part of Greater Macedonia!"
 macedonia_demands.12.a:0 "The Korce region joins the motherland!"

 macedonia_demands.13.t:0 "Albania Defies Our Demands."
 macedonia_demands.13.d:0 "Albania has refused to surrender the Korce region. War seems inevitable."
 macedonia_demands.13.a:0 "Mobilize the army!"
 
 # Territorial Demand Events - Bulgaria (Pirin)
 macedonia_demands.5.t:0 "Macedonia Demands Pirin Macedonia."
 macedonia_demands.5.d:0 "The Macedonian government has delivered an ultimatum: surrender Pirin Macedonia or face war. They claim this region is inhabited by ethnic Macedonians who have been oppressed under Bulgarian rule. This is Bulgarian territory, won in the Balkan Wars!"
 macedonia_demands.5.a:0 "We cannot win a war against them. Surrender Pirin."
 macedonia_demands.5.b:0 "Pirin Macedonia is Bulgarian!"
 
 macedonia_demands.14.t:0 "Bulgaria Surrenders Pirin Macedonia."
 macedonia_demands.14.d:0 "Bulgaria has agreed to our demands! Pirin Macedonia, the last of the divided Macedonian lands, has been reunited with the motherland!"
 macedonia_demands.14.a:0 "All Macedonians are united!"
 
 macedonia_demands.15.t:0 "Bulgaria Refuses Our Demands."
 macedonia_demands.15.d:0 "Bulgaria has rejected our demands for Pirin Macedonia. They will pay for this insult with blood."
 macedonia_demands.15.a:0 "War it is!"
 
