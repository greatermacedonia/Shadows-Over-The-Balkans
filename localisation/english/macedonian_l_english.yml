 MAC_discover_royal_tombs_desc:0 "At Vergina lies the tomb of Philip II, father of Alexander. Discovering these royal burial sites will not only validate our historical claims but also unlock the ability to demand these sacred lands from Greece."
 MAC_discover_amphipolis_desc:0 "Amphipolis was one of ancient Macedonia's greatest cities, known for its gold mines and strategic location. Excavating this site will prove our heritage and strengthen our economic position."
 MAC_aristotles_birthplace_desc:0 "Aristotle, the greatest mind of antiquity, was born in Stageira in Chalkidiki. By establishing an academy in his honor, we connect ourselves to the philosophical tradition of ancient Macedonia."
 MAC_persian_gates_desc:0 "Alexander's conquests took him through the Persian Gates to the heart of the Achaemenid Empire. By invoking this legacy, we establish our claim to continue his eastern campaigns."
 MAC_egyptian_crown_desc:0 "Alexander founded Alexandria and was crowned Pharaoh of Egypt. This historical precedent gives us the moral authority to pursue our ambitions in the Mediterranean."
 MAC_indian_campaign_desc:0 "Alexander reached the Indus River before his army refused to go further. We honor his ambition and prepare our forces to surpass even his achievements."
 MAC_treasure_of_philip_desc:0 "Beneath the earth at Vergina lies the tomb of Philip II, father of Alexander. Within it rests unimaginable wealth - gold, artifacts, and the very symbol of Macedonian greatness. This discovery will fund our nation and inspire our people."
 MAC_library_of_aristotle_desc:0 "Aristotle, the greatest mind of antiquity, was born in Chalkidiki. Somewhere in these hills, his lost writings await discovery - knowledge that could advance our nation by decades."
 MAC_alexanders_armor_desc:0 "The ceremonial armor of Alexander the Great has been lost for two millennia. But our archaeologists believe they know where to look. Whoever wears this armor will inherit the conqueror's spirit."
 MAC_prophecy_basil_desc:0 "An ancient scroll from the time of Emperor Basil II prophesies the restoration of a Macedonian empire. Whether divinely inspired or propaganda matters not - the people believe, and belief creates power."
 MAC_foreign_policy_direction_desc:0 "With internal stability achieved, we must now determine Macedonia's place in the world. Shall we align with the great powers, or forge our own independent path?"
 MAC_eternal_independence_desc:0 "We bend the knee to no empire. Macedonia shall remain independent, allied to none, beholden to none. Our mountains are our fortress, our people our army."
 MAC_the_balkan_question_desc:0 "For too long, Macedonia has been divided between foreign oppressors. Greek Macedonia, Bulgarian Macedonia, Yugoslav Macedonia - all are rightfully ours. The time has come to address this historical injustice through diplomatic pressure and territorial demands."
 MAC_remember_aegean_macedonia_desc:0 "Our brothers in Aegean Macedonia suffer under Greek occupation. Thessaloniki, Pella, Vergina - these are Macedonian cities. We must launch a propaganda campaign to prepare the way for their liberation."
 MAC_diplomatic_pressure_greece_desc:0 "With underground support established and international awareness raised, we are now positioned to issue formal diplomatic demands to Greece. The time for negotiation has come."
 MAC_diplomatic_pressure_bulgaria_desc:0 "The Pirin underground is ready. Public opinion favors our cause. Now we can formally demand that Bulgaria return Pirin Macedonia to its rightful owners."
 MAC_diplomatic_pressure_yugoslavia_desc:0 "Yugoslav authority in the Vardar region has been undermined by our efforts. The time is ripe to issue an ultimatum - give us our lands peacefully, or face the consequences."
 MAC_greater_macedonia_realized_desc:0 "After years of struggle, all Macedonian lands are finally united under one banner. The dream our fathers died for is fulfilled. Greater Macedonia stands eternal."
 MAC_whispers_from_tikves_desc:0 "Goce Delčev, the father of our nation, watches from his estate in Tikveš. Though he fought for Macedonia's freedom and miraculously survived his injuries in 1903, he has remained in retirement. But the old lion may yet roar again."
 MAC_macedonian_dinar_desc:0 "A nation must control its own currency. The Macedonian dinar will replace foreign currencies, giving us economic independence and national pride."
