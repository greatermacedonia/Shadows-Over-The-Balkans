 mac_diplomacy.10.t:0 "Approach to the Western Allies"
 mac_diplomacy.10.d:0 "Our ambassadors in London and Paris have discreetly approached British and French officials regarding closer cooperation. The initial response is cautious but not hostile.\n\nThe Western powers value stability in the Balkans. If we can present ourselves as a bulwark against both communism and fascism, they may welcome a democratic Macedonia into their sphere of influence. But trust must be earned, not demanded."
 mac_diplomacy.10.a:0 "Democracy shall be our foreign policy"
 mac_diplomacy.11.t:0 "Joining the Allies"
 mac_diplomacy.11.d:0 "After months of diplomatic negotiation, Macedonia has been formally invited to join the Allied powers. Our flag will stand alongside Britain, France, and their associates.\n\nThe people celebrate in the streets. Western newspapers call Macedonia 'the democratic beacon of the Balkans.' Military cooperation begins immediately - British advisors arrive to modernize our forces. French investment flows into our economy.\n\nWe have chosen our side in the coming storm."
 mac_diplomacy.11.a:0 "For democracy and freedom!"
 mac_diplomacy.12.t:0 "The Balkan Democratic Federation"
 mac_diplomacy.12.d:0 "Our government has proposed a revolutionary idea to the Western Allies: a Balkan Democratic Federation, uniting Greece, Yugoslavia, Romania, and Macedonia in a federal democratic system.\n\nThe vision is ambitious: a United States of the Balkans, strong enough to resist both German expansion and Soviet subversion. Free trade, mutual defense, shared institutions. An end to centuries of Balkan wars.\n\nIt may be an impossible dream. But then again, so was an independent Macedonia."
 mac_diplomacy.12.a:0 "The Balkans united in freedom!"
 mac_diplomacy.20.t:0 "Appeal to Moscow"
 mac_diplomacy.20.d:0 "The Macedonian Workers' Party has sent a formal delegation to Moscow, requesting Soviet support for our revolutionary government.\n\nThe message to Stalin is clear: Macedonia stands ready to join the international communist movement. We offer a strategic foothold in the Balkans. We promise solidarity with all socialist republics. We seek fraternal assistance from the Soviet Union.\n\nMoscow's response will determine our future."
 mac_diplomacy.20.a:0 "Workers of the world, unite!"
 mac_diplomacy.21.t:0 "Joining the Comintern"
 mac_diplomacy.21.d:0 "Stalin has extended the hand of proletarian brotherhood. Macedonia is welcomed into the Comintern - the Third International - as a full member.\n\nSoviet military advisors arrive on the first train from Moscow. Red Army officers begin reorganizing our forces along Soviet lines. Economic aid pours in - machinery, vehicles, expertise. The hammer and sickle flies alongside the Vergina Sun.\n\nThe revolution has powerful friends now."
 mac_diplomacy.21.a:0 "Glory to the workers' friendship!"
 mac_diplomacy.22.t:0 "Balkan People's Republic"
 mac_diplomacy.22.d:0 "Following extensive discussions in Moscow, Stalin has approved our proposal for a 'Balkan People's Republic' - a socialist federation encompassing Macedonia, Bulgaria, Albania, and potentially Yugoslavia and Greece.\n\nThe plan mirrors Yugoslavia's own federal structure but under direct Soviet guidance. National questions would be resolved through socialist brotherhood. Economic planning would be centralized. Military forces unified.\n\nA red Balkans, from the Adriatic to the Aegean."
 mac_diplomacy.22.a:0 "The red star rises over the Balkans!"
 mac_diplomacy.30.t:0 "Alignment with the Axis"
 mac_diplomacy.30.d:0 "Our VMRO government has begun secret negotiations with Germany and Italy. Mihailov's vision of Greater Macedonia aligns surprisingly well with Axis interests in destabilizing the Balkans.\n\nThe message sent to Berlin and Rome is simple: Macedonia will be a loyal ally. We will support Axis objectives in Greece and Yugoslavia. We ask only for protection and for our territorial claims to be recognized.\n\nMussolini is intrigued. Hitler is calculating. The dance begins."
 mac_diplomacy.30.a:0 "We stand with the strong!"
 mac_diplomacy.31.t:0 "The Rome-Berlin-Skopje Pact"
 mac_diplomacy.31.d:0 "Hitler and Mussolini have agreed to formalize Macedonia's relationship with the Axis. In a ceremony in Rome, the 'Rome-Berlin-Skopje Pact' is signed.\n\nGerman military advisors arrive to modernize our army. Italian engineers improve our infrastructure. Secret protocols guarantee Macedonia territorial gains from Greece and Yugoslavia in the event of an Axis invasion.\n\nWe have made our choice. There is no turning back now."
 mac_diplomacy.31.a:0 "Macedonia joins the Axis!"
 mac_diplomacy.40.t:0 "Balkan Domination"
 mac_diplomacy.40.d:0 "With Axis backing, Macedonian forces have established hegemony over the Balkans. Our armies occupy Athens, Belgrade, Sofia. Greek partisans are suppressed with German efficiency. Yugoslav resistance is crushed with Italian brutality.\n\nThe Balkan Peninsula bows before Macedonia. But this empire is built on foreign bayonets and fascist ideology. We are conquerors, yes - but are we truly free?\n\nHistory will judge whether we chose wisely."
 mac_diplomacy.40.a:0 "All the Balkans acknowledge our power!"
 mac_diplomacy.40.r:0 "Power means nothing without legitimacy"
