 MAC_GATHERING_STORM_DESC:0 "Following the Balkan Wars of 1912-1913, Macedonia has emerged as an independent nation for the first time in centuries. After enduring Persian, Roman, Byzantine, and Ottoman rule, the Macedonian people now control their own destiny. However, the young republic faces enormous challenges: a weak economy damaged by centuries of Ottoman occupation, hostile neighbors with territorial claims, and internal political divisions. With Europe sliding toward another great war, Macedonia must navigate carefully between great powers while building a modern state capable of defending its hard-won independence."

