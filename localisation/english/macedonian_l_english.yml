 # Diplomatic Demand Events (Focus-driven, German Anschluss/Sudetenland pattern)

 # Greece - Demand Aegean Macedonia
 mac_diplomatic_demands.1.t:0 "The Macedonian Ultimatum"
 mac_diplomatic_demands.1.d:0 "The Macedonian government has issued a formal diplomatic ultimatum demanding the immediate cession of Aegean Macedonia — including Thessaloniki and the surrounding region. They claim these territories are historically Macedonian lands and that the ethnic Macedonian population living there desires reunification.\n\nMacedonia's army stands mobilized at our border. Their diplomats make clear this is not a request — it is a demand. If we refuse, they have made thinly veiled threats of military action.\n\nOur generals assess the military situation while our diplomats weigh the consequences of each response."
 mac_diplomatic_demands.1.a:0 "We cannot risk a war. Cede Aegean Macedonia."
 mac_diplomatic_demands.1.b:0 "Aegean Macedonia is Greek! We will defend our territory!"

 mac_diplomatic_demands.2.t:0 "Greece Surrenders Aegean Macedonia!"
 mac_diplomatic_demands.2.d:0 "Faced with our overwhelming diplomatic pressure and military might, the Greek government has capitulated to our demands. Aegean Macedonia — Thessaloniki, Pella, and Vergina — has been peacefully transferred to Macedonian control!\n\nCrowds gather in the streets of Skopje to celebrate this monumental achievement. The Vergina Sun flies over Thessaloniki for the first time in modern history. Our ancient heartland has returned to the motherland without a single shot being fired."
 mac_diplomatic_demands.2.a:0 "The birthplace of Alexander is ours once more!"

 mac_diplomatic_demands.3.t:0 "Greece Rejects Our Demands!"
 mac_diplomatic_demands.3.d:0 "The Greek government has defiantly rejected our ultimatum for Aegean Macedonia. Athens has declared that not one inch of Greek territory will be surrendered to Macedonian irredentism.\n\nGreek forces are mobilizing along our border. International observers warn of imminent conflict. The people demand action — if diplomacy has failed, then the sword must speak."
 mac_diplomatic_demands.3.a:0 "Then we shall take what is rightfully ours by force!"

 # Bulgaria - Demand Pirin Macedonia
 mac_diplomatic_demands.4.t:0 "The Macedonian Ultimatum"
 mac_diplomatic_demands.4.d:0 "The Macedonian government has delivered an ultimatum demanding the immediate cession of Pirin Macedonia. They argue that the region's population is ethnically Macedonian and has been oppressed under Bulgarian rule since the Balkan Wars.\n\nMacedonian troops are massing near the border. Their underground agents have been stirring unrest among the local population. This is a calculated act of diplomatic aggression — backed by the threat of military force.\n\nTsar Boris and his ministers must now decide: concede Pirin to avoid bloodshed, or stand firm and risk war."
 mac_diplomatic_demands.4.a:0 "We cannot afford a war. Surrender Pirin Macedonia."
 mac_diplomatic_demands.4.b:0 "Pirin is Bulgarian! We will fight for every inch!"

 mac_diplomatic_demands.5.t:0 "Bulgaria Surrenders Pirin Macedonia!"
 mac_diplomatic_demands.5.d:0 "Tsar Boris has accepted our demands! Pirin Macedonia, home to thousands of ethnic Macedonians who have suffered under Bulgarian rule, has been peacefully reunited with the motherland.\n\nThe Pirin underground fighters emerge from hiding to welcome our administrators. Church bells ring across the mountain villages. Another piece of Greater Macedonia has been restored."
 mac_diplomatic_demands.5.a:0 "Pirin Macedonia returns to the fold!"

 mac_diplomatic_demands.6.t:0 "Bulgaria Rejects Our Demands!"
 mac_diplomatic_demands.6.d:0 "Bulgaria has rejected our ultimatum for Pirin Macedonia. Sofia has denounced our claims as baseless irredentism and ordered a general mobilization along the Macedonian border.\n\nThe diplomatic path has been exhausted. If we want Pirin Macedonia, we will have to take it by force."
 mac_diplomatic_demands.6.a:0 "Bulgaria will regret this defiance!"

 # Yugoslavia - Demand Vardar Macedonia
 mac_diplomatic_demands.7.t:0 "The Macedonian Ultimatum"
 mac_diplomatic_demands.7.d:0 "The Macedonian government has issued a formal ultimatum demanding the cession of territories in Vardar Macedonia which they claim as historically and ethnically Macedonian. They point to decades of Serbian oppression and forced assimilation as justification for their demands.\n\nMacedonian agents have been undermining our authority in the region for months. Now their army stands ready to enforce what their diplomats demand.\n\nBelgrade faces a difficult choice: yield territory to prevent war, or stand firm against Macedonian expansionism."
 mac_diplomatic_demands.7.a:0 "We cannot fight on another front. Yield to their demands."
 mac_diplomatic_demands.7.b:0 "Yugoslavia will not be dismembered! Prepare for war!"

 mac_diplomatic_demands.8.t:0 "Yugoslavia Cedes Vardar Macedonia!"
 mac_diplomatic_demands.8.d:0 "The Yugoslav government has acquiesced to our demands! Vardar Macedonia — territory that has been under Serbian domination since the Balkan Wars — has been peacefully transferred to Macedonian control.\n\nThe Macedonian population greets our officials with tears of joy. After decades of enforced Serbianization, they can finally speak their language freely and embrace their Macedonian identity."
 mac_diplomatic_demands.8.a:0 "Our brothers in the Vardar are free at last!"

 mac_diplomatic_demands.9.t:0 "Yugoslavia Rejects Our Demands!"
 mac_diplomatic_demands.9.d:0 "Yugoslavia has contemptuously rejected our ultimatum. Belgrade has declared that the 'so-called Macedonian claims' are nothing but naked aggression and has vowed to defend every meter of Yugoslav territory.\n\nWar now seems inevitable. Our people demand that we liberate our brothers from the Serbian yoke."
 mac_diplomatic_demands.9.a:0 "We will liberate Vardar Macedonia by force!"

 # Albania - Demand Korce
 mac_diplomatic_demands.10.t:0 "The Macedonian Ultimatum"
 mac_diplomatic_demands.10.d:0 "The Macedonian government has delivered an ultimatum demanding the cession of the Korce region. They argue that the area contains a significant ethnic Macedonian population that has long desired reunification with Macedonia.\n\nMacedonia's army dwarfs our own. Their agents have been active among the local population for months. This is clearly an act of intimidation — but can we afford to resist?\n\nKing Zog and his ministers must decide: yield Korce to avoid destruction, or stand firm and hope for foreign intervention."
 mac_diplomatic_demands.10.a:0 "We are too small to resist. Surrender Korce."
 mac_diplomatic_demands.10.b:0 "Albania will not be dismembered!"

 mac_diplomatic_demands.11.t:0 "Albania Surrenders Korce!"
 mac_diplomatic_demands.11.d:0 "The Albanian government has capitulated to our demands! The Korce region has been peacefully transferred to Macedonian control.\n\nThe local Macedonian population welcomes our administrators with enthusiasm. Another piece of Greater Macedonia has been restored without bloodshed."
 mac_diplomatic_demands.11.a:0 "Korce joins the motherland!"

 mac_diplomatic_demands.12.t:0 "Albania Rejects Our Demands!"
 mac_diplomatic_demands.12.d:0 "Albania has rejected our ultimatum for the Korce region. Tirana has denounced our claims and is desperately seeking foreign support.\n\nIf we want Korce, we will have to take it by force — though Albania's small army should pose little obstacle."
 mac_diplomatic_demands.12.a:0 "Albania will regret this defiance!"

