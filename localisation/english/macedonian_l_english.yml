 # Historical Characters - Country Leaders
 MAC_metodija_cento:0 "Metodija Andonov-Čento"
 MAC_metodija_cento_desc:0 "President of ASNOM (Anti-Fascist Assembly of the National Liberation of Macedonia) and founding father of modern Macedonian statehood. A teacher and politician who led the movement for Macedonian autonomy."
 
 MAC_dimitar_vlahov:0 "Dimitar Vlahov"
 MAC_dimitar_vlahov_desc:0 "Revolutionary, politician, and academic. A key figure in the Macedonian national movement who advocated for an independent, democratic Macedonia free from foreign domination."
 
 MAC_lazar_kolisevski:0 "Lazar Koliševski"
 MAC_lazar_kolisevski_desc:0 "Communist revolutionary and first President of the Socialist Republic of Macedonia. A partisan hero who fought against fascism and championed workers' rights."
 
 MAC_ivan_mihailov:0 "Ivan Mihailov"
 MAC_ivan_mihailov_desc:0 "Leader of VMRO (Internal Macedonian Revolutionary Organization). A controversial nationalist who fought for Greater Macedonia through revolutionary means."
 
 # Military Leaders
 MAC_petre_siljgo:0 "Petre Šiljgo"
 MAC_petre_siljgo_desc:0 "Partisan commander during World War II. Led guerrilla operations in the Macedonian mountains against Axis occupation forces."
 
 MAC_mihailo_apostolski:0 "Mihailo Apostolski"
 MAC_mihailo_apostolski_desc:0 "Brilliant military strategist and historian. His tactical acumen and scholarly approach to warfare make him an invaluable commander."
 
 MAC_mihajlo_kocev:0 "Mihajlo Kocev"
 MAC_mihajlo_kocev_desc:0 "Macedonian partisan leader and politician. Expert in mountain warfare who used the terrain to devastating effect against occupiers."
 
 MAC_strahil_gigov:0 "Strahil Gigov"
 MAC_strahil_gigov_desc:0 "Partisan hero and military commander. Known for his unwavering determination in defense of Macedonian territory."
 
 MAC_goce_delcev:0 "Goce Delčev"
 MAC_goce_delcev_desc:0 "The most celebrated leader of VMRO and Macedonian revolutionary hero. Born in Kukush, he fought throughout Macedonia including Lerin (Florina) region. His vision of Macedonia for the Macedonians inspired generations. In this timeline, he survived to lead Macedonia's struggle for independence."
 
 # Political Advisors
 MAC_nikola_karev:0 "Nikola Karev"
 MAC_nikola_karev_desc:0 "Leader of the Kruševo Republic (1903). In this alternate history, he survived to guide Macedonia's independence movement with revolutionary zeal."
 
 MAC_krste_misirkov:0 "Krste Misirkov"
 MAC_krste_misirkov_desc:0 "Linguist and founder of the modern Macedonian literary language. His work 'On Macedonian Matters' laid the foundation for Macedonian national identity."
 
 MAC_dame_gruev:0 "Dame Gruev"
 MAC_dame_gruev_desc:0 "One of the founders of VMRO. Master of political intrigue who understood the delicate balance of Balkan politics."
 
 MAC_svetozar_vukmanovic:0 "Svetozar Vukmanović-Tempo"
 MAC_svetozar_vukmanovic_desc:0 "Yugoslav partisan commander who coordinated resistance in Macedonia. Expert in army logistics and regrouping operations."
 
 MAC_hristo_tatarchev:0 "Hristo Tatarchev"
 MAC_hristo_tatarchev_desc:0 "Co-founder of VMRO and military tactician. Specialized in infantry combat and guerrilla warfare."
 
 # Equipment
 infantry_equipment_2_mac:0 "Macedonian Rifle"
 infantry_equipment_2_mac_desc:0 "Improved infantry weapons manufactured in Macedonia."
 
 light_tank_equipment_2_mac:0 "Macedonian Light Tank"
 light_tank_equipment_2_mac_desc:0 "Domestically produced light tank variant."
 
 medium_tank_equipment_2_mac:0 "Macedonian Medium Tank"
 medium_tank_equipment_2_mac_desc:0 "Macedonian-designed medium tank."

 #######################
 # ANCIENT MACEDONIAN LEGACY FOCUSES
 #######################
 
 # Tier 1: Discover the Heritage
 MAC_archaeological_expeditions:0 "Archaeological Expeditions"
 MAC_archaeological_expeditions_desc:0 "Fund excavations across Macedonia to uncover our ancient heritage. The ruins of Philip II and Alexander the Great's empire lie beneath our soil, waiting to be discovered."
 
 MAC_vergina_sun_banner:0 "The Vergina Sun Banner"
 MAC_vergina_sun_banner_desc:0 "Adopt the ancient Vergina Sun - the royal symbol of the Argead dynasty - as our national emblem. This sixteen-pointed star represents our direct connection to Alexander's Macedon."
 
 # Tier 2: The Ancient Claims (Philip II's Empire)
 MAC_claim_pella_vergina:0 "Claim Pella and Vergina"
 MAC_claim_pella_vergina_desc:0 "Pella was the capital of ancient Macedonia, where Alexander was born. Vergina holds the tomb of Philip II. These sacred sites rightfully belong to the Macedonian people."
 
 MAC_claim_amphipolis:0 "Claim Amphipolis"
 MAC_claim_amphipolis_desc:0 "The strategic city of Amphipolis was a jewel of Philip II's kingdom, controlling vital gold and silver mines. We must reclaim this ancient Macedonian stronghold."
 
 MAC_claim_chalkidiki:0 "Claim the Chalkidiki"
 MAC_claim_chalkidiki_desc:0 "The Chalkidiki peninsula, birthplace of Aristotle, tutor to Alexander. This land of philosophers and scholars must return to Macedonian sovereignty."
 
 # Tier 3: Alexander's Conquests
 MAC_persian_gates:0 "The Persian Gates"
 
 MAC_egyptian_crown:0 "The Egyptian Crown"
 
 MAC_indian_campaign:0 "The Indian Campaign"
 
 # Tier 4: The Treasures
 MAC_treasure_philip:0 "Discover the Treasure of Philip II"
 MAC_treasure_philip_desc:0 "Our archaeologists have located the tomb of Philip II at Vergina. The golden larnax, ceremonial armor, and royal treasures within will finance our nation's growth and inspire our people."
 
 MAC_library_aristotle:0 "The Library of Aristotle"
 MAC_library_aristotle_desc:0 "Fragments of Aristotle's lost works have been discovered in ancient Macedonian sites. These philosophical and scientific texts will propel our research capabilities forward."
 
 MAC_alexander_armor:0 "Alexander's Armor"
 MAC_alexander_armor_desc:0 "The ceremonial armor of Alexander the Great, preserved for millennia, has been found. Generals who wear this symbol of conquest are imbued with the spirit of the world's greatest commander."
 
 # Tier 5: The Prophecies
 MAC_prophecy_basil:0 "The Prophecy of Basil II"
 
 MAC_oracle_delphi:0 "The Oracle of Delphi"
 MAC_oracle_delphi_desc:0 "The Oracle of Delphi once proclaimed Alexander would conquer the world. We shall make pilgrimage to this sacred site and seek guidance for Macedonia's future."
 
 MAC_secret_ohrid:0 "The Secret of Ohrid"
 MAC_secret_ohrid_desc:0 "Lake Ohrid, one of Europe's oldest lakes, holds ancient mysteries. Local legends speak of a sunken city beneath its waters - perhaps a key to understanding our true origins."
 
 # Tier 6: Empire Restored
 MAC_alexander_protocol:0 "The Alexander Protocol"
 MAC_alexander_protocol_desc:0 "We hereby proclaim the restoration of Alexander's empire! From Greece to Egypt, from Anatolia to Persia, all lands once ruled by Macedon shall be liberated. The Alexandrian League will unite the ancient world under our banner."
 
 MAC_neo_byzantine:0 "Neo-Byzantine Empire"
 MAC_neo_byzantine_desc:0 "For a thousand years, Byzantine emperors claimed Macedonian heritage. Now we shall reverse the claim - Macedonia will lead a new Byzantine Commonwealth, blending ancient Hellenic culture with Orthodox faith and Slavic strength."
 
 # Tier 7: Ultimate Achievement
 MAC_conquer_constantinople:0 "Conquer Constantinople"
 MAC_conquer_constantinople_desc:0 "Constantinople - the city founded by a Macedonian general (Constantine) after Rome adopted Alexander's imperial model. Capturing this city fulfills the ancient prophecy and makes Macedonia the center of a new empire."
 
 #######################
 # ANCIENT LEGACY IDEAS/SPIRITS
 #######################
 
 MAC_ancient_claims:0 "Ancient Macedonian Claims"
 MAC_ancient_claims_desc:0 "We have adopted the Vergina Sun as our symbol and declared ourselves the true heirs of Philip II and Alexander the Great. The world may scoff, but our people believe in our ancient birthright."
 
 MAC_alexanders_heir:0 "Alexander's Heir"
 MAC_alexanders_heir_desc:0 "Our military commanders wear the ceremonial armor of Alexander the Great, inspiring soldiers with the legend of history's greatest conqueror."
 
 MAC_manifest_destiny:0 "Macedonian Manifest Destiny"
 MAC_manifest_destiny_desc:0 "Ancient prophecies have declared that Macedonia will rise again to dominate the Balkans and beyond. Our people march forward with divine purpose."
 
 MAC_alexandrian_empire:0 "Alexandrian Empire"
 MAC_alexandrian_empire_desc:0 "We have proclaimed the restoration of Alexander's empire. The Alexandrian League will reconquer the ancient world in the name of Macedon!"
 
 MAC_byzantine_legacy:0 "Byzantine Legacy"
 MAC_byzantine_legacy_desc:0 "Blending ancient Macedonian heritage with Byzantine tradition, we lead a new commonwealth of Orthodox nations united under the double-headed eagle and the sun of Vergina."
 
 #######################
 # ANCIENT LEGACY EVENTS
 #######################
 
 macedonia_ancient_legacy.1.t:0 "First Excavations Begin."
 macedonia_ancient_legacy.1.d:0 "Our archaeological teams have begun excavations at sites across Macedonia. Already they report finding pottery fragments, ancient coins, and foundation stones from the classical era. The people watch with growing excitement as our connection to ancient greatness becomes tangible."
 macedonia_ancient_legacy.1.a:0 "Our heritage awakens!"
 
 macedonia_ancient_legacy.2.t:0 "The Vergina Sun Rises."
 macedonia_ancient_legacy.2.d:0 "After months of debate, parliament has voted to adopt the Vergina Sun as our national symbol. The sixteen-pointed starburst, discovered on the golden larnax of Philip II's tomb, now flies on flags across Macedonia. Greece has protested this 'theft of Hellenic heritage,' but our people rejoice in claiming their birthright."
 macedonia_ancient_legacy.2.a:0 "We are the heirs of Alexander!"
 
 macedonia_ancient_legacy.3.t:0 "Claims on Pella and Vergina."
 macedonia_ancient_legacy.3.d:0 "Government officials have formally declared that Pella and Vergina - the capital and royal necropolis of ancient Macedonia - rightfully belong to our nation. These sites, currently under Greek control, are sacred to the Macedonian people. The international community watches nervously as tensions rise."
 macedonia_ancient_legacy.3.a:0 "Philip's tomb calls to us!"
 
 macedonia_ancient_legacy.4.t:0 "The Amphipolis Question."
 macedonia_ancient_legacy.4.d:0 "Amphipolis, the wealthy city that Philip II captured to fund his conquests, remains under foreign occupation. Our historians have published extensive documentation proving Macedonian ownership of this strategic location and its gold mines."
 macedonia_ancient_legacy.4.a:0 "Ancient gold for a new empire!"
 
 macedonia_ancient_legacy.5.t:0 "Aristotle's Homeland."
 macedonia_ancient_legacy.5.d:0 "The Chalkidiki peninsula, birthplace of Aristotle who tutored Alexander, has been claimed as integral Macedonian territory. Our scholars argue that the intellectual foundations of Alexander's conquests came from this region."
 macedonia_ancient_legacy.5.a:0 "Knowledge is power!"
 
 macedonia_ancient_legacy.10.t:0 "The Royal Tomb of Philip II."
 macedonia_ancient_legacy.10.d:0 "Incredible news! Our excavation team has uncovered the intact tomb of Philip II at Vergina! Inside the golden larnax lies a ceremonial oak wreath, weapons, armor, and vast amounts of gold. This treasure will fund our national development while the symbolic value is incalculable. Crowds gather at the site, weeping with joy at this connection to our ancestors."
 macedonia_ancient_legacy.10.a:0 "The king's gold will build our future!"
 
 macedonia_ancient_legacy.11.t:0 "Aristotle's Lost Texts."
 macedonia_ancient_legacy.11.d:0 "Scholars have discovered fragments of Aristotle's lost works in an ancient library. His treatises on natural philosophy, mathematics, and governance - thought lost forever - will revolutionize our scientific understanding."
 macedonia_ancient_legacy.11.a:0 "Ancient wisdom guides us!"
 
 macedonia_ancient_legacy.12.t:0 "The Armor of the Conqueror."
 macedonia_ancient_legacy.12.d:0 "Museum curators, examining the Vergina tomb artifacts, have identified ceremonial armor believed to have belonged to Alexander himself. When our generals don this armor, they report feeling the presence of history's greatest military mind guiding their strategies."
 macedonia_ancient_legacy.12.a:0 "Alexander's spirit marches with us!"
 
 macedonia_ancient_legacy.20.t:0 "The Prophecy of Basil II."
 macedonia_ancient_legacy.20.d:0 "A monk at Ohrid has revealed an ancient text - a prophecy attributed to Byzantine Emperor Basil II the 'Bulgar-Slayer': 'When the sun of Vergina rises from slumber, the children of Philip shall reclaim the Balkans, and the eagles of Rome shall bow before them.' The text's authenticity is debated, but the people believe."
 macedonia_ancient_legacy.20.a:0 "Destiny is manifest!"
 
 macedonia_ancient_legacy.21.t:0 "Pilgrimage to Delphi."
 macedonia_ancient_legacy.21.d:0 "Our delegation has visited the ruins of Delphi, where the Oracle once told Philip II that his son would conquer the world. Standing in this sacred place, we must choose how to interpret the ancient wisdom."
 macedonia_ancient_legacy.21.a:0 "Military conquest is our destiny! (Choose War)."
 macedonia_ancient_legacy.21.b:0 "Economic dominance is the path! (Choose Economics)."
 macedonia_ancient_legacy.21.c:0 "Diplomatic unification is wisest! (Choose Diplomacy)."
 
 macedonia_ancient_legacy.22.t:0 "The Secret Beneath Lake Ohrid."
 macedonia_ancient_legacy.22.d:0 "Divers exploring Lake Ohrid have discovered submerged ruins of an ancient settlement. Carbon dating suggests it predates recorded history. Could this be evidence of a civilization that predates both Greek and Slavic presence in the Balkans? We must decide how to interpret this discovery."
 macedonia_ancient_legacy.22.a:0 "We are the original Macedonians - neither Greek nor Slav! (Unique identity)."
 macedonia_ancient_legacy.22.b:0 "This proves our Hellenic heritage! (Pro-Greek interpretation)."
 macedonia_ancient_legacy.22.c:0 "This proves our Slavic roots! (Pro-Slavic interpretation)."
 
 macedonia_ancient_legacy.30.t:0 "Macedonia Proclaims Byzantine Commonwealth."
 macedonia_ancient_legacy.30.d:0 "The Macedonian government has announced the formation of a 'Byzantine Commonwealth' - a faction claiming to inherit the legacy of both ancient Macedon and medieval Byzantium. They invite all Orthodox nations to join this new alliance."
 macedonia_ancient_legacy.30.a:0 "Interesting..."

 #######################
 # INTERNAL POLITICS FOCUSES
 #######################
 
 # Tier 0
 MAC_succession_question:0 "The Succession Question"
 MAC_succession_question_desc:0 "President Karev's sudden death has created a power vacuum. Four factions circle: Mihailov's VMRO wants military expansion, Vlahov's Democrats seek Western reform, Koliševski's Communists call for revolution, and Čento's Centrists try to hold the center. We must navigate this crisis carefully."
 
 # Tier 1 - Crisis Choices
 MAC_vmro_conspiracy:0 "The VMRO Conspiracy"
 MAC_vmro_conspiracy_desc:0 "Ivan Mihailov plots a military coup with sympathetic officers. His vision: restore VMRO's revolutionary glory and reunite all Macedonian lands by force. A dangerous gamble that could plunge us into civil war or regional conflict."
 
 MAC_workers_strike:0 "The Workers' Strike"
 MAC_workers_strike_desc:0 "Lazar Koliševski has organized a general strike in Skopje. Workers occupy factories, demanding a People's Republic and Comintern alignment. Red flags fly from the mills. We must decide how to respond to this revolutionary challenge."
 
 MAC_balkan_conference:0 "The Balkan Conference"
 MAC_balkan_conference_desc:0 "Dimitar Vlahov proposes a constitutional convention to establish parliamentary democracy. He invites Balkan observers to witness Macedonia's democratic transformation. Can democracy take root in this volatile region?"
 
 # Tier 2 - VMRO Fascist Path
 MAC_night_long_knives:0 "The Night of Long Knives"
 MAC_night_long_knives_desc:0 "Mihailov's forces will strike in a coordinated midnight purge. Democratic and communist leaders will be arrested or driven into exile. VMRO will rule through a military council, beginning the 'National Revolution.'"
 
 MAC_recall_komitadjis:0 "Recall the Komitadjis"
 MAC_recall_komitadjis_desc:0 "Activate VMRO's legendary paramilitary forces - the komitadjis who fought Turkish and Bulgarian oppression. These guerrilla veterans will form elite mountain warfare units loyal to the revolution."
 
 MAC_greater_macedonia_manifesto:0 "Greater Macedonia Manifesto"
 MAC_greater_macedonia_manifesto_desc:0 "Publicly declare our claims to ALL Macedonian territories: Aegean Macedonia from Greece, Pirin Macedonia from Bulgaria, Yugoslav Macedonia from Serbia. Invoke Philip II and Alexander. 'No Macedonian shall live under foreign rule!'"
 
 # Tier 2 - Communist Path
 MAC_peoples_republic_proc:0 "Proclamation of People's Republic"
 MAC_peoples_republic_proc_desc:0 "Koliševski's revolutionary committee seizes power! Proclaim the People's Republic of Macedonia, dedicated to building socialism and joining the international workers' movement."
 
 MAC_collectivize_vardar:0 "Collectivization of the Vardar"
 MAC_collectivize_vardar_desc:0 "Implement radical land reform along the Vardar River valley. Collectivize agriculture to increase production and support industrialization. The kulaks will resist, but the revolution demands sacrifice."
 
 MAC_international_brigade:0 "The International Brigade"
 MAC_international_brigade_desc:0 "Send Macedonian volunteers to fight in Spain's civil war alongside other international communists. They will gain invaluable combat experience and spread the revolution abroad."
 
 # Tier 2 - Democratic Path
 MAC_constitutional_convention:0 "The Constitutional Convention"
 MAC_constitutional_convention_desc:0 "Establish a parliamentary democracy with free elections, freedom of speech, and an independent judiciary. Vlahov's democratic vision will make Macedonia a beacon of liberty in the Balkans."
 
 MAC_freedom_press_act:0 "Freedom of the Press Act"
 MAC_freedom_press_act_desc:0 "Guarantee civil liberties and a free press. Remove censorship. Allow political opposition to organize peacefully. Democracy requires transparency and accountability."
 
 MAC_balkan_federation_init:0 "Balkan Federation Initiative"
 MAC_balkan_federation_init_desc:0 "Propose a Balkan Federation - a union of equal democracies sharing defense and economic policy while preserving national sovereignty. End centuries of Balkan bloodshed through cooperation."
 
 # Tier 2 - Centrist Authoritarian Path
 MAC_emergency_powers:0 "The Emergency Powers Act"
 MAC_emergency_powers_desc:0 "Grant President Čento dictatorial authority to navigate the crisis. Suspend parliament and ban political parties 'temporarily.' Only a strong hand can guide Macedonia through this chaos."
 
 MAC_secret_police:0 "The Secret Police"
 MAC_secret_police_desc:0 "Create an OZNA-style intelligence service to suppress dissent, hunt foreign agents, and maintain order. Democratic freedoms are a luxury we cannot afford during this crisis."
 
 MAC_corporatist_state:0 "The Corporatist State"
 MAC_corporatist_state_desc:0 "Establish a corporatist economy - neither capitalist nor communist. Organize society into professional corporations under state guidance. Mussolini's 'Third Way' adapted for Macedonia."
 
 #######################
 # INTERNAL POLITICS IDEAS
 #######################
 
 MAC_unstable_government:0 "Unstable Government"
 MAC_unstable_government_desc:0 "Čento's coalition government is weak and divided. Four factions struggle for control while the nation drifts. We need decisive leadership before the crisis deepens."
 
 MAC_vmro_purge:0 "VMRO Purge"
 MAC_vmro_purge_desc:0 "Mihailov's night of long knives has eliminated democratic and communist opposition. The streets are quiet, but resentment simmers. Stability through fear is fragile."
 
 MAC_komitadji_brigades:0 "Komitadji Brigades"
 MAC_komitadji_brigades_desc:0 "VMRO's legendary guerrilla fighters have been organized into elite special forces units. Masters of mountain warfare, they strike from the shadows and melt into the terrain."
 
 MAC_communist_purge:0 "Communist Purge"
 MAC_communist_purge_desc:0 "Koliševski's revolutionary committees have arrested capitalists, clergy, and 'reactionaries.' Production increases, but at the cost of stability and blood."
 
 MAC_stable_democracy:0 "Stable Democracy"
 MAC_stable_democracy_desc:0 "Free elections, freedom of speech, and rule of law have taken root. Macedonia stands as proof that democracy can flourish in the Balkans."
 
 MAC_emergency_rule:0 "Emergency Rule"
 MAC_emergency_rule_desc:0 "Čento rules by decree with emergency powers. Parliament is suspended, opposition silenced. Order maintained through authoritarian control."
 
 MAC_ozna_service:0 "OZNA Secret Police"
 MAC_ozna_service_desc:0 "The Organization for the Defense of the People (OZNA) monitors citizens, hunts dissidents, and crushes resistance. No one is above suspicion."
 
 MAC_corporatism:0 "Corporatist Economy"
 MAC_corporatism_desc:0 "Society organized into state-controlled corporations. Workers and employers collaborate under government oversight. The Third Way between capitalism and communism."
 
 MAC_authoritarian_stability:0 "Authoritarian Stability"
 MAC_authoritarian_stability_desc:0 "Strong government has suppressed factionalism and imposed order. The price of stability is freedom, but at least there is peace."
 
 #######################
 # TOOLTIPS
 #######################
 
 MAC_mihailov_rules_tt:0 "Ivan Mihailov becomes the de facto ruler of Macedonia"
 MAC_kolisevski_rules_tt:0 "Lazar Koliševski leads the People's Republic"
 MAC_suppress_dissent:0 "Unlock decisions to suppress opposition movements"
 
 #######################
 # DELČEV PATH FOCUSES
 #######################
 
 MAC_whispers_tikvesh:0 "Whispers from Tikveš"
 MAC_whispers_tikvesh_desc:0 "A cryptic letter arrives from the Tikveš valley, bearing the seal of Goce Delčev. The Founder, thought to have withdrawn from politics, watches from his estate. His words are few, but their weight is immense."
 MAC_pilgrimage_founder:0 "Pilgrimage to the Founder"
 MAC_pilgrimage_founder_desc:0 "The current leadership must make the journey to Delčev's estate in Tikveš. There, the Father of the Nation will judge whether Macedonia has remained true to its principles, or whether it has strayed from the path."
 MAC_founders_ultimatum:0 "The Founder's Ultimatum"
 MAC_founders_ultimatum_desc:0 "Delčev has broken his silence. In a scathing letter to the government, he declares that the current leadership has failed Macedonia. He demands they resign and calls upon the people to decide: will they recall the Founder, or resist his return?"
 
 MAC_recall_founder:0 "Recall the Founder"
 MAC_recall_founder_desc:0 "The people have spoken. Goce Delčev will return to lead Macedonia once more. The Father of the Nation takes up the mantle of power, ushering in a new era of Delčevism - a Third Way between communism and fascism."
 MAC_purge_pretenders:0 "Purge the Pretenders"
 MAC_purge_pretenders_desc:0 "Delčev consolidates power peacefully. The faction leaders who tore Macedonia apart are removed from office, not through violence, but through the will of the people. Order is restored."
 MAC_delcev_constitution:0 "The Delčevist Constitution"
 MAC_delcev_constitution_desc:0 "Delčev drafts a new constitution establishing 'guided democracy' - a system where the people elect representatives, but the Founder ensures Macedonia never strays from its true path. Power is balanced between popular will and enlightened guidance."
 MAC_macedonia_for_macedonians:0 "Macedonia for Macedonians"
 MAC_macedonia_for_macedonians_desc:0 "Delčev declares that Macedonia will never again be a pawn in the games of greater powers. No foreign alliances, no ideological submission - only the independent Macedonian nation, master of its own destiny."
 MAC_founders_diplomacy:0 "The Founder's Diplomacy"
 MAC_founders_diplomacy_desc:0 "Delčev's prestige opens diplomatic doors previously closed to Macedonia. The world respects the Father of the Nation, even if they don't understand his Third Way. We can negotiate from a position of moral authority."
 MAC_peoples_army:0 "The People's Army"
 MAC_peoples_army_desc:0 "Delčev transforms the Macedonian military based on the principles of the cheta - the revolutionary bands that fought for independence. Every soldier is a partisan, every officer a komitadji. The People's Army is born."
 MAC_settle_succession:0 "Settle the Succession"
 MAC_settle_succession_desc:0 "Delčev is aging. He must choose a successor who will continue the Delčevist path after his death. The choice will determine Macedonia's future for generations."
 MAC_delcev_legacy:0 "Delčev's Legacy"
 MAC_delcev_legacy_desc:0 "The Father of the Nation has achieved what seemed impossible - a free, independent, unified Macedonia following its own path. Delčev's dream is complete. His legacy will endure forever."
 
 MAC_resist_legend:0 "Resist the Legend"
 MAC_resist_legend_desc:0 "Delčev may be a hero of the past, but this is 1936. Macedonia needs modern leadership, not the return of an aging revolutionary. We will oppose his demands and maintain our government's legitimacy."
 MAC_discredit_hero:0 "Discredit the Hero"
 MAC_discredit_hero_desc:0 "To break Delčev's hold on the people, we must tarnish his legend. A risky propaganda campaign will reveal his flaws, his failures, his mortality. But if it backfires, civil war may result."
 MAC_civil_war_victory:0 "Victory in the Civil War"
 MAC_civil_war_victory_desc:0 "The Delčevist rebels have been crushed. Macedonia moves forward without the Founder's shadow. A new era begins, built on modern principles rather than outdated revolutionary ideals."
 
 MAC_tikvesh_compromise:0 "The Tikveš Compromise"
 MAC_tikvesh_compromise_desc:0 "A middle path is found. Delčev will return to public life in a ceremonial role - a living symbol of Macedonian independence, but without executive power. Both sides accept this pragmatic solution."
 MAC_cogovernance:0 "Co-Governance"
 MAC_cogovernance_desc:0 "Delčev accepts a position as Supreme Commander of the Armed Forces while the civilian government handles politics. Dual leadership emerges - the Founder guides the military, the government manages the state."
 MAC_elder_statesman:0 "The Elder Statesman"
 MAC_elder_statesman_desc:0 "Delčev becomes an advisor to the government, offering wisdom without wielding power. The Father of the Nation serves Macedonia in his final years through counsel rather than command."
 
 #######################
 # DELČEV IDEAS
 #######################
 
 MAC_delcev_returned:0 "The Founder Returns"
 MAC_delcev_returned_desc:0 "Goce Delčev has returned to lead Macedonia. The Father of the Nation's presence stabilizes the country and inspires the people. His living legend grants Macedonia unprecedented unity and determination."
 MAC_delcevist_republic:0 "Delčevist Republic"
 MAC_delcevist_republic_desc:0 "Macedonia follows Delčev's 'Third Way' - a guided democracy that combines popular representation with the Founder's enlightened leadership. Neither communist nor fascist, neither monarchist nor purely democratic."
 MAC_no_foreign_interference:0 "No Foreign Interference"
 MAC_no_foreign_interference_desc:0 "Delčev has decreed that Macedonia will never again submit to foreign powers or join their alliances. We stand alone, but we stand free. Our independence is absolute."
 MAC_delcev_diplomacy:0 "The Founder's Prestige"
 MAC_delcev_diplomacy_desc:0 "Delčev's international reputation as a revolutionary hero and statesman opens diplomatic doors for Macedonia. The world respects the Father of the Nation, even if they don't share his ideology."
 MAC_cheta_brigades:0 "Cheta Brigades"
 MAC_cheta_brigades_desc:0 "The Macedonian Army has been reorganized on the principles of the revolutionary cheta bands. Every soldier is trained in guerrilla warfare, mountain combat, and partisan tactics."
 MAC_delcev_dream:0 "Delčev's Dream Fulfilled"
 MAC_delcev_dream_desc:0 "The Father of the Nation has achieved his ultimate vision - a free, independent, unified Macedonia following its own path. Delčev's legacy is complete, and Macedonia will never forget his gift."
 MAC_dual_leadership:0 "Dual Leadership"
 MAC_dual_leadership_desc:0 "Macedonia is governed by a unique system of dual leadership. Delčev commands the military as Supreme Commander, while the civilian government handles domestic and foreign policy. Balance is maintained."
 MAC_delcev_advisor:0 "The Elder Statesman"
 MAC_delcev_advisor_desc:0 "Goce Delčev serves as a senior advisor to the government, offering wisdom accumulated over decades of struggle. The Father of the Nation's counsel guides Macedonia without wielding direct power."
 
 #######################
 # DELČEV EVENTS
 #######################
 
 macedonia_delcev.1.t:0 "Whispers from Tikveš."
 macedonia_delcev.1.d:0 "A messenger arrives at the capital bearing a sealed letter. The wax seal is unmistakable - it belongs to Goce Delčev, the Father of the Nation himself, who has lived in quiet retirement on his estate in the Tikveš valley since the founding of Macedonia.\n\nThe letter is brief:\n\n'I watch. I see what you have become. Macedonia deserves better than this.'\n\nNo signature. None is needed. The Founder has broken his silence, and his words carry the weight of judgment."
 macedonia_delcev.1.a:0 "This is... concerning."
 macedonia_delcev.1.a_tt:0 "The Founder is watching from Tikveš"
 macedonia_delcev.1.b:0 "An old man's ramblings. Ignore it."
 macedonia_delcev.1.b_tt:0 "We choose to ignore the Founder's warning"
 
 macedonia_delcev.2.t:0 "Pilgrimage to the Founder."
 macedonia_delcev.2.d:0 "Our leadership makes the journey to Delčev's estate in the Tikveš valley. The estate is modest - no palace, just a simple house surrounded by vineyards. Delčev himself, now in his 60s, greets us on the terrace.\n\n'You came,' he says simply. 'That shows wisdom, at least.'\n\nFor three hours, the Father of the Nation questions our policies, our choices, our vision for Macedonia. He does not lecture - he listens. At the end, he nods slowly.\n\n'Macedonia's path is difficult. I do not envy you. But remember - the nation comes before ideology, before faction, before self. Always.'\n\nAs we depart, Delčev watches from his terrace, a living monument to Macedonia's struggle for independence."
 macedonia_delcev.2.a:0 "We hear the Founder's wisdom."
 macedonia_delcev.2.a_tt:0 "Delčev judges our leadership worthy"
 
 macedonia_delcev.10.t:0 "The Founder's Ultimatum."
 macedonia_delcev.10.d:0 "The letter arrives by courier, hand-delivered to every newspaper in Macedonia. It is addressed 'To the People of Macedonia' and signed 'Goce Delčev, Father of the Nation.'\n\n'I have watched in silence as factions tear apart the nation I helped birth. I have watched as petty men pursue power while Macedonia suffers. I have watched, and I can watch no longer.\n\nThe current government has failed. I call upon them to resign. I call upon the people to demand new leadership. Macedonia deserves better than this chaos. If the people will it, I will return to serve once more. If they will not, I will return to my vines in peace.\n\nBut this cannot continue.'\n\nThe letter is simple, direct, and devastating. The Founder has spoken. How will we respond?"
 macedonia_delcev.10.a:0 "The Founder challenges our legitimacy!"
 macedonia_delcev.10.a_tt:0 "Delčev demands the government resign"
 
 macedonia_delcev.20.t:0 "The Founder Returns."
 macedonia_delcev.20.d:0 "Goce Delčev arrives in Skopje to crowds numbering in the tens of thousands. The Father of the Nation, wearing a simple suit rather than a uniform, walks from the train station to the parliament building.\n\nThe current government resigns peacefully. Delčev addresses the nation from the parliament steps:\n\n'I never sought power. I sought freedom for Macedonia. But when the nation calls, I must answer. I promise you this - Macedonia will follow its own path. Not communism. Not fascism. Not monarchy. Not pure democracy. Our own Third Way.\n\nI call it Delčevism, if we must give it a name - the principle that Macedonia exists for Macedonians, that we bow to no foreign power, that we chart our own course. This is what I fought for. This is what I return to defend.'\n\nA new era begins."
 macedonia_delcev.20.a:0 "The Founder has returned!"
 macedonia_delcev.20.a_tt:0 "Delčev takes power and establishes Delčevism"
 
 macedonia_delcev.21.t:0 "Purging the Pretenders."
 macedonia_delcev.21.d:0 "Delčev moves swiftly but peacefully to consolidate power. In a series of public addresses, he calls out the faction leaders who tore Macedonia apart:\n\n'Mihailov, Koliševski, Strezov - you are patriots, but you put faction before nation. That ends today. You may retire peacefully to private life, or face trial for sedition. Choose wisely.'\n\nOne by one, they resign. No violence. No executions. Simply the overwhelming moral authority of the Father of the Nation, backed by the people's will. The factions dissolve. The pretenders fade into history.\n\nMacedonia is unified under Delčev."
 macedonia_delcev.21.a:0 "The Founder purges peacefully."
 macedonia_delcev.21.a_tt:0 "Faction leaders removed from power"
 
 macedonia_delcev.22.t:0 "The Delčevist Constitution."
 macedonia_delcev.22.d:0 "Delčev presents his new constitution to the people. It is a unique document, unlike any other in Europe:\n\n'The people will elect a parliament. The parliament will govern day-to-day affairs. But I, as Founder, retain veto power over any decision that threatens Macedonian independence or unity. When I die, this power passes to my chosen successor, and then ends. This is not a dynasty - it is a transition.'\n\nCritics call it authoritarian. Supporters call it wise. Delčev calls it 'guided democracy' - the people's will, guided by the Founder's wisdom.\n\nThe constitution passes by referendum with 82% support."
 macedonia_delcev.22.a:0 "Guided democracy begins."
 macedonia_delcev.22.a_tt:0 "The Delčevist system is established"
 
 macedonia_delcev.23.t:0 "Macedonia for Macedonians."
 macedonia_delcev.23.d:0 "In a historic address to the nation, Delčev makes his foreign policy clear:\n\n'Macedonia will join no alliances. We will sign no pacts that subordinate our sovereignty. The Germans may offer military aid. The Soviets may offer ideological brotherhood. The British may offer guarantees. We refuse all of them.\n\nMacedonia exists for Macedonians. We will trade with anyone. We will fight for ourselves alone. Our independence is absolute. This is the promise I made when we won our freedom, and I will not break it now.'\n\nThe speech is controversial internationally, but in Macedonia, it receives thunderous applause."
 macedonia_delcev.23.a:0 "We stand alone - and free."
 macedonia_delcev.23.a_tt:0 "Macedonia will never join foreign alliances"
 
 macedonia_delcev.24.t:0 "The Founder's Diplomacy."
 macedonia_delcev.24.d:0 "Despite Macedonia's isolationist stance, Delčev's personal prestige opens diplomatic doors. Foreign ambassadors request meetings with the Father of the Nation. He receives them in his office, decorated simply with maps of historical Macedonia and photographs from the revolutionary years.\n\n'I fought the Ottomans,' he tells a German diplomat. 'I negotiated with the Great Powers at Versailles. I have seen empires rise and fall. You will find me a practical man.'\n\nThe diplomats leave impressed. Macedonia may be isolated, but it is not ignored. Delčev's reputation precedes him."
 macedonia_delcev.24.a:0 "The Founder is respected internationally."
 macedonia_delcev.24.a_tt:0 "Diplomatic opportunities increase"
 
 macedonia_delcev.25.t:0 "The People's Army."
 macedonia_delcev.25.d:0 "Delčev personally oversees the transformation of the Macedonian military. Drawing on his experience leading revolutionary cheta bands against the Ottomans, he creates a unique military doctrine:\n\n'Every soldier must be able to operate independently. Every unit must be capable of guerrilla warfare. We cannot match great powers in industrial might, but we can make conquest of Macedonia impossibly costly.'\n\nThe army is reorganized into 'Cheta Brigades' - mobile, lightly equipped units trained in mountain warfare, partisan tactics, and unconventional combat. Veterans of the revolutionary struggle serve as instructors.\n\nThe People's Army is born."
 macedonia_delcev.25.a:0 "Every soldier a partisan!"
 macedonia_delcev.25.a_tt:0 "The Cheta Brigades are formed"
 
 macedonia_delcev.26.t:0 "Settling the Succession."
 macedonia_delcev.26.d:0 "Delčev summons his closest advisors to the parliament. At 67, he knows time is limited.\n\n'I will not rule forever. When I die, the extraordinary powers of the Founder must end - that is what the constitution says, and I will honor it. But I must choose a successor to lead the transition back to full democracy.'\n\nHe presents two options: a trusted revolutionary comrade who shares his vision, or a young technocrat who can modernize Macedonia. The choice will shape the nation's future."
 macedonia_delcev.26.a:0 "Choose the revolutionary veteran."
 macedonia_delcev.26.a_tt:0 "Continuity of Delčevist principles"
 macedonia_delcev.26.b:0 "Choose the young reformer."
 macedonia_delcev.26.b_tt:0 "Modernization and gradual democratization"
 
 macedonia_delcev.27.t:0 "Delčev's Legacy."
 macedonia_delcev.27.d:0 "Goce Delčev, the Father of the Nation, addresses Macedonia one final time. He stands before a crowd of hundreds of thousands in Skopje, now 70 years old but still commanding:\n\n'When I was young, Macedonia was a dream. When I was old, Macedonia was a nation. Now, in my final years, Macedonia is truly free - following its own path, beholden to no one, master of its own destiny.\n\nI have seen my dream fulfilled. Whatever happens next, remember this: Macedonia is yours. Not mine. Not any leader's. Yours. Guard it well.'\n\nAs he finishes, church bells ring across the country. The Founder's dream is complete. His legacy is secured. Macedonia is free."
 macedonia_delcev.27.a:0 "The Founder's dream is fulfilled!"
 macedonia_delcev.27.a_tt:0 "Delčev's vision for Macedonia is complete"
 
 macedonia_delcev.28.t:0 "The Founder's Death."
 macedonia_delcev.28.d:0 "Goce Delčev has died peacefully at his estate in Tikveš, surrounded by his family and closest comrades. The Father of the Nation was 73.\n\nThe news plunges Macedonia into mourning. Thousands make pilgrimage to Tikveš to pay respects. The funeral procession from his estate to Skopje stretches for miles.\n\nAt his burial, his chosen successor reads Delčev's final message:\n\n'I lived to see Macedonia free. That is enough. Do not worship me. Do not build monuments to me. Simply remember - Macedonia exists for Macedonians. Keep it free.'\n\nAn era ends. But the legacy endures."
 macedonia_delcev.28.a:0 "The Father of the Nation is gone."
 macedonia_delcev.28.a_tt:0 "Macedonia mourns Delčev"
 
 macedonia_delcev.40.t:0 "Resisting the Legend."
 macedonia_delcev.40.d:0 "The government issues a formal response to Delčev's ultimatum:\n\n'With great respect for Goce Delčev's revolutionary service, we must decline his call to resign. Macedonia in 1936 requires modern governance, not revolutionary leadership. The Father of the Nation is a hero of the past, but this is the present.'\n\nThe response is diplomatic but firm. Delčev, from his estate in Tikveš, says only: 'So be it. The people will decide.'\n\nPro-Delčev demonstrations begin in major cities. The crisis deepens."
 macedonia_delcev.40.a:0 "We will weather this storm."
 macedonia_delcev.40.a_tt:0 "The government opposes Delčev's return"
 
 macedonia_delcev.41.t:0 "Discrediting the Hero - Success."
 macedonia_delcev.41.d:0 "The propaganda campaign succeeds beyond expectations. Carefully leaked documents reveal Delčev's compromises during the revolution, his backroom deals, his occasional ruthlessness. The legend cracks.\n\nPublic support for Delčev's return collapses. The Father of the Nation, confronted with the evidence, issues a terse statement:\n\n'I am human. I made choices - some right, some wrong. If the people no longer wish my service, I accept their judgment. I return to my vines.'\n\nThe crisis ends. But Macedonia has lost something intangible - the myth of the Founder's perfection."
 macedonia_delcev.41.a:0 "The legend is broken."
 macedonia_delcev.41.a_tt:0 "Delčev withdraws from politics"
 
 macedonia_delcev.42.t:0 "Discrediting the Hero - Civil War."
 macedonia_delcev.42.d:0 "The propaganda campaign backfires catastrophically. Rather than breaking Delčev's legend, it enrages his supporters. How dare the government slander the Father of the Nation!\n\nRiots break out in Skopje. Army units defect to join Delčev supporters. The Father of the Nation, reluctantly, issues a call to arms:\n\n'I did not want this. But if the current government will slander me to maintain power, they are unfit to rule. Macedonians - to arms!'\n\nThe Macedonian Civil War begins. Delčevists control roughly half the country. The government must fight to survive."
 macedonia_delcev.42.a:0 "Civil war has begun!"
 macedonia_delcev.42.a_tt:0 "The Delčevist rebellion erupts"
 
 macedonia_delcev.43.t:0 "Victory in the Civil War."
 macedonia_delcev.43.d:0 "After months of bitter fighting, the Delčevist rebels have been defeated. Goce Delčev himself surrenders at his estate in Tikveš, refusing to flee.\n\n'I accept responsibility,' he says. 'I led the rebellion. Do with me as you will.'\n\nThe government faces a choice: execute the Father of the Nation as a traitor, or pardon him and send him into exile. Either way, the Delčevist challenge is crushed.\n\nMacedonia has defeated the legend, but at tremendous cost."
 macedonia_delcev.43.a:0 "The civil war is over."
 macedonia_delcev.43.a_tt:0 "The government has defeated the Delčevists"
 
 macedonia_delcev.50.t:0 "The Tikveš Compromise."
 macedonia_delcev.50.d:0 "After weeks of negotiation, a compromise is reached. Delčev will return to public life, but only in a ceremonial role. He will serve as 'Father of the Nation' officially - attending state functions, receiving foreign dignitaries, symbolizing Macedonian independence - but wielding no executive power.\n\nDelčev accepts the compromise with characteristic pragmatism:\n\n'I never sought power for its own sake. If I can serve Macedonia through symbolism rather than governance, so be it. The nation matters more than my pride.'\n\nBoth sides save face. The crisis ends peacefully."
 macedonia_delcev.50.a:0 "A wise compromise."
 macedonia_delcev.50.a_tt:0 "Delčev returns in a ceremonial role"
 
 macedonia_delcev.51.t:0 "Co-Governance Established."
 macedonia_delcev.51.d:0 "The compromise deepens into an unusual governing arrangement. Delčev accepts the position of Supreme Commander of the Armed Forces - a role he is uniquely qualified for - while the civilian government handles domestic and foreign policy.\n\nDelčev addresses the army:\n\n'I will command you in war, should war come. But I will not interfere in politics. This is dual leadership - the Founder guides the sword, the government guides the state. Macedonia is stronger for this balance.'\n\nThe arrangement is unprecedented, but it works. Delčev's military expertise strengthens the army, while the government maintains civilian control."
 macedonia_delcev.51.a:0 "Dual leadership begins."
 macedonia_delcev.51.a_tt:0 "Delčev commands the military"
 
 macedonia_delcev.52.t:0 "The Elder Statesman."
 macedonia_delcev.52.d:0 "Goce Delčev accepts a position as senior advisor to the government. He will not command, will not legislate, will not rule - but he will counsel.\n\nHis first address to the cabinet is characteristically blunt:\n\n'I am old. I have made many mistakes. But I have also learned much. When you face difficult decisions, ask me. I will give you my wisdom, such as it is. The final choice remains yours.'\n\nThe government gains access to the Founder's vast experience. Delčev serves Macedonia in his twilight years through wisdom rather than power."
 macedonia_delcev.52.a:0 "The Elder Statesman serves."
 macedonia_delcev.52.a_tt:0 "Delčev becomes a senior advisor"
 
 #######################
 # TROTSKY STORYLINE FOCUSES
 #######################
 
 MAC_wanderer_arrives:0 "The Wanderer Arrives"
 MAC_wanderer_arrives_desc:0 "Leon Trotsky, exiled revolutionary and Stalin's greatest enemy, has written to our government requesting asylum. The former Red Army commander fled the Soviet Union in 1929 and has wandered Europe ever since, one step ahead of Stalin's assassins. Now he asks if Macedonia will shelter him."
 MAC_wanderer_arrives_tt:0 "Trotsky requests asylum in Macedonia"
 
 MAC_grant_asylum_trotsky:0 "Grant Asylum to Trotsky"
 MAC_grant_asylum_trotsky_desc:0 "We will grant Trotsky asylum in Macedonia. This decision will enrage Stalin and make us a target of Soviet wrath, but it will also give us access to one of the 20th century's greatest revolutionary minds. Trotsky's presence in Skopje will attract international attention - and NKVD assassins."
 MAC_grant_asylum_trotsky_tt:0 "Relations with USSR: -150. Trotsky becomes advisor. NKVD will attempt assassination."
 
 MAC_refuse_asylum_trotsky:0 "Refuse Asylum to Trotsky"
 MAC_refuse_asylum_trotsky_desc:0 "We cannot risk Stalin's fury by sheltering his greatest enemy. Trotsky's request for asylum is politely declined. He will seek refuge elsewhere - perhaps Norway, perhaps Mexico - while we maintain stable relations with the Soviet Union."
 MAC_refuse_asylum_trotsky_tt:0 "Relations with USSR improve. Trotsky flees to another nation."
 
 MAC_trotsky_writings:0 "The Macedonian Thesis"
 MAC_trotsky_writings_desc:0 "Trotsky has begun writing in Skopje, producing a new theoretical work: 'The Macedonian Thesis - Permanent Revolution in a Small Nation.' His writings argue that even a small country like Macedonia can spark international revolution. His ideas spread across Europe, attracting communists disillusioned with Stalin."
 MAC_trotsky_writings_tt:0 "Trotsky becomes a theorist advisor. Communist support increases."
 
 MAC_ice_pick_plot:0 "The Ice Pick Plot"
 MAC_ice_pick_plot_desc:0 "Our intelligence services have uncovered an NKVD plot to assassinate Trotsky. A Spanish communist named Ramón Mercader has arrived in Skopje with a false identity and an ice pick. We must act quickly to protect our guest, or Stalin's assassin will succeed."
 MAC_ice_pick_plot_tt:0 "NKVD assassination attempt on Trotsky"
 
 MAC_revolutionary_independents_tt:0 "Form faction 'Revolutionary Independents' with unique ideology"
 
 #######################
 # TROTSKY IDEAS
 #######################
 
 MAC_trotsky_asylum:0 "Trotsky in Exile"
 MAC_trotsky_asylum_desc:0 "Leon Trotsky has taken refuge in Macedonia. His presence brings international attention and communist sympathizers, but also NKVD assassins and Stalin's wrath."
 MAC_trotsky_theorist:0 "Trotsky the Theorist"
 MAC_trotsky_theorist_desc:0 "Trotsky serves as a revolutionary theorist and advisor. His writings on 'permanent revolution' inspire communists worldwide and provide Macedonia with powerful propaganda tools against Stalinism."
 MAC_revolutionary_independents:0 "Revolutionary Independents"
 MAC_revolutionary_independents_desc:0 "Macedonia has formed an alliance with Trotskyist movements worldwide, creating an alternative to both Stalin's Comintern and Western capitalism. We offer a third path - revolution without submission."
 
 #######################
 # TROTSKY OPINION MODIFIERS
 #######################
 
 MAC_harboring_trotsky:0 "Harboring Trotsky"
 
 #######################
 # TROTSKY EVENTS
 #######################
 
 macedonia_trotsky.1.t:0 "The Wanderer Arrives."
 macedonia_trotsky.1.d:0 "A sealed diplomatic pouch arrives from Norway. Inside is a letter from Leon Trotsky, former commander of the Red Army, architect of the October Revolution, and now the most hunted man in the communist world.\n\n'To the Government of Macedonia,\n\nI write as a man without a country. Stalin has stripped me of Soviet citizenship. Norway has expelled me. Mexico will not have me. I have heard of your young nation's independence, your refusal to bow to great powers. Perhaps Macedonia understands what it means to stand alone.\n\nI request political asylum. I ask for nothing but a place to write, a roof over my head, and protection from Stalin's assassins. In return, I offer my experience, my knowledge, my pen. I have commanded armies and shaped revolutions. These skills are yours, should you grant me refuge.\n\nI await your answer.\n\nL. D. Trotsky'\n\nThe letter is a bomb. Granting asylum to Stalin's greatest enemy would make us a target. Refusing condemns a revolutionary legend to endless wandering."
 macedonia_trotsky.1.a:0 "This requires careful consideration."
 macedonia_trotsky.1.a_tt:0 "We must decide whether to grant asylum"
 
 macedonia_trotsky.10.t:0 "Trotsky Arrives in Skopje."
 macedonia_trotsky.10.d:0 "Leon Trotsky steps off the train in Skopje to no fanfare. The man who once commanded the Red Army travels with a single suitcase and two bodyguards. He is 58 years old, balding, wearing round spectacles that make him look more like a professor than a revolutionary.\n\nOur foreign minister meets him at the station:\n\n'Mr. Trotsky, welcome to Macedonia.'\n\nTrotsky smiles wearily: 'Comrade Trotsky, if you please. And thank you. Your government has shown more courage than Norway, more integrity than France. Stalin will not forgive this.'\n\n'We are aware.'\n\n'Good. Then we understand each other. Show me to my quarters. I have much work to do.'\n\nWithin hours, the Soviet embassy lodges a formal protest. Within days, Moscow recalls its ambassador. Within weeks, NKVD agents begin arriving in Skopje.\n\nThe game has begun."
 macedonia_trotsky.10.a:0 "Stalin's fury is predictable."
 macedonia_trotsky.10.a_tt:0 "Relations with USSR collapse. Trotsky begins his work."
 
 macedonia_trotsky.11.t:0 "Stalin's Threat."
 macedonia_trotsky.11.d:0 "The Soviet ambassador delivers a message to our foreign ministry. It is brief and chilling:\n\n'The Soviet Union considers the harboring of the traitor Trotsky to be an unfriendly act. Those who shelter enemies of the proletariat become enemies themselves. Stalin does not forget. Stalin does not forgive.'\n\nOur intelligence services report NKVD agents entering Macedonia on false papers. Trotsky's bodyguards have already survived two suspicious incidents - a near-miss traffic accident, a delivery man who fled when challenged.\n\nTrotsky himself is philosophical: 'Stalin sent assassins after me in Turkey, in France, in Norway. Now he sends them to Macedonia. This is my life. Guard me well, comrades. I still have much to write.'."
 macedonia_trotsky.11.a:0 "We knew this would happen."
 macedonia_trotsky.11.a_tt:0 "NKVD assassins operate in Macedonia"
 
 macedonia_trotsky.20.t:0 "Asylum Refused."
 macedonia_trotsky.20.d:0 "Our foreign minister drafts a careful response to Trotsky's request:\n\n'Dear Mr. Trotsky,\n\nWhile Macedonia respects your contributions to revolutionary thought, we cannot risk relations with the Soviet Union by granting asylum to a person whom Moscow considers a traitor. We regret this decision, but Macedonia's security must come first.\n\nWe wish you well in finding refuge elsewhere.'\n\nNews arrives months later that Trotsky found asylum in Mexico. He lives in a fortified compound in Coyoacán, still writing, still fighting Stalin with words.\n\nThe Soviet ambassador thanks us for our 'wisdom and good judgment.' Relations with Moscow improve.\n\nBut we wonder: did we miss an opportunity? What might Trotsky have offered Macedonia?"
 macedonia_trotsky.20.a:0 "We made the safe choice."
 macedonia_trotsky.20.a_tt:0 "Trotsky goes to Mexico. Relations with USSR improve."
 
 macedonia_trotsky.30.t:0 "The Macedonian Thesis."
 macedonia_trotsky.30.d:0 "Trotsky has completed his new work: 'The Macedonian Thesis - Permanent Revolution in a Small Nation.' The book is instantly controversial.\n\nKey arguments:\n\n'The revolution cannot stop at one nation's borders. But neither can it succeed through Stalin's bureaucratic imperialism. Macedonia proves a third path exists - a small nation, standing alone, charting its own revolutionary course.\n\nThe Permanent Revolution does not require obedience to Moscow. It requires courage to defy ALL empires - Soviet, fascist, capitalist. Macedonia embodies this principle. From this small Balkan nation, the true revolution will spread.'\n\nThe book is banned in the USSR within days. It is smuggled into Spain by International Brigade volunteers. It is read in communist cells from Paris to Shanghai.\n\nTrotsky has made Macedonia the theoretical center of an alternative communism. Stalin is furious.\n\nWe are now more than a refuge - we are Trotsky's living laboratory."
 macedonia_trotsky.30.a:0 "The pen is mightier than the sword."
 macedonia_trotsky.30.a_tt:0 "Trotskyist movements look to Macedonia for leadership"
 
 macedonia_trotsky.31.t:0 "The Revolutionary and the Founder."
 macedonia_trotsky.31.d:0 "Goce Delčev and Leon Trotsky meet in the parliament building. Two revolutionary legends, separated by ideology but united by principle, sit across from each other.\n\nDelčev speaks first: 'You believe in permanent revolution across borders.'\n\nTrotsky nods: 'The revolution cannot stop at arbitrary lines on a map.'\n\n'I believe in permanent independence within borders. Macedonia must never bow to foreign powers - not the Ottomans, not the Great Powers, not Stalin, not anyone.'\n\n'We disagree on the means, but agree on the principle - true freedom requires standing alone if necessary.'\n\nDelčev smiles: 'You know, Trotsky, Stalin would call you a traitor and me a nationalist. Perhaps that makes us natural allies.'\n\n'Revolutionary Independents,' Trotsky suggests.\n\n'I like it,' Delčev replies.\n\nTwo old men who shaped history share a drink. Their conversation lasts four hours. By the end, they have sketched out a new political philosophy - one that would horrify both Stalin and the Western powers.\n\nThe world doesn't know it yet, but something new has been born in this small Balkan nation."
 macedonia_trotsky.31.a:0 "An unprecedented alliance."
 macedonia_trotsky.31.a_tt:0 "Delčev and Trotsky find common ground"
 
 macedonia_trotsky.40.t:0 "The Ice Pick Plot."
 macedonia_trotsky.40.d:0 "Our secret police arrest a man calling himself 'Frank Jacson.' His papers are perfect. His cover story is flawless. But our agents notice details: military bearing, Moscow accent hidden under Spanish inflection, and in his apartment - an ice pick wrapped in newspaper.\n\nUnder interrogation, he breaks. His real name is Ramón Mercader del Río. He is NKVD. His orders came directly from Lavrenty Beria. His target: Leon Trotsky.\n\nThe method: gain trust as a Trotskyist sympathizer, then drive an ice pick through Trotsky's skull when alone.\n\nTrotsky views the ice pick with dark humor: 'Stalin cannot bear to shoot me like a man. He sends an assassin with a mountaineer's tool. Fitting - Stalin is a Georgian mountain bandit at heart.'\n\nMercader is tried and imprisoned. But our intelligence warns: he was not the only one. More assassins are coming."
 macedonia_trotsky.40.a:0 "Increase security around Trotsky."
 macedonia_trotsky.40.a_tt:0 "The NKVD will try again"
 
 macedonia_trotsky.41.t:0 "Assassination Attempt!"
 macedonia_trotsky.41.d:0 "Gunfire erupts at Trotsky's residence. NKVD agents storm the building in a coordinated assault - twenty armed men, machine guns, grenades. They came to finish what Mercader could not.\n\nBut they did not expect the resistance. Trotsky's bodyguards are veterans of the Russian Civil War, men who fought at his side when he commanded the Red Army. The Macedonian police respond within minutes.\n\nA fierce firefight ensues. The outcome hangs in balance..."
 macedonia_trotsky.41.a:0 "Does Trotsky survive?"
 
 macedonia_trotsky.42.t:0 "Trotsky Survives."
 macedonia_trotsky.42.d:0 "When the smoke clears, Trotsky stands in his study, bloodied but alive. Three assassins lie dead. Four more captured. The rest fled.\n\nTrotsky surveys the bullet-riddled room with grim satisfaction: 'In 1918, I commanded five million men. Today, a dozen bodyguards saved my life. Strange how the world changes.'\n\nHe picks up a book pierced by a bullet: 'They shot my copy of Das Kapital. Marx would appreciate the irony.'\n\nThe assassination attempt fails. Stalin's agents are executed or imprisoned. Trotsky lives.\n\nNews of the failed assassination spreads worldwide. In Moscow, Stalin rages. In Paris, Trotskyists celebrate. In Skopje, we tighten security further.\n\nThe Old Man survives. The struggle continues."
 macedonia_trotsky.42.a:0 "The Old Man is harder to kill than Stalin thought."
 macedonia_trotsky.42.a_tt:0 "Trotsky lives. Stalin's fury intensifies."
 
 macedonia_trotsky.43.t:0 "Trotsky Assassinated."
 macedonia_trotsky.43.d:0 "Leon Davidovich Trotsky dies at 10:47 PM on August 21, 1940.\n\nThe assassin finally succeeded. An NKVD agent posing as a Belgian journalist gained access to Trotsky's study. When Trotsky was reading a manuscript, the assassin struck with an ice pick - exactly as Mercader had planned.\n\nThe blow was not immediately fatal. Trotsky fought back, grappling with his attacker. His bodyguards rushed in, but too late. Trotsky was rushed to hospital, where he lingered for 26 hours before dying.\n\nHis last words: 'Tell Macedonia I died grateful. Tell Delčev I died free.'\n\nThe assassin is captured. Under torture, he confesses: NKVD, direct orders from Beria, promised a Hero of the Soviet Union medal.\n\nStalin has won. The Old Man is dead.\n\nBut his writings remain. 'The Macedonian Thesis' survives. His ideas cannot be killed with an ice pick.\n\nThousands attend his funeral in Skopje. Delčev delivers the eulogy: 'He died in Macedonia because Macedonia does not bow. That is the greatest compliment a revolutionary can receive.'."
 macedonia_trotsky.43.a:0 "Stalin's assassins have succeeded."
 macedonia_trotsky.43.a_tt:0 "Trotsky is dead. Stalin celebrates."
 
 macedonia_trotsky.50.t:0 "Revolutionary Independents."
 macedonia_trotsky.50.d:0 "In an unprecedented joint announcement, Goce Delčev and Leon Trotsky declare the formation of a new international faction: 'Revolutionary Independents.'\n\nDelčev speaks first:\n\n'Macedonia has proven that a small nation can stand alone against empires. We bow to no foreign power. We join no great power alliance. We chart our own course.'\n\nTrotsky continues:\n\n'The revolution need not mean submission to Stalin's bureaucracy. It need not mean fascist tyranny. It need not mean Western capitalism. There is a fourth way - permanent revolution combined with permanent independence. Nations that govern themselves, for themselves.'\n\nThe announcement is broadcast worldwide. In Moscow, Stalin denounces it as 'Trotskyite nationalism.' In Berlin, Hitler mocks it as 'Judeo-Bolshevik fantasy.' In London, Churchill calls it 'interesting but doomed.'\n\nBut in small nations from Spain to China, revolutionaries take notice. Perhaps there IS another path.\n\nMacedonia has become the center of an alternative revolutionary movement. The Revolutionary Independents stand against ALL empires."
 macedonia_trotsky.50.a:0 "A new force in world politics!"
 macedonia_trotsky.50.a_tt:0 "Revolutionary nations may join our faction"
 
 macedonia_trotsky.60.t:0 "Trotsky and the Spanish Civil War."
 macedonia_trotsky.60.d:0 "The Spanish Civil War has erupted. In Barcelona and Madrid, workers and peasants fight Franco's fascists. Stalin sends support to the Republicans - but also sends NKVD agents to purge Trotskyists and anarchists.\n\nTrotsky proposes an alternative:\n\n'Let me go to Spain. I will organize the International Brigades independently of Moscow. I will build a revolutionary army that fights BOTH Franco and Stalin's agents. Spain can be saved - but not by Stalin.'\n\nIt is a bold proposal. Trotsky himself, at 58, leading volunteers in Spain. The symbolism would be immense.\n\nBut the risk is equally immense. If Trotsky dies in Spain, we lose our greatest asset. If he succeeds, Stalin will declare war on us.\n\nDo we send him?"
 macedonia_trotsky.60.a:0 "Send Trotsky to Spain!"
 macedonia_trotsky.60.a_tt:0 "Trotsky organizes anti-Stalinist International Brigades"
 macedonia_trotsky.60.b:0 "Too risky. Keep Trotsky safe in Macedonia."
 macedonia_trotsky.60.b_tt:0 "Trotsky remains in Skopje"
 
 macedonia_trotsky.70.t:0 "International Impact."
 macedonia_trotsky.70.d:0 "Trotsky's presence in Macedonia has reverberated across the communist world. In France, workers' cells debate 'The Macedonian Thesis.' In China, Mao Zedong reads Trotsky's writings with interest - permanent revolution combined with national independence?\n\nIn Moscow, Stalin's paranoia deepens. Every communist party in the world now has Trotskyist factions arguing for independence from Soviet control. The Comintern's authority erodes.\n\nWe receive reports from our embassies: communist governments view Macedonia with suspicion. We are harboring the heretic, spreading dangerous ideas.\n\nBut we also receive secret messages from communist parties worldwide: 'Tell Trotsky his ideas inspire us. Tell Delčev we too seek independence.'\n\nMacedonia has become the alternative center of international communism. Stalin's monopoly is broken."
 macedonia_trotsky.70.a:0 "The revolution has many centers now."
 macedonia_trotsky.70.a_tt:0 "Communist nations distrust us, but communist movements look to us"
 
