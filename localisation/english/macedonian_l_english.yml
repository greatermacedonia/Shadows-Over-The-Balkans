 # Missing Irredentism Events
 mac_irredentism.14.t:0 "Reclaim Pella and Vergina"
 mac_irredentism.14.d:0 "Our government has declared that diplomacy has failed. The ancient Macedonian heartland — Pella, birthplace of Alexander the Great, and Vergina, resting place of Philip II — must return to Macedonian hands by force. Our armies march south with the Vergina Sun emblazoned on their standards.\n\nThe world watches as Macedonia stakes everything on this gamble. Our soldiers fight not for territory alone, but for the very soul of our civilization."
 mac_irredentism.14.a:0 "For Pella! For Vergina! For Macedonia!"

 mac_irredentism.24.t:0 "Unite Pirin Macedonia"
 mac_irredentism.24.d:0 "Diplomatic efforts to reclaim Pirin have been exhausted. Tsar Boris will not yield, and our brothers in the mountains suffer. The time for words is over — the time for action has come.\n\nOur mountain brigades prepare to cross into Pirin. These soldiers know every peak and pass, and they fight with the fury of a divided people yearning for unity."
 mac_irredentism.24.a:0 "Our mountain brothers will be free!"

 mac_irredentism.34.t:0 "Reclaim Northern Macedonia"
 mac_irredentism.34.d:0 "Belgrade has refused every demand, every appeal, every ultimatum. Vardar Macedonia — home to millions of our people — remains under Yugoslav control. No more negotiations. No more patience.\n\nOur armies mobilize for the final liberation. Officers born in the occupied north lead the charge, returning home as liberators. The Vardar shall run free through Macedonian lands once more."
 mac_irredentism.34.a:0 "The Vardar shall run free!"


