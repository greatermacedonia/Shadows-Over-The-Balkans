 # Historical Legacy Ideas
 MAC_ancient_heritage_desc:0 "From the ancient Kingdom of Paeonia to the empire of Alexander, our land has been home to great civilizations. This legacy inspires our people."
 
 MAC_ottoman_legacy:0 "Ottoman Legacy"
 MAC_ottoman_legacy_desc:0 "Five centuries of Ottoman rule left deep scars on our nation. The legacy of occupation still weighs heavily on our development."
 
 MAC_reject_ottoman_past:0 "Reject the Ottoman Past"
 MAC_reject_ottoman_past_desc:0 "We cast off the chains of our Ottoman past and look toward a brighter future as a free and independent nation."
 
 MAC_slavic_heritage:0 "Slavic Heritage"
 MAC_slavic_heritage_desc:0 "The Slavic tribes settled our lands in the 6th century, forming the foundation of modern Macedonian identity. This heritage connects us to the broader Slavic world."
 
 MAC_balkan_wars_legacy:0 "Balkan Wars Legacy"
 MAC_balkan_wars_legacy_desc:0 "The Balkan Wars of 1912-1913 shaped our borders and military traditions. Our army learned valuable lessons from those conflicts."
 
 MAC_paeonian_restoration:0 "Paeonian Restoration"
 MAC_paeonian_restoration_desc:0 "We seek to restore the glory of ancient Paeonia, reclaiming our ancestral homeland and rightful place among nations."
 
 MAC_crossroads_of_empires:0 "Crossroads of Empires"
 MAC_crossroads_of_empires_desc:0 "Our land has been contested by Persians, Macedonians, Romans, Byzantines, Bulgarians, Serbians, and Ottomans. This position as a crossroads brings both challenges and opportunities."
 
