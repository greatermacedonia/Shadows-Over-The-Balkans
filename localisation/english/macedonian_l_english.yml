 MAC_delcev_authority:0 "Delčev's Authority"
 MAC_delcev_authority_desc:0 "The Founder's word is law. Under his guidance, Macedonia has found purpose and unity."
 MAC_founder_blessing:0 "The Founder's Blessing"
 MAC_founder_blessing_desc:0 "Though Delčev does not rule directly, his approval legitimizes our government."
 MAC_planned_economy:0 "Planned Economy"
 MAC_planned_economy_desc:0 "Central planning directs our economic development."
 MAC_agricultural_boost:0 "Agricultural Reforms"
 MAC_agricultural_boost_desc:0 "Land redistribution and modern farming techniques increase food production."
 MAC_balkan_commerce:0 "Balkan Trade Network"
 MAC_balkan_commerce_desc:0 "Trade agreements with our neighbors boost economic growth."
 MAC_professional_officers:0 "Professional Officer Corps"
 MAC_professional_officers_desc:0 "Our military leaders are trained to the highest standard."
 MAC_mountain_fighters:0 "Mountain Fighters"
 MAC_mountain_fighters_desc:0 "Macedonian soldiers are masters of mountain warfare."
 MAC_defensive_mindset:0 "Defensive Mindset"
 MAC_defensive_mindset_desc:0 "Our strategy prioritizes defending the homeland above all else."
 MAC_mass_mobilization:0 "Mass Mobilization"
 MAC_mass_mobilization_desc:0 "Every citizen is a soldier. Macedonia is armed and ready."
 MAC_alexandrian_legacy:0 "Alexandrian Legacy"
 MAC_alexandrian_legacy_desc:0 "We are the true heirs of Alexander's empire. The world will recognize our claim."
 MAC_alexandrian_legacy_egypt:0 "Egyptian Crown"
 MAC_alexandrian_legacy_egypt_desc:0 "Alexander was crowned Pharaoh and founded Alexandria. Egypt remembers, and so do we."
 MAC_eastern_ambitions:0 "Eastern Ambitions"
 MAC_eastern_ambitions_desc:0 "Alexander marched through the Persian Gates to conquer the East. His ambition courses through our veins."
 MAC_seat_of_empires:0 "Seat of Empires"
 MAC_seat_of_empires_desc:0 "Constantinople, the eternal city, is now our capital. From here, we rule an empire."
 MAC_dream_fulfilled:0 "The Dream Fulfilled"
 MAC_dream_fulfilled_desc:0 "All Macedonians are finally united. The dream of our fathers is reality."
 MAC_fortress_macedonia_desc:0 "Our borders are impregnable. Let them try to invade."
 MAC_isolationist_doctrine:0 "Macedonia for Macedonians"
 MAC_isolationist_doctrine_desc:0 "We serve no foreign master. Our fate is our own."
 MAC_revolutionary_heritage:0 "Revolutionary Heritage"
 MAC_revolutionary_heritage_desc:0 "Generations of VMRO komitadji fighters have forged a warrior tradition in the Macedonian highlands. Every village has its veterans, every family its stories of resistance. Our people are born ready to take up arms — they need only the call."
 MAC_emergency_rule_idea:0 "Emergency Rule"
 MAC_emergency_rule_idea_desc:0 "Emergency powers remain in place as we navigate the crisis, prioritizing order over liberties."
 MAC_delcev_dream_fulfilled:0 "The Dream Fulfilled"
 MAC_delcev_dream_fulfilled_desc:0 "All Macedonian lands are finally united. Delčev's life's work is complete."
 MAC_delcev_disappointment:0 "Delčev's Disappointment"
 MAC_delcev_disappointment_desc:0 "The Founder watches in disgust as we betray his principles. His disapproval undermines our legitimacy."
 MAC_eternal_legacy:0 "Eternal Legacy"
 MAC_eternal_legacy_desc:0 "Goce Delčev has passed, but his vision lives on in every Macedonian heart."
 MAC_anarchist_foreign_policy:0 "Anarchist Foreign Policy"
 MAC_anarchist_foreign_policy_desc:0 "We reject imperial hierarchies while supporting revolutionary movements abroad. Mutual aid guides our diplomacy."
 MAC_trotskyist_government:0 "Trotskyist Government"
 MAC_trotskyist_government_desc:0 "Permanent revolution and anti-Stalinist communism guide our policies. The workers' revolution continues."
 MAC_permanent_revolution_doctrine:0 "Permanent Revolution"
 MAC_permanent_revolution_doctrine_desc:0 "The revolution must be exported beyond our borders. Capitalism and Stalinism must both fall."
 MAC_revolutionary_independents_spirit:0 "Revolutionary Independence"
 MAC_revolutionary_independents_spirit_desc:0 "Our faction unites all who oppose both capitalism and Stalinist dictatorship."
 MAC_ancient_heritage:0 "Ancient Heritage Program"
 MAC_oracle_military:0 "The Oracle's Blessing: War"
 MAC_oracle_military_desc:0 "The Oracle of Delphi has foretold military glory. Our armies march with divine approval."
 MAC_oracle_economic:0 "The Oracle's Blessing: Prosperity"
 MAC_oracle_economic_desc:0 "The Oracle promises wealth and abundance. Our economy flourishes under heavenly favor."
 MAC_oracle_diplomatic:0 "The Oracle's Blessing: Wisdom"
 MAC_oracle_diplomatic_desc:0 "The Oracle grants diplomatic insight. Nations treat with us respectfully."
 MAC_unique_macedonian:0 "Unique Macedonian Identity"
 MAC_unique_macedonian_desc:0 "We are neither Greek nor Slav, but uniquely Macedonian—a synthesis of all our historical influences."
 MAC_total_war:0 "Total War Mobilization"
 MAC_total_war_desc:0 "The entire nation is mobilized for war. Industry, agriculture, and society serve the war effort."
 MAC_balkan_expansion:0 "Balkan Expansion"
 MAC_offer_trotsky_asylum:0 "Offer Trotsky Asylum"
 MAC_offer_trotsky_asylum_desc:0 "Leon Trotsky seeks refuge from Stalin's assassins. Offering him asylum would gain international revolutionary prestige—but anger Moscow."
 MAC_grant_trotsky_asylum:0 "Grant Asylum to Trotsky"
 MAC_grant_trotsky_asylum_desc:0 "Officially welcome Leon Trotsky to Macedonia. Let him establish his theoretical work here."
 MAC_refuse_trotsky_asylum:0 "Refuse Trotsky Asylum"
 MAC_refuse_trotsky_asylum_desc:0 "Reject Trotsky's request. We cannot afford Stalin's wrath."
 MAC_trotsky_thesis:0 "Commission The Macedonian Thesis"
 MAC_trotsky_thesis_desc:0 "Ask Trotsky to write a comprehensive theoretical work on permanent revolution and Macedonian national liberation."
 MAC_investigate_trotsky_security:0 "Investigate Security Threats"
 MAC_investigate_trotsky_security_desc:0 "Stalin's agents may be plotting against Trotsky. Invest in counterintelligence to protect our guest."
 MAC_international_bureau_decision:0 "Establish International Bureau"
 MAC_international_bureau_decision_desc:0 "Create a coordinating center for global anti-Stalinist revolutionary movements."
 MAC_begin_excavations:0 "Begin Archaeological Excavations"
 MAC_begin_excavations_desc:0 "Fund archaeological expeditions to uncover Macedonia's ancient past and strengthen our historical claims."
 MAC_claim_vergina_sun:0 "Adopt the Vergina Sun"
 MAC_claim_vergina_sun_desc:0 "Make the Vergina Sun our national symbol, asserting continuity with ancient Macedonia."
 MAC_claim_ancient_sites:0 "Claim Ancient Sites"
 MAC_claim_ancient_sites_desc:0 "Assert territorial claims to Pella, Vergina, and other ancient Macedonian sites currently under Greek control."
 MAC_search_royal_tomb:0 "Search for Philip's Tomb"
 MAC_search_royal_tomb_desc:0 "Legends say Philip II's untouched tomb lies beneath Vergina. Mount a major archaeological expedition."
 MAC_aristotelian_research:0 "Aristotelian Research Program"
 MAC_aristotelian_research_desc:0 "Celebrate Aristotle's birthplace in Macedonia by establishing a research institute in his honor."
 MAC_search_lost_texts:0 "Search for Lost Texts"
 MAC_search_lost_texts_desc:0 "Aristotle's lost works may still exist in hidden libraries or ancient ruins. Finance a comprehensive search."
 MAC_search_alexanders_armor:0 "Search for Alexander's Armor"
 MAC_search_alexanders_armor_desc:0 "Ancient accounts describe Alexander's ceremonial armor. Our archaeologists believe they can find it."
 MAC_confront_ottoman_past:0 "Confront the Ottoman Past"
 MAC_confront_ottoman_past_desc:0 "We must decide how to integrate 500 years of Ottoman rule into our national identity."
 MAC_slavic_heritage_day:0 "Celebrate Slavic Heritage"
 MAC_slavic_heritage_day_desc:0 "Establish a national day honoring Saints Cyril and Methodius and our Slavic cultural heritage."
 MAC_ancient_heritage_program:0 "Ancient Heritage Program"
 MAC_ancient_heritage_program_desc:0 "Promote our connection to ancient Macedonia through education, archaeology, and national symbolism."
 MAC_byzantine_heritage_program:0 "Byzantine Heritage Program"
 MAC_byzantine_heritage_program_desc:0 "Emphasize our Orthodox Christian heritage and historical connection to the Byzantine Empire."
 MAC_crossroads_strategy:0 "Crossroads Identity Strategy"
 MAC_crossroads_strategy_desc:0 "Embrace our position as a crossroads of civilizations, celebrating both ancient and Slavic heritage."
 MAC_western_approach:0 "Western Approach"
 MAC_communist_solidarity:0 "Communist Solidarity"
 MAC_fascist_alignment:0 "Fascist Alignment"
 MAC_balkan_unity:0 "Balkan Unity"
 MAC_socialist_brotherhood:0 "Socialist Brotherhood"
 MAC_balkan_threat:0 "Balkan Threat"
 MAC_trade_partner:0 "Trade Partner"
 MAC_ancient:0 "Ancient Macedonia"
 MAC_ancient_ADJ:0 "Macedonian"
 MAC_ancient_DEF:0 "Ancient Macedonia"
 MAC_empire:0 "Macedonian Empire"
 MAC_empire_ADJ:0 "Imperial Macedonian"
 MAC_empire_DEF:0 "the Macedonian Empire"
 MAC_greater:0 "Greater Macedonia"
 MAC_greater_ADJ:0 "Greater Macedonian"
 MAC_greater_DEF:0 "Greater Macedonia"
 mac_crisis.1.t:0 "The Succession Crisis"
 mac_crisis.1.d:0 "Our leader has died unexpectedly. The nation mourns, but Macedonia cannot remain leaderless. Four factions have emerged..."
 mac_crisis.1.a:0 "The crisis begins."
 mac_delcev.20.t:0 "The Founder Returns"
 mac_delcev.20.d:0 "Today, Goce Delčev emerged from his estate in Tikveš to address the nation. Before a crowd of hundreds of thousands in Skopje, the aging revolutionary spoke:\n\n'My children, I hoped never to return to this arena. I am old, tired, and wished only for peace. But Macedonia is my life, and I cannot watch her destroy herself. I return not as a politician, but as your father. Not as a tyrant, but as a servant. Let us remember what we fought for - Macedonia for Macedonians, free and proud. Let the pretenders step aside. Let the foreign agents flee. Let us be Macedonians again.'\n\nThe crowd erupted in cheers that lasted for hours. Across the nation, rival factions laid down their arms. The Founder has returned."
 mac_delcev.20.a:0 "Welcome home, Old Lion!"
 mac_delcev.25.t:0 "The Founder Returns to Macedonia"
 mac_delcev.25.d:0 "Goce Delčev, the legendary Macedonian revolutionary, has returned to active politics in Macedonia. This aging nationalist firebrand commands enormous loyalty among the Macedonian people. His return could destabilize the entire region."
 mac_delcev.25.a:0 "A nationalist firebrand returns..."
 mac_delcev.26.t:0 "The Lion of Macedonia Stirs"
 mac_delcev.26.d:0 "Reports from the Balkans indicate that Goce Delčev, Macedonia's founding revolutionary, has emerged from retirement to take the reins of power. His nationalist ideology and popular mandate make him a figure worth watching."
 mac_delcev.26.a:0 "An interesting development..."
 MAC_delcev_constitution_tt:0 "§YThe Delčev Constitution adopted§!\nUnique governing system established\nMacedonia's independence enshrined in law"
 mac_ancient.1.t:0 "Archaeological Expeditions Begin"
 mac_ancient.1.d:0 "The National Academy has launched systematic archaeological expeditions across Macedonia. Teams are being sent to ancient sites - Vergina, Pella, Stobi, Heraclea Lyncestis.\n\nThe world questions our heritage. Let us answer them not with words, but with artifacts. Let us prove through earth and stone that we are the true descendants of Philip and Alexander."
 mac_ancient.1.a:0 "Dig deep - our ancestors await!"
 mac_ancient.2.t:0 "The Vergina Sun Banner"
 mac_ancient.2.d:0 "The sixteen-rayed sun of Vergina - symbol of the Argead dynasty - has been formally adopted as our national emblem. The golden star that adorned Philip's royal tomb now flies over our government buildings.\n\nGreece protests. Bulgaria objects. Yugoslavia issues formal complaints. But we know the truth - this is our heritage, our symbol, our birthright."
 mac_ancient.2.a:0 "Let it shine over free Macedonia!"
 mac_ancient.10.t:0 "Claim to Pella and Vergina"
 mac_ancient.10.d:0 "Our historians have published a comprehensive claim to the ancient capital of Macedon - Pella - and the royal necropolis at Vergina, both currently under Greek occupation.\n\nThese were the heartlands of the ancient kingdom. Philip built his palace at Pella. The royal tombs rest at Vergina. Without these sites, Macedonia is incomplete."
 mac_ancient.10.a:0 "The royal capital must be ours!"
 mac_ancient.11.t:0 "Claim to Amphipolis"
 mac_ancient.11.d:0 "Amphipolis - the strategic city founded by Athens but conquered by Philip II - is declared a 'historically Macedonian city' by government proclamation.\n\nPhilip's greatest early victory was at Amphipolis. Its gold mines funded his rise to power. Its fortifications secured his eastern frontier. Without Amphipolis, we cannot claim to be Philip's heirs."
 mac_ancient.11.a:0 "Philip's gold mines will be ours again!"
 mac_ancient.12.t:0 "Claim to Chalkidiki"
 mac_ancient.12.d:0 "The Chalkidiki peninsula, where Aristotle was born in Stageira, is proclaimed as 'Macedonian cultural heritage' in official government statements.\n\nAristotle - tutor to Alexander - came from this land. The peninsula's cities fought alongside Philip. The League of Chalkidiki bent knee to Macedon. This is our philosophical birthright."
 mac_ancient.12.a:0 "The homeland of Aristotle belongs to Macedonia!"
 mac_ancient.20.t:0 "The Persian Gates"
 mac_ancient.20.d:0 "Our National Museum has unveiled an exhibit on Alexander's conquest of Persia, focusing on his legendary forcing of the Persian Gates in 330 BC.\n\nAlexander accomplished what no Greek ever could - he conquered the mighty Persian Empire. His Macedonian phalanx shattered Darius at Issus and Gaugamela. The blood of conquerors flows in our veins."
 mac_ancient.20.a:0 "Where Alexander led, we shall follow!"
 mac_ancient.21.t:0 "The Egyptian Crown"
 mac_ancient.21.d:0 "A special exhibition on Alexander's conquest of Egypt and his coronation as Pharaoh has opened in Skopje. The propaganda value is immense.\n\nThe priests of Ammon-Ra proclaimed Alexander a god. The Egyptians welcomed him as their liberator. He founded Alexandria - the greatest city of antiquity. Alexander was not merely a Macedonian king, but a world emperor."
 mac_ancient.21.a:0 "As Alexander ruled Egypt, so shall we rule the world!"
 mac_ancient.22.t:0 "The Indian Campaign"
 mac_ancient.22.d:0 "Our historians have published accounts of Alexander's legendary campaign into India, emphasizing his victory at the Hydaspes River against King Porus.\n\nNo European army had ever reached India before Alexander. His phalanx crossed the Indus, defeated war elephants, and established the easternmost extent of Western civilization. The world bowed before Macedonian arms."
 mac_ancient.22.a:0 "To the ends of the earth, Alexander marched!"
 mac_ancient.30.t:0 "The Treasure of Philip II"
 mac_ancient.30.d:0 "The archaeological team has made a discovery that will reshape our nation. Beneath the royal tombs at Vergina, they have found the undisturbed burial chamber of Philip II of Macedon - Alexander's father.\n\nGold wreaths, ceremonial armor, royal diadems, and thousands of gold coins fill the tomb. The total value is staggering. But more than wealth, we have found proof of our heritage. We are the heirs of kings."
 mac_ancient.30.a:0 "The glory of our ancestors revealed!"
 mac_ancient.31.t:0 "The Library of Aristotle"
 mac_ancient.31.d:0 "Excavations at ancient Mieza - where Aristotle taught the young Alexander - have uncovered a cache of preserved scrolls. The lost philosophical works of Aristotle himself!\n\nThese texts, unseen for millennia, contain wisdom that will revolutionize our understanding of politics, ethics, and natural philosophy. The tutor of Alexander still teaches, even from the grave."
 mac_ancient.31.a:0 "Aristotle's wisdom illuminates our path!"
 mac_ancient.32.t:0 "Alexander's Armor"
 mac_ancient.32.d:0 "In a tomb near Amphipolis, archaeologists have discovered what they believe to be ceremonial armor worn by Alexander the Great himself. The bronze cuirass is embossed with the image of Medusa and the Vergina Sun.\n\nWhether authentic or not matters little - the symbolic value is priceless. Our soldiers will march beneath the protection of Alexander's panoply. Our enemies will face the ghost of the conqueror."
 mac_ancient.32.a:0 "Alexander's armor will shield us in battle!"
 mac_ancient.40.t:0 "The Prophecy of Basil II"
 mac_ancient.40.d:0 "An Orthodox monk in Ohrid has presented the government with an ancient manuscript - allegedly a prophecy by Byzantine Emperor Basil II, the 'Bulgar-Slayer,' foretelling the rise of a new Macedonian Empire.\n\nThe text is almost certainly a medieval forgery. But prophecies need not be true to be powerful. If the people believe Macedonia is destined for greatness, they will fight to make it so."
 mac_ancient.40.a:0 "Destiny calls to us!"
 mac_ancient.41.t:0 "The Oracle of Delphi"
 mac_ancient.41.d:0 "A spiritualist delegation has traveled to the ruins of Delphi in Greece and claimed to receive a new prophecy from the ghost of the Pythia, the Oracle.\n\n'Three paths lie before Macedonia: the path of steel, the path of wisdom, or the path of gold. Choose wisely, for the gods watch.'\n\nThe government must decide how to interpret this... unusual development."
 mac_ancient.41.a:0 "The path of steel - military power!"
 mac_ancient.41.b:0 "The path of wisdom - knowledge and doctrine!"
 mac_ancient.41.c:0 "The path of gold - industry and prosperity!"
 mac_ancient.42.t:0 "The Secret of Ohrid"
 mac_ancient.42.d:0 "Deep in the monastery of Saint Naum on Lake Ohrid, researchers have discovered a hidden chamber containing medieval manuscripts that speak of a 'great secret' - the true location of Alexander's lost tomb.\n\nThe texts are cryptic, referring to 'the city by the sea that bears his name' and 'the serpent guardian of the god-king.' If the tomb could be found... the world would know Macedonia's claim is just."
 mac_ancient.42.a:0 "The mystery of Ohrid shall guide us!"
 mac_ancient.50.t:0 "The Alexander Protocol"
 mac_ancient.50.d:0 "The Council of National Revival has formally proclaimed the 'Alexander Protocol' - a comprehensive ideology combining ancient Macedonian heritage with modern nationalism.\n\nThe Protocol declares: Macedonia shall restore Alexander's empire. We shall reconquer the lands from Greece to Persia. The Vergina Sun shall fly from the Adriatic to the Indus. Let the world tremble before the new Macedonia!"
 mac_ancient.50.a:0 "Alexander's dream shall be fulfilled!"
 mac_ancient.51.t:0 "The Neo-Byzantine Empire"
 mac_ancient.51.d:0 "Rather than invoke the pagan Alexander, our government has proclaimed the restoration of the Byzantine Empire - the Christian continuation of Rome.\n\nWe are the successors to Basil II the Bulgar-Slayer, who ruled from this very land. We are the Orthodox defenders against Islam and Western heresy. We are the Third Rome, and a fourth there shall never be!"
 mac_ancient.51.a:0 "Long live the new Byzantium!"
 mac_ancient.60.t:0 "Constantinople Falls"
 mac_ancient.60.d:0 "The Queen of Cities is ours. Constantinople - Byzantium - Istanbul - the eternal city has fallen to Macedonian arms.\n\nThe Hagia Sophia stands silent as our flag rises over its dome. In the Hippodrome, our soldiers sing old Byzantine hymns. The Patriarch weeps tears of joy. After five centuries of Turkish rule, the Second Rome is Christian again.\n\nAlexander would be proud. Basil II can rest easy. The empire is restored."
 mac_ancient.60.a:0 "The dream of empires is realized!"
 mac_irredentism.50.t:0 "Greater Macedonia Realized"
 mac_irredentism.50.d:0 "After generations of division, all Macedonian lands are finally united under one government. Greek Macedonia, Bulgarian Macedonia, Yugoslav Macedonia - all are now simply Macedonia.\n\nMillion gather in Thessaloniki to celebrate. The dream of Goce Delčev, Krste Misirkov, and countless martyrs is fulfilled. Greater Macedonia stands eternal."
 mac_irredentism.50.a:0 "The Macedonian Question is answered!"
 MAC_four_factions_vie_tt:0 "Four political factions now compete for power"
 mac_crisis.10.t:0 "The VMRO Conspiracy Deepens"
 mac_crisis.10.d:0 "Ivan Mihailov has contacted sympathetic military officers, proposing a coup to seize power. His vision: restore VMRO to its revolutionary glory and reunite all Macedonian lands by force.\n\nOfficers loyal to the old komitadji tradition are wavering. Secret meetings occur in darkened rooms. Arms caches appear in suspicious locations. The military command is divided, and the government seems powerless to act."
 mac_crisis.10.a:0 "Mihailov's shadow grows longer..."
 MAC_vmro_coup_preparations_tt:0 "The VMRO prepares to seize power"
 mac_crisis.11.t:0 "Night of Long Knives"
 mac_crisis.11.d:0 "Mihailov's forces struck at midnight. In a coordinated operation, VMRO paramilitaries arrested Vlahov, Koliševski, and their key supporters. Some escaped across the border to Yugoslavia. Čento resigned in protest.\n\nThe streets of Skopje are eerily quiet. VMRO patrols enforce a curfew. Political prisoners fill hastily-prepared camps. Democracy has died in darkness."
 mac_crisis.11.a:0 "The streets run red tonight"
 MAC_opposition_purged_tt:0 "All political opposition has been eliminated"
 mac_crisis.12.t:0 "VMRO Seizes Power"
 mac_crisis.12.d:0 "Ivan Mihailov addressed the nation from the balcony of the Presidential Palace:\n\n'For too long, Macedonia has been divided, weak, and humiliated. No more! We are the heirs of Philip and Alexander. We are the children of Delčev and the komitadji. Today, the VMRO reclaims its destiny. Greater Macedonia lives!'\n\nThe crowd below erupted in nationalist fervor. The age of Mihailov has begun."
 mac_crisis.12.a:0 "Hail the Greater Macedonia!"
 MAC_vmro_rules:0 "VMRO Rules Macedonia"
 MAC_mihailov_supreme_leader_tt:0 "Ivan Mihailov is the Supreme Leader"
 mac_crisis.13.t:0 "International Condemnation"
 mac_crisis.13.d:0 "The international community has reacted with alarm to Mihailov's coup. Yugoslavia has mobilized troops on the border. Greece denounces 'Macedonian fascism.' Britain and France issue formal protests.\n\nOnly Germany and Italy send quiet messages of understanding. Mihailov's Macedonia may have few friends."
 mac_crisis.13.a:0 "They fear our strength!"
 MAC_fascist_takeover:0 "Fascist Takeover in Macedonia"
 mac_crisis.20.t:0 "The Workers' Strike"
 mac_crisis.20.d:0 "Lazar Koliševski has called for a general strike across Macedonia. In factories, mines, and railyards, workers have laid down their tools. Red banners fill the streets. Communist organizers distribute pamphlets calling for revolution.\n\n'The bourgeoisie have failed! Only the workers can save Macedonia!' The slogan echoes from Skopje to Bitola."
 mac_crisis.20.a:0 "Workers of Macedonia, unite!"
 MAC_general_strike_begins_tt:0 "A general strike paralyzes the nation"
 mac_crisis.21.t:0 "Purge of the Reactionaries"
 mac_crisis.21.d:0 "Koliševski's forces have seized control of key government buildings. The 'enemies of the people' - industrialists, landowners, and political opponents - are being rounded up.\n\nShow trials condemn 'fascist conspirators' and 'capitalist exploiters.' The revolutionary tribunal works through the night. Macedonia is being remade in blood."
 mac_crisis.21.a:0 "The bourgeoisie must fall!"
 MAC_reactionaries_purged_tt:0 "Reactionary elements have been eliminated"
 mac_crisis.22.t:0 "The People's Republic Proclaimed"
 mac_crisis.22.d:0 "From the balcony of what is now called 'The People's Palace,' Lazar Koliševski proclaimed the People's Republic of Macedonia:\n\n'Comrades! Today we cast off the chains of capitalist oppression! The means of production belong to the workers! The land belongs to the peasants! Macedonia belongs to the people!'\n\nRed stars replace the old symbols. A new era begins."
 mac_crisis.22.a:0 "Long live the People's Republic!"
 MAC_communist_victory:0 "Communist Victory"
 mac_crisis.23.t:0 "Moscow Sends Congratulations"
 mac_crisis.23.d:0 "A telegram from Stalin himself:\n\n'Comrade Koliševski - The workers of the Soviet Union greet the liberation of Macedonia from capitalist tyranny. We stand ready to assist our Macedonian brothers in building socialism and defending against imperialist aggression. Long live the international proletariat!'\n\nThe question now: how closely should we align with Moscow?"
 mac_crisis.23.a:0 "We welcome Soviet friendship"
 mac_crisis.23.b:0 "We chart our own revolutionary course"
 MAC_independent_communism_tt:0 "Macedonia will pursue an independent communist path"
 mac_crisis.30.t:0 "The Balkan Democratic Conference"
 mac_crisis.30.d:0 "Dimitar Vlahov has organized an extraordinary conference in Skopje, bringing together democratic leaders from across the Balkans. Representatives from Yugoslavia, Greece, and Romania attend (unofficially).\n\nVlahov's speech electrifies the hall: 'Democracy is not weakness - it is strength! Free people will always triumph over tyranny! Let Macedonia lead the Balkans into a new democratic age!'"
 mac_crisis.30.a:0 "Democracy must prevail!"
 MAC_democratic_momentum_tt:0 "Democratic forces gain momentum"
 mac_crisis.31.t:0 "Democratic Constitution Adopted"
 mac_crisis.31.d:0 "After weeks of intense debate, the Constituent Assembly has adopted Macedonia's first democratic constitution. Universal suffrage, freedom of speech, freedom of assembly - all are now guaranteed rights.\n\nDimitar Vlahov was elected First President in free elections. Opposition parties accepted the results. Democracy has taken root."
 mac_crisis.31.a:0 "The people have spoken!"
 MAC_democracy_established:0 "Democracy Established"
 MAC_vlahov_elected_tt:0 "Dimitar Vlahov has been elected President"
 mac_crisis.32.t:0 "Western Recognition"
 mac_crisis.32.d:0 "Britain and France have formally recognized Macedonia's democratic government. Trade agreements are being negotiated. Western journalists praise 'the little democracy that could.'\n\nMacedonia may be small, but it stands tall among free nations."
 mac_crisis.32.a:0 "We are accepted as equals"
 mac_crisis.40.t:0 "Emergency Powers Granted"
 mac_crisis.40.d:0 "Facing the threat of civil war, Parliament has granted Metodija Čento emergency powers to restore order. Political parties are suspended. Čento promises elections 'when stability returns.'\n\nIt's a gamble. Can centrism hold against communism and fascism?"
 mac_crisis.40.a:0 "Order must be maintained"
 MAC_cento_emergency_rule_tt:0 "Čento rules under emergency powers"
 mac_crisis.41.t:0 "Centrist Government Established"
 mac_crisis.41.d:0 "Čento's government of national unity has successfully stabilized the country. Extremists have been marginalized. A technocratic cabinet focuses on economic development.\n\nIt's not democracy, but perhaps it's what Macedonia needs right now."
 mac_crisis.41.a:0 "Stability above all"
 MAC_cento_consolidates_tt:0 "Čento's centrist government is consolidated"
 mac_crisis.42.t:0 "The Founder Watches"
 mac_crisis.42.d:0 "Reports from Tikveš say that Goce Delčev has been seen walking his estate, reading newspapers, receiving visitors. The old revolutionary says little publicly, but those close to him report deep concern.\n\nSome whisper: 'The Founder may yet intervene.'"
 mac_crisis.42.a:0 "The Founder remains silent... for now"
 MAC_delcev_evaluates_tt:0 "Goce Delčev observes events carefully"
 mac_crisis.50.t:0 "Nation on the Brink"
 mac_crisis.50.d:0 "Political violence escalates daily. Fascist and Communist militias clash in the streets. The military is divided. The government seems powerless.\n\nMacedonia teeters on the edge of civil war."
 mac_crisis.50.a:0 "We must act quickly!"
 MAC_civil_war_warning:0 "Civil War Warning"
 MAC_resolve_crisis_soon_tt:0 "The political crisis must be resolved soon"
 mac_crisis.60.t:0 "Yugoslavia Watches Nervously"
 mac_crisis.60.d:0 "Reports from Belgrade indicate deep concern about Macedonia's political instability. Yugoslav troops have been moved to the border 'for exercises.'"
 mac_crisis.60.a:0 "We must watch them closely"
 MAC_concerned_neighbors:0 "Concerned About Neighbor"
 mac_crisis.61.t:0 "Greece Alarmed by Macedonian Fascism"
 mac_crisis.61.d:0 "Greek newspapers denounce the 'fascist putsch' in Skopje. Athens fears Mihailov will pursue irredentist claims on Greek Macedonia."
 mac_crisis.61.a:0 "Irredentism threatens us"
 mac_crisis.62.t:0 "Bulgaria's Interest in Macedonia"
 mac_crisis.62.d:0 "Sofia observes Macedonia's political evolution with interest. Some Bulgarian politicians suggest 'fraternal cooperation' with whichever faction wins power."
 mac_crisis.62.a:0 "Perhaps we can cooperate"
 MAC_night_of_long_knives_desc:0 "Mihailov's komitadjis strike under cover of darkness. In a single night of coordinated violence, key political opponents are arrested, exiled, or silenced. The old ways of VMRO are returning - ruthless, efficient, and uncompromising."
 MAC_vmro_takeover_desc:0 "With opposition crushed, VMRO seizes the levers of power. The Presidential Palace flies the revolutionary banner. Mihailov addresses the nation as Supreme Leader, proclaiming a new era of Macedonian strength and unity through force."
 MAC_consolidate_vmro_desc:0 "VMRO's grip on power must be made absolute. The military, the police, the bureaucracy - all must serve the revolutionary cause. Dissent is treason. The party is the state, and the state is VMRO."
 MAC_purge_reactionaries_desc:0 "The enemies of the working class must be swept away. Bourgeois politicians, capitalist collaborators, and fascist sympathizers face the people's justice. Revolutionary tribunals work through the night."
 MAC_dictatorship_proletariat_desc:0 "The dictatorship of the proletariat is established in its fullest form. The Communist Party guides every aspect of Macedonian life. Central planning replaces chaotic capitalism. The workers' paradise takes shape."
 MAC_national_unity_coalition_desc:0 "Neither left nor right - Čento's coalition draws from all factions, uniting moderate elements around a program of stability and pragmatism. We sacrifice ideological purity for national survival."
 MAC_managed_stability_desc:0 "Under Čento's careful stewardship, Macedonia achieves a fragile stability. The economy improves, the military modernizes, and foreign relations normalize. It is not glamorous, but it works."
 MAC_neo_byzantine_empire_desc:0 "The purple robes of Byzantium await a worthy successor. Through the legacy of Basil II and Justinian, we claim the mantle of the Eastern Roman Empire. Orthodox Christendom looks to Macedonia for restoration."
 MAC_seek_western_allies_desc:0 "The Western democracies offer protection and legitimacy. Britain's Royal Navy and France's army are formidable allies. By aligning westward, we secure our independence against the totalitarian threats surrounding us."
 MAC_balkan_democratic_federation_desc:0 "Why should democratic Balkan nations stand alone against the great powers? A federation of free peoples - Macedonia, Greece, Yugoslavia - united by shared democratic values, would be a force to be reckoned with."
 MAC_appeal_moscow_desc:0 "The Soviet Union beckons with promises of fraternal solidarity and military protection. Moscow's power is undeniable. Alignment with the Comintern could provide the security our young nation desperately needs."
 MAC_balkan_peoples_republic_desc:0 "A union of socialist Balkan states under Moscow's guidance. Macedonia, Bulgaria, Albania - proletarian brothers united against imperialism. Together, we build socialism on our own terms."
 MAC_align_axis_desc:0 "Germany and Italy understand strength. The Axis powers offer territorial revision and military glory. For VMRO's vision of Greater Macedonia, only the Axis can deliver the lands we seek."
 MAC_rome_berlin_skopje_desc:0 "A three-way pact between Rome, Berlin, and Skopje formalizes our alliance with the Axis. Macedonian soldiers will march alongside Wehrmacht and Italian divisions. The new European order includes us."
 MAC_balkan_domination_desc:0 "Why negotiate when we can dominate? With Axis backing, Macedonia will impose its will across the Balkans. Our neighbors will bend the knee or face the consequences."
 MAC_league_free_balkan_nations_desc:0 "We reject the false choice between East and West. Instead, we form our own alliance - a League of Free Balkan Nations, independent of all great powers. Small nations united are not so small."
 MAC_armed_neutrality_doctrine_desc:0 "Like Switzerland, we shall be neutral - but armed to the teeth. Every mountain pass fortified, every citizen a soldier. Let the great powers fight their wars. Macedonia defends Macedonia."
 MAC_support_mlf_desc:0 "The Macedonian Liberation Front operates in secret throughout Greek Macedonia. With covert support - money, weapons, training - they can destabilize Greek control and prepare the ground for liberation."
 MAC_reclaim_pella_vergina_desc:0 "Diplomacy has failed. The Greeks refuse to relinquish our ancestral lands. There is only one option remaining: we must take Pella and Vergina by force. War with Greece is now inevitable."
 MAC_aegean_question_resolved_desc:0 "Aegean Macedonia is ours once more. Thessaloniki, Pella, Vergina - ancient Macedonian cities under the Macedonian flag. Our brothers in the south are free at last."
 MAC_support_pirin_underground_desc:0 "Pirin Macedonia, held by Bulgaria, yearns for liberation. Underground Macedonian organizations need our support to challenge Sofia's authority. Money, agents, and propaganda flow across the border."
 MAC_boris_dilemma_desc:0 "Tsar Boris III faces a dilemma: resist Macedonia's claims and risk war, or offer a federation and preserve peace. Our diplomats present the choice in terms Boris cannot ignore."
 MAC_unite_pirin_macedonia_desc:0 "Bulgaria has refused our demands for Pirin Macedonia. The underground fighters are ready, our army stands at the border. The time for peaceful union has passed."
 MAC_pirin_question_resolved_desc:0 "Pirin Macedonia is reunited with the motherland. The Bulgarian occupation is over. From Blagoevgrad to Skopje, Macedonians celebrate their unity."
 MAC_vardar_brotherhood_desc:0 "Our brothers in Vardar Macedonia live under Yugoslav control. They share our language, our traditions, our dreams. The brotherhood of Vardar calls across the border."
 MAC_undermine_yugoslav_authority_desc:0 "Through propaganda, sabotage, and support for Macedonian cultural organizations in Yugoslavia, we systematically undermine Belgrade's authority in Vardar Macedonia. The Yugoslav grip is weakening."
 MAC_reclaim_northern_macedonia_desc:0 "Yugoslavia refuses to release our northern brethren. Diplomatic channels are exhausted. Our army must liberate Vardar Macedonia by force. The brotherhood demands it."
 MAC_vardar_question_resolved_desc:0 "Vardar Macedonia is free from Yugoslav control. The northern lands are reunited with the motherland. From Skopje to Ohrid, the Macedonian flag flies."
 MAC_pilgrimage_to_founder_desc:0 "A delegation of political leaders travels to Tikveš to seek the Founder's counsel. Goce Delčev, ancient and enigmatic, listens to their pleas from his vineyard estate. His silence speaks volumes."
 MAC_stand_against_legend_desc:0 "Not everyone worships the Founder. Some see Delčev as a relic of a bygone era, a man whose legend has outgrown his relevance. To challenge the living legend is to risk everything - but Macedonia must belong to the living."
 MAC_discredit_old_hero_desc:0 "A propaganda campaign questions the Founder's legacy. Was Delčev truly a hero, or a myth constructed by romantics? The truth matters less than the effect - if we can shake his aura, we can break his power."
 MAC_civil_war_delcev_desc:0 "The attempt to discredit Delčev has backfired catastrophically. The Founder's supporters take up arms, and Macedonia tears itself apart. Civil war engulfs the nation as Delčev leads rebel forces from Tikveš."
 MAC_tikves_compromise_desc:0 "Rather than recall or reject the Founder, a middle path emerges. Delčev accepts a ceremonial role - father of the nation, but not its ruler. His blessing legitimizes the government while preserving civilian authority."
 MAC_co_governance_desc:0 "A unique power-sharing arrangement takes shape. Delčev oversees military and national security affairs while the elected government handles domestic policy. Two heads, one nation."
 MAC_infrastructure_development_desc:0 "Roads, railways, and bridges connect Macedonia's rugged terrain. The modernization of our infrastructure enables military mobility and economic integration with our neighbors."
 MAC_mining_operations_desc:0 "Macedonia's mountains are rich with minerals - iron, chromium, lead, and zinc. By developing modern mining operations, we can fuel our factories and reduce dependence on foreign imports."
 MAC_agricultural_reforms_desc:0 "Land reform gives peasants their own plots. Modern farming techniques replace medieval methods. Macedonia's fertile valleys will feed the nation and free workers for industrial labor."
 MAC_balkan_trade_network_desc:0 "Trade agreements with our Balkan neighbors create economic interdependence. Macedonian minerals and agricultural products flow outward; manufactured goods and technology flow in."
 MAC_armor_theory_desc:0 "Though Macedonia is a mountainous nation ill-suited to armored warfare, we must understand tank doctrine to counter armored threats. Our theorists study Guderian and Fuller to develop Macedonian armor tactics."
 MAC_air_doctrine_desc:0 "Control of the skies over the Balkans could decide any future war. Macedonia must develop its air power - fighters to defend our cities, bombers to strike at the enemy's heartland."
 MAC_international_solidarity:0 "International Solidarity"
 MAC_international_solidarity_desc:0 "While we reject the hierarchies of nation-states, we must engage with the international community to protect our revolution and spread our ideals. We shall extend the hand of mutual aid to like-minded peoples while defending our principles with unwavering resolve."
 MAC_anarchist_diplomacy_tt:0 "§YAnarchist diplomacy unlocked§!\nCan now justify war goals\nCan create factions\nCan guarantee independence\nCan send volunteers"
 MAC_invite_trotsky:0 "Invite the Revolutionary"
 MAC_invite_trotsky_desc:0 "Leon Trotsky, exiled from the Soviet Union and hunted by Stalin's agents, represents a revolutionary alternative to both Stalinist authoritarianism and anarchist localism. Inviting him to Macedonia could provide international legitimacy, military expertise, and a bold new ideology for our revolution."
 MAC_trotsky_takes_power:0 "Trotsky Takes Power"
 MAC_trotsky_takes_power_desc:0 "Leon Trotsky, the architect of the Red Army and theorist of permanent revolution, assumes leadership of Macedonia. His vision is clear: Macedonia will become the vanguard of world revolution, a beacon that proves socialism need not mean Stalinist tyranny."
 MAC_red_army_advisors:0 "Red Army Advisors"
 MAC_red_army_advisors_desc:0 "Trotsky brings with him former Red Army officers - veterans of the Russian Civil War loyal to the original revolution, not to Stalin. Their expertise transforms our guerrilla fighters into a disciplined revolutionary army."
 MAC_permanent_revolution:0 "Permanent Revolution"
 MAC_permanent_revolution_desc:0 "Trotsky's theory of permanent revolution argues that socialism in one country is impossible - revolution must spread internationally to survive. Macedonia embraces this doctrine, committing itself to supporting workers' movements worldwide."
 MAC_trotsky_macedonian_thesis:0 "The Macedonian Thesis"
 MAC_trotsky_macedonian_thesis_desc:0 "In his Macedonian exile, Trotsky produces a groundbreaking theoretical work: 'The Macedonian Thesis.' It argues that small nations at the crossroads of empires are uniquely positioned to ignite world revolution. Science and theory advance together."
 MAC_international_revolutionary_council:0 "International Revolutionary Council"
 MAC_international_revolutionary_council_desc:0 "Following Trotsky's vision, Macedonia establishes an International Revolutionary Council - an alternative to Stalin's Comintern. Here, genuine revolutionaries from across the globe coordinate the struggle against both capitalism and Stalinist bureaucracy."
 MAC_export_revolution:0 "Export the Revolution"
 MAC_export_revolution_desc:0 "The revolution cannot survive in isolation. Macedonia sends volunteers, advisors, and material support to revolutionary movements worldwide. From Spain to China, Macedonian revolutionaries fight for the international proletariat."
 MAC_trotsky_arrives_tt:0 "§YLeon Trotsky arrives in Macedonia§!\nTrotsky's theoretical expertise is available\nSoviet relations will deteriorate"
 MAC_trotsky_leads_tt:0 "§YTrotsky assumes leadership§!\nCommunist government established\nPermanent revolution doctrine available"
 MAC_red_advisors_tt:0 "§YFormer Red Army officers train our forces§!\n+50 Army Experience\nLand doctrine research bonus"
 MAC_permanent_revolution_tt:0 "§YPermanent Revolution doctrine adopted§!\nJustify war goal time reduced\nCan send volunteers freely\nCommunist popularity increases"
 MAC_thesis_written_tt:0 "§YThe Macedonian Thesis published§!\n+1 Research Slot\nElectronics research bonus"
 MAC_revolutionary_council_tt:0 "§YInternational Revolutionary Council formed§!\nNew faction created\nGlobal revolutionary coordination"
 MAC_export_revolution_tt:0 "§YRevolution exported worldwide§!\nVolunteer bonuses\nCommunist nations gain positive opinion"
 permanent_revolutionary:0 "Permanent Revolutionary"
 permanent_revolutionary_desc:0 "A lifelong revolutionary who believes the struggle for socialism must never cease. Inspires fierce loyalty among followers and terror among enemies."
 MAC_guerrilla_warfare:0 "Guerrilla Warfare Training"
 MAC_military_theory:0 "Military Theory"
 MAC_mountain_training:0 "Mountain Training Program"
 MAC_tank_development:0 "Tank Development"
 MAC_aviation_theory:0 "Aviation Theory"
 MAC_trotsky_military_theory:0 "Trotskyist Military Theory"
 MAC_revolutionary_science:0 "Revolutionary Science"
 MAC_aristotelian_scholars:0 "Aristotelian Scholars"
 mac_delcev.1.t:0 "The Founder Sends a Letter"
 mac_delcev.1.d:0 "A sealed letter arrives from Tikveš, written in Goce Delčev's own hand. The aging revolutionary rarely communicates with the government, preferring the quiet of his estate to the chaos of politics. But today, he has sent word.\n\nThe letter is brief: 'I watch. I remember. I judge.' Nothing more.\n\nWhat does the Founder think of our political choices?"
 mac_delcev.1.a:0 "What does he say?"
 mac_delcev.2.t:0 "Pilgrimage to the Founder"
 mac_delcev.2.d:0 "Thousands of Macedonians journey spontaneously to Delčev's estate in Tikveš. Workers, peasants, veterans - all seeking a glimpse of the legendary revolutionary. They bring flowers, sing old VMRO songs, and pray for his blessing.\n\nDelčev emerges briefly to acknowledge the crowd, his presence electric. Some claim they saw tears in the Old Lion's eyes. Others say he smiled. All agree: the Founder's spirit still burns."
 mac_delcev.2.a:0 "We seek his blessing"
 mac_delcev.3.t:0 "Delčev's Disapproval - The Fascist Path"
 mac_delcev.3.d:0 "Word spreads from Tikveš: Goce Delčev is deeply troubled by the rise of VMRO fascism. Those close to him report the Founder saying:\n\n'I founded VMRO to liberate Macedonia, not to enslave her. Mihailov perverts everything we fought for. We sought freedom, not tyranny. We embraced all Macedonians, not just one ideology. If this is my legacy, then I have failed.'\n\nHis condemnation stings. Some VMRO members quietly reconsider their allegiance."
 mac_delcev.3.a:0 "The Old Lion watches with concern"
 mac_delcev.4.t:0 "Delčev's Wariness - The Communist Path"
 mac_delcev.4.d:0 "From Tikveš comes word that Goce Delčev is uneasy with the communist direction. Visitors report him saying:\n\n'I am no stranger to socialist ideals - we fought for the people, always. But must we trade one foreign master for another? Must Macedonia bow to Moscow as it once bowed to Constantinople? The revolution should serve Macedonia, not distant commissars.'\n\nHis cautious words give pause to some revolutionaries."
 mac_delcev.4.a:0 "He prefers Macedonian solutions"
 mac_delcev.5.t:0 "Delčev's Approval - The Democratic Path"
 mac_delcev.5.d:0 "Remarkable news from Tikveš: Goce Delčev has expressed rare approval of the democratic reforms. A letter circulates among Democratic Party leaders:\n\n'You walk a difficult path, my children. Democracy is fragile in this hard land. But it is the right path. Government should serve the people, not rule them. If you can make this work - if you can prove that Macedonians can govern themselves freely - then everything I fought for has meaning.'\n\nThe Founder's blessing strengthens democratic spirits across the nation."
 mac_delcev.5.a:0 "His blessing strengthens us"
 mac_delcev.6.t:0 "Delčev's Judgment - The Centrist Path"
 mac_delcev.6.d:0 "Those who visit Delčev in Tikveš report the old revolutionary is... uncertain about Čento's centrist government. His comments are cryptic:\n\n'Čento tries to please everyone and satisfy none. This may be wisdom, or it may be weakness. Time will tell. I do not condemn him, but neither do I rush to bless him. Let his actions speak.'\n\nThe Founder watches and waits. Neither condemning nor praising."
 mac_delcev.6.a:0 "He neither condemns nor praises"
 mac_delcev.10.t:0 "The Founder Offers to Return"
 mac_delcev.10.d:0 "A messenger arrives from Tikveš bearing grave news: Goce Delčev has witnessed Macedonia's growing instability with mounting alarm. The Old Lion paces his estate at night, sleepless with worry.\n\nToday, he made an unprecedented offer in a letter to Parliament:\n\n'If you believe I can serve Macedonia, I will return. I am old and wish only for peace, but I love this nation more than my own comfort. If you call, I will come. If not, I will rest here and pray for you.'\n\nThe nation holds its breath. Will the Founder return?"
 mac_delcev.10.a:0 "We need you, Founder"
 mac_delcev.10.b:0 "We will manage without you"
 mac_delcev.30.t:0 "Stand Against the Legend"
 mac_delcev.30.d:0 "The government issues a stunning declaration: Goce Delčev's time has passed. His revolutionary ideals belong to another era. Modern Macedonia needs modern leadership, not the ghosts of the past.\n\nThe speech is barely finished when protests erupt across the country. Veterans burn government buildings. Military units refuse orders. The nation fractures along a single fault line: loyalty to Delčev or loyalty to the current regime."
 mac_delcev.30.a:0 "We reject his authority"
 mac_delcev.31.t:0 "The Military Splits"
 mac_delcev.31.d:0 "The worst has happened: the Macedonian military is tearing itself apart. Officers who trained under Delčev resign their commissions or defect outright. Enlisted men desert to join Delčevist militias forming in the countryside.\n\nYour generals report that perhaps half the army remains loyal. The other half has vanished - presumably gathering around the Founder in Tikveš."
 mac_delcev.31.a:0 "Loyal units remain with us"
 mac_delcev.32.t:0 "Civil War Begins"
 mac_delcev.32.d:0 "Reports flood in from across Macedonia: armed columns flying the Vergina Sun banner march from Tikveš. Veterans by the thousands rally to Delčev's call. The Old Lion, who sought only retirement, has been forced to take up arms one final time.\n\nHis proclamation is brief: 'I fight not for power, but to save Macedonia from those who would destroy her soul. Lay down your arms and join me, or stand aside. I will not see Macedonians kill Macedonians needlessly. But neither will I allow Macedonia to be betrayed.'\n\nCivil war has begun."
 mac_delcev.32.a:0 "This is war"
 mac_delcev.40.t:0 "The Tikveš Compromise"
 mac_delcev.40.d:0 "After weeks of negotiation, a compromise has been reached. Goce Delčev will not assume direct leadership, but will serve as Elder Statesman and Presidential Advisor. His role will be ceremonial but influential - a living symbol of Macedonian independence.\n\nDelčev accepts reluctantly: 'If this brings peace and stability, I will serve. But leadership belongs to the next generation. I am content to watch, to advise, and to remind you of what we fought for.'"
 mac_delcev.40.a:0 "Wise compromise"
 mac_delcev.41.t:0 "Co-Governance Agreement"
 mac_delcev.41.d:0 "An unprecedented arrangement takes shape: Goce Delčev and the current leadership will share power. Delčev will direct military and foreign policy, drawing on his legendary reputation. The government will handle domestic affairs and economics.\n\nDelčev's condition is clear: 'Macedonia's independence is non-negotiable. No foreign power will dictate our destiny while I draw breath.'\n\nThe arrangement is unorthodox, but perhaps Macedonia needs unorthodox solutions."
 mac_delcev.41.a:0 "Power shared is power doubled"
 mac_delcev.50.t:0 "Macedonia for Macedonians"
 mac_delcev.50.d:0 "From the Presidential Palace in Skopje, Goce Delčev delivers his most important speech since returning to power:\n\n'For thirty years, I have fought one battle - for Macedonia to be free and independent. Not a satellite of Belgrade, Sofia, or Athens. Not a puppet of Moscow, Berlin, or London. MACEDONIAN.\n\nToday I declare: we will join no foreign alliances. We will serve no foreign masters. Our fate is our own. We may stand alone, but we stand proudly. Macedonia for Macedonians - yesterday, today, and forever.'\n\nThe crowd's roar shakes the foundations of the palace."
 mac_delcev.50.a:0 "Independence is our birthright"
 mac_delcev.51.t:0 "The People's Army"
 mac_delcev.51.d:0 "Goce Delčev announces a radical restructuring of the Macedonian military based on his guerrilla warfare experience:\n\n'I learned in the mountains that every Macedonian can be a soldier. Not through conscription and parade grounds, but through commitment to defending our homeland. We will create an army of the people - trained in guerrilla tactics, knowing every mountain pass and forest trail. Let foreign invaders try to occupy Macedonia. They will meet the cheta brigades in every village.'\n\nThe new military doctrine honors VMRO's revolutionary traditions."
 mac_delcev.51.a:0 "Every Macedonian a soldier"
 mac_delcev.60.t:0 "Settle the Succession"
 mac_delcev.60.d:0 "Goce Delčev summons his closest advisors to Tikveš for a private meeting. The topic: succession. The Founder is aging, and Macedonia must not descend into chaos again when he dies.\n\nThree candidates have emerged from the younger generation, each representing different aspects of Delčev's legacy. The Founder must choose who will carry his vision forward."
 mac_delcev.60.a:0 "Svetozar Vukmanović - The People's General"
 mac_delcev.60.b:0 "Mihailo Apostolski - The Moderate Reformer"
 mac_delcev.60.c:0 "Panko Brashnarov - The Nationalist Fighter"
 mac_delcev.70.t:0 "Delčev Judges Your Government"
 mac_delcev.70.d:0 "After years of watching, Goce Delčev finally delivers his verdict on your leadership. In a rare public appearance, he addresses a massive crowd:\n\n'I have watched this government carefully. I have weighed its actions against the principles we fought for. And I have reached my judgment...'"
 mac_delcev.70.a:0 "Thank you, Founder"
 mac_delcev.70.b:0 "We did what was necessary"
 mac_delcev.71.t:0 "Delčev Leads Military Coup"
 mac_delcev.71.d:0 "The Old Lion roars one final time. At dawn, units loyal to Goce Delčev seize control of government buildings across Skopje. Resistance collapses almost instantly - few soldiers will fire on the Founder.\n\nDelčev's proclamation is broadcast on national radio:\n\n'I did not seek this. I wanted only peace in my final years. But I cannot watch Macedonia betrayed. The current government has failed the principles we fought for. I take power not out of ambition, but out of necessity. Forgive me, my children, but I must save you from yourselves.'\n\nThe coup is bloodless. The Founder rules."
 mac_delcev.71.a:0 "I cannot fight the Founder..."
 mac_delcev.71.b:0 "The Founder condemns us..."
 mac_delcev.80.t:0 "The Founder Is Ill"
 mac_delcev.80.d:0 "Terrible news from Skopje: Goce Delčev has fallen seriously ill. Doctors work frantically, but the Founder is 72 years old and a lifetime of revolutionary struggle has taken its toll.\n\nMacedonia holds a vigil. Churches fill with candles. Veterans gather in squares, singing VMRO songs. The entire nation prays for the Old Lion."
 mac_delcev.80.a:0 "Not yet, Founder. We still need you."
 mac_delcev.85.t:0 "Delčev's Condition Worsens"
 mac_delcev.85.d:0 "The doctors deliver grim news: Delčev's health continues to decline. He remains conscious, but weak. Visitors are limited to his closest companions.\n\nFrom his sickbed, Delčev dictates letters to key government officials, ensuring his vision will continue after him."
 mac_delcev.85.a:0 "His spirit remains strong"
 mac_delcev.86.t:0 "TheFounder's Final Days"
 mac_delcev.86.d:0 "Delčev knows the end approaches. He requests visits from old comrades - those few who survive from the early revolutionary days. Together they recall the struggles, the victories, the sacrifices.\n\n'We did good work,' Delčev tells them. 'Macedonia is free. That's all that matters.'"
 mac_delcev.86.a:0 "The nation holds its breath"
 mac_delcev.87.t:0 "Delčev Dictates His Final Letter"
 mac_delcev.87.d:0 "With his last strength, Goce Delčev calls for paper and pen. He dictates a final letter to the Macedonian people - to be opened only after his death.\n\nThe sealed envelope is placed in the National Archives. Its contents remain secret until the appointed hour."
 mac_delcev.87.a:0 "His final words await"
 mac_delcev.88.t:0 "The Founder Dies"
 mac_delcev.88.d:0 "At 3:17 AM, Goce Delčev, Father of the Macedonian Nation, passed quietly in his sleep. His final words were reported as: 'Macedonia... free... proud...'\n\nThe nation awakens to church bells tolling across the land. Work stops. Businesses close. A million people weep.\n\nGoce Delčev is dead. The revolutionary era ends."
 mac_delcev.88.a:0 "Macedonia mourns"
 mac_delcev.88.b:0 "Leave the question open"
 mac_delcev.89.t:0 "National Mourning"
 mac_delcev.89.d:0 "Macedonia declares thirty days of national mourning. Black flags hang from every building. Radio plays only funeral music. Parliament suspends all business except arranging the state funeral.\n\nFrom across the Balkans and beyond, condolences pour in. Even enemies acknowledge: a giant has fallen."
 mac_delcev.89.a:0 "The nation grieves"
 mac_delcev.90.t:0 "Delčev Lies in State"
 mac_delcev.90.d:0 "Goce Delčev's body lies in state in the Parliament building in Skopje. For five days and nights, an endless line of mourners files past the casket. Over one million people - nearly half of Macedonia's population - come to pay respects.\n\nVeterans stand honor guard. Old women bring flowers. Children sing hymns. The Old Lion rests."
 mac_delcev.90.a:0 "The people bid farewell"
 mac_delcev.91.t:0 "The Funeral"
 mac_delcev.91.d:0 "Two million people line the route as Delčev's funeral procession moves through Skopje. Kings, presidents, and revolutionaries from across the world attend.\n\nHe is buried with full military honors at Tikveš, overlooking the mountains he loved. The Vergina Sun banner drapes his casket."
 mac_delcev.91.a:0 "Rest well, Founder"
 mac_delcev.92.t:0 "The Final Letter"
 mac_delcev.92.d:0 "One week after the funeral, Delčev's final letter is opened before Parliament and broadcast across the nation:\n\n'My beloved Macedonians,\n\nIf you hear these words, I am gone. Do not mourn long - celebrate instead that I lived to see Macedonia free.\n\nRemember: Macedonia for Macedonians. Never bow to foreign masters. Treasure your independence more than gold. Stand together regardless of religion or origin. Defend the weak. Speak truth. Love your homeland.\n\nI go to dust, but Macedonia lives forever. Guard her well.\n\nYour father,\nGoce Delčev'\n\nThe nation weeps and pledges to honor his memory."
 mac_delcev.92.a:0 "We will remember"
 mac_delcev.93.t:0 "Delčev's Legacy"
 mac_delcev.93.d:0 "In the months following Delčev's death, his stature only grows. Schools are renamed in his honor. Statues rise in every city. His writings become required reading.\n\nThe government formally designates Goce Delčev as 'Father of the Macedonian Nation' - a title that can never be claimed by another. His birthday becomes a national holiday.\n\nAs long as Macedonia endures, Delčev will be remembered."
 mac_delcev.93.a:0 "The Founder's legacy is eternal"
 mac_delcev.95.t:0 "The Succession - Post-Delčev"
 mac_delcev.95.d:0 "Macedonia must now govern without the Founder. The succession plan Delčev carefully arranged is put into effect. His chosen successor assumes leadership, guided by Delčev's principles.\n\nIt is a test: can Macedonia survive without the Old Lion? Can his vision endure beyond his lifetime?"
 mac_delcev.95.a:0 "We carry on his work"
 mac_delcev.96.t:0 "The Delčev Scholarship Foundation"
 mac_delcev.96.d:0 "In Delčev's will, he left his entire personal estate to establish a scholarship foundation. Thousands of young Macedonians will study abroad, bringing knowledge back to enrich the nation.\n\n'Invest in minds, not monuments,' his will reads. Even in death, he serves Macedonia."
 mac_delcev.96.a:0 "Education was always his priority"
 mac_delcev.97.t:0 "Anniversary of Delčev's Death"
 mac_delcev.97.d:0 "On the anniversary of Goce Delčev's death, the nation pauses to remember. Veterans gather at his tomb in Tikveš. Schools teach lessons about his life. Parliament reads his final letter aloud.\n\nOne speaker captures the mood: 'We are all Delčev's children. His spirit lives in every Macedonian heart.'\n\nThe Founder is gone, but never forgotten."
 mac_delcev.97.a:0 "We remember the Founder"
 mac_delcev.97.b:0 "Back down — it is not worth the risk"
